<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vallombrosa — Knowledge Base Auditor</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0d0a0e;
  --bg-panel: #161219;
  --bg-card: #1e1822;
  --bg-hover: #2a2230;
  --border: #342a3a;
  --border-light: #4a3d52;
  --gold: #c9a84c;
  --gold-dim: #8a7235;
  --gold-bright: #e8c65a;
  --crimson: #9b2335;
  --crimson-dim: #6b1825;
  --crimson-bright: #c43050;
  --text: #d4ccd8;
  --text-dim: #8a7f90;
  --text-bright: #f0ebf2;
  --spoiler-bg: #1a1520;
  --tag-bg: #252030;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 300;
  height: 100vh;
  overflow: hidden;
  display: flex;
}

/* === SIDEBAR === */
#sidebar {
  width: 300px;
  min-width: 300px;
  height: 100vh;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#sidebar-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 20px;
  color: var(--gold);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

#sidebar-header .subtitle {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

#search-box {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 4px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px;
  outline: none;
}
#search:focus { border-color: var(--gold-dim); }
#search::placeholder { color: var(--text-dim); }

#nav {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

#nav::-webkit-scrollbar { width: 6px; }
#nav::-webkit-scrollbar-track { background: transparent; }
#nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.nav-group-header {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-weight: 600;
  color: var(--gold-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  padding: 14px 16px 6px;
  cursor: pointer;
  user-select: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.nav-group-header:hover { color: var(--gold); }

.nav-group-header .count {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg-card);
  padding: 1px 6px;
  border-radius: 8px;
}

.nav-group-header .arrow {
  font-size: 9px;
  transition: transform 0.2s;
  margin-right: 4px;
}
.nav-group-header.collapsed .arrow { transform: rotate(-90deg); }

.nav-item {
  padding: 5px 16px 5px 24px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text-dim);
  transition: all 0.15s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  border-left: 2px solid transparent;
}

.nav-item:hover {
  color: var(--text);
  background: var(--bg-hover);
}

.nav-item.active {
  color: var(--gold);
  background: var(--bg-hover);
  border-left-color: var(--gold);
}

.nav-item .spoiler-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--crimson);
  margin-right: 6px;
  vertical-align: middle;
}

.nav-group-items { overflow: hidden; }
.nav-group-items.collapsed { display: none; }

/* === MAIN CONTENT === */
#main {
  flex: 1;
  overflow-y: auto;
  padding: 32px 48px;
}

#main::-webkit-scrollbar { width: 8px; }
#main::-webkit-scrollbar-track { background: var(--bg-deep); }
#main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

#placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  flex-direction: column;
  opacity: 0.3;
}

#placeholder h2 {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  color: var(--gold-dim);
  font-weight: 400;
}

#placeholder p {
  font-size: 14px;
  color: var(--text-dim);
  margin-top: 8px;
}

/* Entry display */
.entry-header {
  margin-bottom: 28px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}

.entry-source {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--gold-dim);
  margin-bottom: 6px;
}

.entry-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.2;
  margin-bottom: 6px;
}

.entry-id {
  font-size: 11px;
  color: var(--text-dim);
  font-family: monospace;
  margin-bottom: 12px;
}

.entry-aliases {
  font-size: 13px;
  color: var(--text-dim);
  font-style: italic;
  margin-bottom: 10px;
}

.entry-meta {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}

.tag {
  font-size: 10px;
  padding: 2px 8px;
  background: var(--tag-bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

.tag.type-tag {
  border-color: var(--gold-dim);
  color: var(--gold);
}

.tag.spoiler-tag {
  border-color: var(--crimson-dim);
  color: var(--crimson-bright);
}

.tag.tier-tag {
  border-color: #2a6a5a;
  color: #5abfa0;
}

.entry-summary {
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 28px;
  max-width: 760px;
}

/* Sections */
.section-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 16px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
  letter-spacing: 1px;
}

/* Details */
.detail-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 12px;
  max-width: 760px;
}

.detail-card.is-spoiler {
  border-left: 3px solid var(--crimson);
}

.detail-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.detail-label .spoiler-badge {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--crimson-bright);
  background: var(--crimson-dim);
  padding: 1px 6px;
  border-radius: 3px;
}

.detail-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

/* Connections */
.conn-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 20px;
  margin-bottom: 10px;
  max-width: 760px;
  cursor: pointer;
  transition: all 0.15s;
}

.conn-card:hover {
  border-color: var(--gold-dim);
  background: var(--bg-hover);
}

.conn-card.is-spoiler { border-left: 3px solid var(--crimson); }

.conn-target {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.conn-target .conn-source-file {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 10px;
  color: var(--text-dim);
  background: var(--tag-bg);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 400;
}

.conn-target .unresolved {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 10px;
  color: var(--crimson-bright);
  background: var(--crimson-dim);
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 400;
}

.conn-relationship {
  font-size: 13px;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
}

.conn-summary {
  font-size: 12px;
  color: var(--text-dim);
  line-height: 1.5;
  font-style: italic;
  padding-top: 6px;
  border-top: 1px solid var(--border);
}

/* DM Notes */
.dm-notes {
  background: var(--bg-card);
  border: 1px solid var(--gold-dim);
  border-radius: 6px;
  padding: 16px 20px;
  margin-bottom: 12px;
  max-width: 760px;
}

.dm-notes-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--gold);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}

.dm-notes-content {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

/* Stats bar */
#stats {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  flex-shrink: 0;
  display: flex;
  justify-content: space-between;
}

/* Back nav */
.back-links {
  margin-bottom: 16px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.back-link {
  font-size: 11px;
  color: var(--gold-dim);
  cursor: pointer;
  padding: 2px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  transition: all 0.15s;
}

.back-link:hover {
  color: var(--gold);
  border-color: var(--gold-dim);
}

/* Player badge */
.player-badge {
  font-size: 11px;
  color: var(--text-dim);
  background: var(--tag-bg);
  border: 1px solid var(--border);
  padding: 2px 8px;
  border-radius: 3px;
  margin-left: 8px;
}
</style>
</head>

</div>

<script>
const DATA = {"characters": {"schema_version": "1.1", "category": "characters", "entries": [{"id": "lotan", "type": "pc", "name": "Lotan", "aliases": ["Kenny", "Ken", "Lotin", "Lotun", "Lotion", "Lo", "Lot"], "tags": ["pc", "warlock", "fighter", "pirate", "patron_keeper_of_faces", "swashbuckler", "privateer", "tiefling", "eldritch_knight", "fighter_warlock", "warlock_fighter", "kraken_warlock", "keeper_warlock", "sea_warlock", "flaming_sword", "flaming_scimitar", "red_character", "kenny_character"], "spoiler": false, "summary": "A pirate-descended Fighter/Warlock hybrid whose warlock pact was hijacked by a mysterious supernatural entity during the dream-contract finalization with a Kraken patron.", "details": [{"label": "Concept", "content": "Custom Fighter/Warlock hybrid (Eldritch Knight transitioning to Warlock). Descended from a previous Curse of Strahd character.", "spoiler": false}, {"label": "Background", "content": "Pirate or pirate-pretender. Arrived in Venturia after sailing from abroad, having met Roxy on the journey.", "spoiler": false}, {"label": "Warlock Pact", "content": "Lotan sought patronage from a Kraken. During the dream-contract finalization, a third party hijacked the pact, offering weaker immediate power but greater potential in exchange for help freeing the entity from imprisonment.", "spoiler": false}, {"label": "True Patron Identity", "content": "The entity that hijacked Lotan's pact is the Keeper of Faces — the imprisoned Archfey who is one of the campaign's central supernatural forces. Lotan has a direct, personal connection to the primary antagonistic supernatural power of the entire campaign.", "spoiler": true}, {"label": "Campaign Role", "content": "His patron connection provides built-in exposition delivery through dreams and visions, personal stakes in the Archfey's imprisonment, moral complexity about whether freeing his patron is good or bad, and a natural channel for plot information.", "spoiler": true}, {"label": "Pre-Campaign Connection", "content": "Met Roxy one year before campaign start during her travel to Venturia. Showed her around the city and taught her about merchant areas.", "spoiler": false}], "connections": [{"target_id": "roxy", "target_name": "Roxy", "relationship": "Met on ship to Venturia; he guided her around the city when they arrived", "spoiler": false}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Patron — an imprisoned Archfey who hijacked Lotan's warlock pact", "spoiler": true}], "dm_notes": "Lotan's patron IS the Keeper of Faces, the imprisoned Archfey at the center of the campaign. The Keeper can recognize prisoner brands (like Silas's scars) and communicate through dreams. Moral complexity: freeing the Keeper might be necessary but also dangerous. His patron connection is the most direct PC link to the campaign's supernatural core.", "player": "Kenny"}, {"id": "caravel", "type": "pc", "name": "Caravel \"Car\" Asteri", "aliases": ["Car", "Car Asteri", "Katelynn", "Katelyn", "Kate", "Katie", "Cara", "Vel", "Carnival", "Cary", "Carrie", "Carry", "Carie", "Kara", "Kar", "Carnie", "Asteri", "Astral", "Astair", "Aster", "Twin", "Twin Sister", "Andro"], "tags": ["pc", "bard", "masquers_sodality", "covenant_archive", "anti_secrets", "satyr_bard", "satyr", "mask_bard", "masquerade_bard", "masks_bard", "college_of_masquerade", "androgynous", "katelynn_character"], "spoiler": false, "summary": "A Venturia native and Masquers' Sodality apprentice who is categorically opposed to secrets, having witnessed a friend's death following a secret deal at the Autumn Masquerade.", "details": [{"label": "Concept", "content": "Custom Masquerade Bard subclass. Born and raised in Venturia.", "spoiler": false}, {"label": "Family", "content": "Parents run The Covenant Archive. She has a 'perfect' twin sister favored by her parents. Family are friends with the owners of The Burnt Quill. She rejected the family business.", "spoiler": false}, {"label": "Inciting Incident", "content": "Witnessed family friends making a deal with an unknown third party. The next night at the Autumn Masquerade, she found that friend's body dead. Her parents claim the death was caused by 'betrayal' but refuse to elaborate.", "spoiler": false}, {"label": "Philosophy", "content": "Categorically opposed to secrets — she blames them for her friend's death. This puts her in direct philosophical conflict with Roxy.", "spoiler": false}, {"label": "Career", "content": "Apprentice with the Masquers' Sodality, drawn to music, theater, and masks despite — or perhaps because of — the Masquerade tragedy.", "spoiler": false}, {"label": "Connection to Orabella", "content": "The theater star Orabella is infatuated with is the older sister of Car's friend who was killed at the Autumn Masquerade. Car and Orabella have an indirect connection through this performer.", "spoiler": false}, {"label": "The Secret Deal", "content": "The 'unknown third party' in the deal Car witnessed may be connected to Silas, the Autumn Masquerade's supernatural significance, or Act One's broader conspiracy. This is a major unresolved thread.", "spoiler": true}], "connections": [{"target_id": "roxy", "target_name": "Roxy", "relationship": "Unlikely friendship despite opposing philosophies on secrets; Roxy cultivated this friendship partly for access to the Archive", "spoiler": false}, {"target_id": "orabella", "target_name": "Orabella", "relationship": "Indirect connection through the theater star Celina Cross, who is the older sister of Car's dead friend", "spoiler": false}, {"target_id": "celina_cross", "target_name": "Celina Cross", "relationship": "Celina is the older sister of Car's friend who died at the Autumn Masquerade", "spoiler": false}, {"target_id": "masquers_sodality", "target_name": "The Masquers' Sodality", "relationship": "Apprentice with the Masquers' Sodality", "spoiler": false}, {"target_id": "covenant_archive", "target_name": "The Covenant Archive", "relationship": "Parents run the Covenant Archive; she rejected the family business", "spoiler": false}], "dm_notes": "The 'unknown third party' in the deal Car witnessed is a thread to develop. Her anti-secrets stance creates natural friction with Roxy and thematic resonance with the campaign's hidden truths. Her Masquers' Sodality connection gives access to theater/mask world. Her parents' Archive connection is valuable for investigation hooks. Caravel is categorically opposed to secrets — blames them for a friend's death. This creates natural party tension with Roxy (who collects them via Garl). Thematically perfect for a campaign where buried truths are central. The friend's death is an open question: connected to Silas, to the opening mystery, or purely backstory?", "player": "Katelynn"}, {"id": "noname", "type": "pc", "name": "Noname", "aliases": ["Amy", "No-Nom-Eh", "NoNomEh", "No Nom Eh", "Nonamé", "Nonami", "Nona", "Nomi", "Nome", "Nom", "Nono", "Nams", "Namie", "No Name", "No-Name", "Nonam"], "tags": ["pc", "barbarian", "fog_warden", "liminal_house", "fog_child_connection", "memory_manipulation", "human_barbarian", "warden", "rage", "rager", "amy_character"], "spoiler": false, "summary": "A Fog Warden Barbarian seeking treatment at Viro's Respite for foggy, unclear memories surrounding her fiancé's recent disappearance.", "details": [{"label": "Concept", "content": "Barbarian Fog Warden trying to calm her rage. Raised at Liminal House after her parents died young.", "spoiler": false}, {"label": "Family Background", "content": "Her father was a 'fog child' — a person who appeared from Vallombrosa with no memories as a child and was raised by Liminal House. Noname herself also went to Liminal House after her parents' early deaths.", "spoiler": false}, {"label": "Inciting Incident", "content": "Her fiancé, a fellow Fog Warden, disappeared under mysterious circumstances. Her memory of the event is foggy and unclear. She is currently seeking treatment at Viro's Respite.", "spoiler": false}, {"label": "True Cause of Memory Issues", "content": "Silas manipulated Noname's memory during or after the incident where her fiancé disappeared. This was one of his first uses of his memory manipulation abilities in Venturia — crude and incomplete, which is why her memory is 'foggy' rather than cleanly erased.", "spoiler": true}, {"label": "Her Fiancé's Fate", "content": "Her fiancé (Marcus, a Fog Warden) disappeared the same night Silas appeared at the Fog Warden post. Marcus is also Kryton's close friend. His ultimate fate — dead, trapped in the prison, transformed, or imprisoned by Silas — is an unresolved campaign question.", "spoiler": true}], "connections": [{"target_id": "orabella", "target_name": "Orabella", "relationship": "Childhood acquaintance at Liminal House; Orabella is now her healer at Viro's Respite", "spoiler": false}, {"target_id": "valentro", "target_name": "Valentro", "relationship": "Both raised at Liminal House; Valentro was present when Noname's fiancé proposed in the Tiered Gardens", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Kryton introduced Noname to her fiancé (now disappeared) and feels guilt over the connection", "spoiler": false}, {"target_id": "marcus", "target_name": "Marcus", "relationship": "Her fiancé, a Fog Warden who disappeared under mysterious circumstances. Her memory of the event is foggy and unclear.", "spoiler": false}, {"target_id": "fog_wardens_garrison", "target_name": "The Fog Wardens' Garrison", "relationship": "Fog Warden stationed at the Overlook", "spoiler": false}], "dm_notes": "Noname sits at the intersection of the Fog Warden disappearances, memory manipulation, and Liminal House themes. Her father being a fog child connects the campaign's deep history to the present. Her foggy memory IS Silas's doing. Consider: Option C (mixed/conflicting memories) for maximum horror. Valentro's father also disappeared as a Fog Warden — the pattern of Fog Wardens being targeted should become apparent.", "player": "Amy"}, {"id": "valentro", "type": "pc", "name": "Valentro", "aliases": ["Ren", "Valen", "Val", "Tro", "Valentino", "Valent", "Vally", "Valle", "Valentero", "Valantro", "Velentro"], "tags": ["pc", "ranger", "elf", "liminal_house", "fog_warden_connection", "suppressed_memory", "elf_ranger", "gardener", "gardens_worker", "way_of_the_leaf", "leaf_ranger", "swords", "short_swords", "ren_character"], "spoiler": false, "summary": "An elf Ranger who works in the Tiered Gardens and is haunted by a strange incident where her gardening shears appeared to her as short swords — muscle memory from a past she cannot recall.", "details": [{"label": "Concept", "content": "Elf Ranger. Works in the Tiered Gardens with her mentor 'Strider' (way of the leaf). Raised at Liminal House after being orphaned.", "spoiler": false}, {"label": "Family Loss", "content": "Her father was a Fog Warden who disappeared. Her mother died before her father's disappearance. She was raised at Liminal House.", "spoiler": false}, {"label": "The Sword Moment", "content": "While gardening, her shears broke and she suddenly saw them as short swords — muscle memory or a forgotten identity surfacing. This may be evidence of memory bleed, a suppressed warrior past, or reincarnation echoes.", "spoiler": false}, {"label": "Roxy's Knowledge of the Sword Moment", "content": "Roxy witnessed the sword incident and is now secretly training Valentro while knowing her secret. Roxy is using this knowledge as leverage while also providing genuine help.", "spoiler": false}, {"label": "Roxy's Witness", "content": "Roxy is the only other person who knows about the sword moment. She approached Valentro afterward and offered training — partly genuine, partly to maintain access to a valuable secret.", "spoiler": false}, {"label": "True Nature of the Sword Moment", "content": "The sword moment likely represents memory bleed from a suppressed or stolen past identity. Could indicate: reincarnation of one of the original one-shot adventurers, a fog child whose warrior past is surfacing, or a victim of memory manipulation whose true memories are fighting through. Her father's disappearance follows the same Fog Warden targeting pattern as Noname's fiancé.", "spoiler": true}], "connections": [{"target_id": "noname", "target_name": "Noname", "relationship": "Both raised at Liminal House; Valentro was present at Noname's fiancé's proposal in the Tiered Gardens", "spoiler": false}, {"target_id": "orabella", "target_name": "Orabella", "relationship": "Both raised at Liminal House, slightly less close than Noname and Orabella", "spoiler": false}, {"target_id": "roxy", "target_name": "Roxy", "relationship": "Roxy witnessed the sword incident and is now training Valentro — a relationship with both genuine and strategic dimensions", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Kryton may know Valentro casually from frequenting the Tiered Gardens", "spoiler": false}], "dm_notes": "Valentro's sword moment = memory bleed of same type as the campaign's broader memory manipulation themes. Her father's disappearance as a Fog Warden mirrors Noname's fiancé's disappearance — these two should realize the pattern together. Roxy's training relationship is both genuine and strategic. Potential reincarnation hook for later campaign development.", "player": "Ren"}, {"id": "kryton", "type": "pc", "name": "Kryton Novelli", "aliases": ["Kryton", "Shawn", "Sean", "Shon", "Kriton", "Cryton", "Criton", "Novelli", "Novel", "Kryton Novel", "Krick", "Kryt", "Krit", "Kit", "Curt", "Kurt", "Silver Fox"], "tags": ["pc", "warlock", "former_wizard", "vava", "undertow", "patron_unknown", "gambling", "memory_stolen", "prison_warlock", "tartuzi_warlock", "wizard", "human_wizard", "teacher", "librarian", "vava_teacher", "vava_librarian", "gambler", "shawn_character"], "spoiler": false, "summary": "A VAVA faculty member and former Wizard turned Warlock whose memories — including his wizard spell knowledge — were stolen. Bound to an unknown patron through a desperate ritual he believes he can control.", "details": [{"label": "Concept", "content": "Mid-career VAVA faculty member, brilliant but increasingly erratic. Former Wizard who is now a Warlock. Has a gambling problem at The Undertow.", "spoiler": false}, {"label": "The Disappearance", "content": "His close friend — a Fog Warden he introduced to Noname — disappeared the same night Silas appeared. Kryton investigated obsessively and discovered patterns in Fog Warden disappearances and evidence of city-wide memory manipulation.", "spoiler": false}, {"label": "Memory Theft", "content": "Someone working through The Undertow stole Kryton's memories, including his wizard spell knowledge. He lost his magical abilities and much of his investigative findings.", "spoiler": false}, {"label": "The Warlock Pact", "content": "Desperate to recover his abilities, Kryton gambled at The Undertow trying to win his memories back. Instead he won someone else's memory — a vision of a warlock tome and ritual. He performed the ritual and bound himself to an unknown patron.", "spoiler": false}, {"label": "His Fatal Flaw", "content": "Kryton believes he can outsmart his patron and find loopholes in the contract. He doesn't understand that his patron is manipulating him toward something, that the pact is far more binding than he read, and that her agenda may unleash catastrophe.", "spoiler": false}, {"label": "True Patron Identity", "content": "Kryton's patron is Tartuzi the sphinx — the same sphinx whose consultation with Lorenzo centuries ago led directly to her own enslavement as the Archfey's prison lock. She has been bound for a millennium as the eternal lock of the imprisonment mechanism. Her agenda, what she wants Kryton to do, and whether freeing her is a good outcome are all major unresolved questions.", "spoiler": true}], "connections": [{"target_id": "noname", "target_name": "Noname", "relationship": "Introduced Noname to her fiancé (the disappeared Fog Warden); feels profound guilt", "spoiler": false}, {"target_id": "silas", "target_name": "Silas", "relationship": "Kryton's investigation led him to discover patterns Silas is responsible for; his memories were likely stolen to suppress this knowledge", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "His unknown warlock patron — a sphinx imprisoned for a millennium as the lock of the Keeper's prison", "spoiler": true}, {"target_id": "the_undertow", "target_name": "The Undertow", "relationship": "Regular gambling patron; the location where his memories were stolen and where he won the warlock ritual", "spoiler": false}, {"target_id": "marcus", "target_name": "Marcus", "relationship": "Close friend — Kryton introduced Marcus to Noname. Marcus's disappearance drove Kryton's obsessive investigation.", "spoiler": false}, {"target_id": "vava", "target_name": "Venturian Academy of Veiled Arts", "relationship": "Faculty member at VAVA", "spoiler": false}], "dm_notes": "Kryton's patron IS Tartuzi. This creates a fascinating dynamic: his patron is simultaneously a victim (imprisoned for a millennium) and potentially dangerous (her agenda is unknown). His intellectual arrogance is the perfect tragic flaw — he thinks he's outsmarting her but she's been playing this game for a thousand years. His warlock levels function normally; his wizard levels are inaccessible (memories stolen). The memory theft happened through The Undertow connection — explore who or what orchestrates memory theft there.", "player": "Shawn"}, {"id": "orabella", "type": "pc", "name": "Orabella", "aliases": ["Jennifer", "Jen", "Jenny", "Ora", "Bella", "Belle", "Bell", "Bela", "Ora-B", "Orabela", "Orabelle"], "tags": ["pc", "cleric", "fog_child", "liminal_house", "viros_respite", "reincarnation", "memory_excess", "theater", "human_cleric", "art_domain", "art_cleric", "art_domain_cleric", "painter", "painter_cleric", "healer", "nurse", "viros_healer", "jennifer_character"], "spoiler": false, "summary": "A fog child raised at Liminal House who now works as a cleric at St. Viro's Respite. She experiences vivid first-person dreams of being other people — dreams she believes are memories from lives she has lived.", "details": [{"label": "Concept", "content": "Cleric working at St. Viro's Respite. Fog child who appeared at Liminal House as a child with no memory of her life before.", "spoiler": false}, {"label": "The Dreams", "content": "Shortly after arriving at Liminal House, Orabella began having vivid first-person dreams where she IS someone else — different body, different life, different circumstances. Always first-person perspective. Always feeling real in a way normal dreams don't. The first dream: blood all over her hands and clothes. She doesn't know whose blood or why.", "spoiler": false}, {"label": "Her Theory", "content": "Orabella believes these dreams mean she has been inside Vallombrosa — not just appeared from it, but genuinely been inside the fog. She believes they are memories of lives she has lived. The institutions refuse to discuss it with her.", "spoiler": false}, {"label": "Institutional Silence", "content": "As she aged and started asking about the dreams, Liminal House staff and Viro's Respite clergy shut her down. No one will discuss what the dreams mean or whether other fog children experience them. This has made her more determined to find answers.", "spoiler": false}, {"label": "Current Patients", "content": "Orabella is caring for two critical patients: Noname (childhood acquaintance, foggy memories of fiancé's disappearance) and Silas (mysterious scarred comatose man who appeared the same night Noname's fiancé vanished).", "spoiler": false}, {"label": "Theater Obsession", "content": "Orabella is deeply interested in theater and infatuated with a particular star performer — Celina Cross. This fascination mirrors her dream experience: actors temporarily become someone else, just as she inhabits other identities in dreams.", "spoiler": false}, {"label": "Investigation", "content": "Orabella is attempting to access hidden records kept by Viro's Respite and Liminal House to understand what her dreams mean, whether other fog children experience this, and why the institutions suppressed her questions.", "spoiler": false}, {"label": "True Nature of the Dreams", "content": "Orabella's recurring first-person dreams are connected to the campaign's reincarnation mechanics. She is likely a reincarnation of one of the original adventurers from the Sphinx Twice one-shot who were imprisoned in the di Errante dungeon. Her first dream (blood on hands) may be her death or the final battle. The fog preserves or recycles souls, and fog children may be souls being reborn through the liminal space between lives.", "spoiler": true}, {"label": "Institutional Conspiracy", "content": "Liminal House and Viro's Respite know that other fog children experience these dreams. There is a deliberate policy of non-disclosure. They may be protecting fog children from dangerous knowledge OR hiding something about Vallombrosa's true nature — possibly both.", "spoiler": true}], "connections": [{"target_id": "noname", "target_name": "Noname", "relationship": "Childhood acquaintance at Liminal House; now Noname's healer at Viro's Respite — both experiencing different forms of memory disruption", "spoiler": false}, {"target_id": "valentro", "target_name": "Valentro", "relationship": "Both raised at Liminal House, slightly less close; potential reconnection through Noname", "spoiler": false}, {"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Indirect connection through Celina Cross — the theater star is the older sister of Car's friend who died at the Autumn Masquerade", "spoiler": false}, {"target_id": "celina_cross", "target_name": "Celina Cross", "relationship": "Orabella is infatuated with this theater performer; attends her shows whenever possible", "spoiler": false}, {"target_id": "silas", "target_name": "Silas", "relationship": "Orabella is his caretaker while he is comatose; she is studying his unusual scars", "spoiler": false}, {"target_id": "viros_respite", "target_name": "St. Viro's Respite", "relationship": "Works as a healer and cleric at St. Viro's Respite", "spoiler": false}, {"target_id": "liminal_house", "target_name": "Liminal House", "relationship": "Raised at Liminal House as a fog child", "spoiler": false}], "dm_notes": "Orabella has TOO MANY identities (opposite of other memory victims). Her struggle: which memories are actually hers? She sits at the exact center of the memory crisis — caring for Silas (memory manipulator) and Noname (memory victim). Her institutional investigation is a major early plot thread. Celina Cross connection bridges her to Car. Possible reincarnation of one-shot adventurer — handle carefully so it creates meaningful moments rather than feeling like a plot twist for its own sake.", "player": "Jennifer"}, {"id": "roxy", "type": "pc", "name": "Roxanya", "aliases": ["Roxy", "Danielle", "Rox", "Ro", "Roxie", "Roxi", "Rocksie", "Rock", "Anya", "Xanya", "Ann", "Anne", "Foxy", "Mini-me"], "tags": ["pc", "rogue", "arcane_trickster", "forest_gnome", "brownie_raised", "garl_glittergold", "vava", "secrets", "trickster", "gnome", "halfling", "short_rogue", "little_rogue", "secret_keeper", "secret_holder", "secret_master", "danielle_character"], "spoiler": false, "summary": "A 19-year-old forest gnome raised by a community of Brownies who genuinely believed she was one of them until age 8. Now a VAVA student maintaining a facade of magical competence, a secret collector driven by a divine pact with Garl Glittergold, and on a desperate mission to save her people from the Binding — an ancient enslavement magic threatening brownie survival.", "details": [{"label": "Concept", "content": "Arcane Trickster Rogue. Forest gnome, 3ft tall, sun-tanned skin with freckles, wild curly red hair. Wears swashbuckler attire (adopted after meeting Lotan on the ship). Always has a taxidermy owl on her shoulder.", "spoiler": false}, {"label": "Brownie Upbringing", "content": "Abandoned as an infant in the forests of Aminon, outside Hearthspire (north of the river on Eldoria mainland). Found by a rummage of Brownies and raised as one of their own. Until age 8-9, genuinely believed she was just an unusually large Brownie — she learned their language, culture, values, and the sacred arts of stealth, misdirection, and 'strategic acquisition.' The realization that she was a different species entirely was identity-shattering. At 12-13, trading in the nearby cities of Rai and Rodlin, she learned she was a gnome — her second identity crisis. She doesn't know if her parents are alive or dead, and critically, isn't particularly concerned about it.", "spoiler": false}, {"label": "Brownie Culture", "content": "Brownies (her people): lifespan 300-500 years, mature around 40. Among the oldest fey folk, origin legend says they were once sprites who became too enamored with the material plane. Chaotic neutral/good tricksters with a strange sense of honor. They live in tight-knit communities (called a 'rummage' or 'stash') in hollowed trees and burrows. Known for 'strategic acquisition' (kleptomania as cultural practice). Younglings are taught stealth, misdirection, and acquisition as sacred arts. They braid comfort-knots from grass when overwhelmed — a technique taught by rummage elders. Critically, brownies are ancient fey who crossed from the Liminal Deep generations ago when the di Errante estate was thriving — essentially household spirits who maintained the relationship between the mortal family and the Reverie Solenne. The brownies being enslaved in Vallombrosa are being used in violation of something sacred, which is why Garl Glittergold cares — he's not just protecting gnome-adjacent fey, he's watching someone desecrate an ancient covenant.", "spoiler": true}, {"label": "The Binding — Her Greatest Fear", "content": "Brownies carry a recessive genetic thread in their fey nature that, when activated through specific binding magic, can enslave them permanently — complete suppression of will that looks like perfect obedience from outside. Brownie numbers are declining because they are being enslaved. This is the existential threat to Roxy's people and the driving force of her entire character. She came to Venturia to stop it.", "spoiler": false}, {"label": "The Mission", "content": "At age 12, Aurelio Volante — a mask collector passing through the Aminon mainland — talked to her about Venturia, VAVA, and a city built on secrets. She stole one of his masks (sea-green enamel with silver brow-work) and left. She learned that Brownies are being enslaved and connected this to Vallombrosa. At 14, she formulated a plan: attend VAVA at 18, learn powerful magic, save the Brownies. She spent four years saving money (trading stolen goods, pixie dust, and secrets), applied to VAVA, and left at 18 with the rummage's blessing.", "spoiler": false}, {"label": "Wully — Her Brownie Companion", "content": "A brownie from her rummage who stowed away with her on the voyage to Venturia. Her best friend and accomplice in faking magical competence at VAVA. High-pitched voice, fast, slightly breathless — says too much then backtracks. Brave the way small things are brave: not fearlessly, but despite being afraid. Goes quiet when genuinely worried, and that silence is more alarming than his chatter. He cares about Roxy the way a small creature cares about the person it has chosen: completely and without embarrassment. He won't say this. He just keeps showing up.", "spoiler": true}, {"label": "Meeting Lotan", "content": "On the ship from Sayari to Venturia, she met Lotan and was enamored by his pirate stories and life of adventure. She adopted swashbuckler attire. He showed her around Venturia when they arrived and taught her about merchant areas. Possibly her most genuine friendship.", "spoiler": false}, {"label": "Divine Pact with Garl Glittergold", "content": "Upon arriving in Venturia, immediately tried to rob the Penny Shrine. Garl Glittergold himself appeared, amused by her audacity. He offered divine patronage in exchange for occasional favors, granting her Arcane Trickster powers and making her obsessed with Vallombrosa, secrets, and hidden knowledge. Her magic is divine in origin, not arcane study — she's faking it at VAVA.", "spoiler": false}, {"label": "VAVA Facade", "content": "Barely passed her VAVA interview ('by some miracle' — possibly Garl's influence). Enrolled focusing on illusion magic. Her powers are divine gifts, not study. She maintains a facade of magical competence with Wully's help. Can't sleep in her dorm — too confining after 18 years outdoors — so she sneaks out nightly to sleep in the Tiered Gardens.", "spoiler": false}, {"label": "Strategic Relationships", "content": "Roxy's friendships have strategic dimensions. She befriended Caravel specifically for access to the Archive and mask guilds (ironic: Caravel hates secrets, Roxy collects them). She witnessed Valentro's sword incident in the Gardens and offered to train him, partly to maintain leverage. She observed Noname's situation with Marcus's disappearance but may not have actually met her directly ('have we actually met???'). When not in classes, she follows and observes people, collecting secrets and building an information network.", "spoiler": false}, {"label": "The Hollow Bell — Vignette Resolution", "content": "Pre-campaign, Wully spotted Pip (a brownie from her rummage) being led through Market Tiers looking hollow-eyed. Roxy assumed the worst — the Binding. She broke into Aurelio Volante's warehouse expecting to rescue enslaved brownies. Instead she found Pip working a legitimate 90-day Covenant Archive-sealed contract (spice and dye quality assessment). The rummage was struggling after her departure — hard winter, lost Harrow to the cold, reduced ability to trade without their intermediary. Pip came to Venturia out of pride, not desperation — he didn't want to show up in her city as someone who needed help. Aurelio arrived, recognized her as the girl who stole his mask, laughed. She swapped the stolen mask for one she chose from his collection. He gave her the Listener's Coin. Pip's contract terminates in roughly 60 days from campaign start — a clock.", "spoiler": true}, {"label": "The Listener's Coin", "content": "Gift from Aurelio. Once per day, press the coin against any solid surface to hear all sound from the other side for 10 minutes. Whisper-quiet voices carry clearly. Must remain pressed to surface for duration. Recharges at dawn. Perfect tool for a secret collector.", "spoiler": false}, {"label": "The Masked Stranger — Resolved", "content": "The masked person who told 12-year-old Roxy about Venturia was Aurelio Volante — a mask collector and merchant with connections to the Masquers' Sodality. Not a villain or recruiter. A warm, curious eccentric who found her interesting. He felt responsible for planting Venturia in her head and tried to help her rummage when he found she'd already left.", "spoiler": false}], "connections": [{"target_id": "lotan", "target_name": "Lotan", "relationship": "Met on ship to Venturia; genuine friendship; he was her first guide to the city and she adopted his swashbuckler style", "spoiler": false}, {"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Befriended specifically for Archive/guild access; their opposing philosophies on secrets create tension but the friendship may have become genuine", "spoiler": false}, {"target_id": "valentro", "target_name": "Valentro", "relationship": "Witnessed his sword incident in the Gardens; training him while holding the secret as leverage; both genuine and strategic", "spoiler": false}, {"target_id": "aurelio_volante", "target_name": "Aurelio Volante", "relationship": "The man who told her about Venturia; she stole his mask; now a genuine ally who gave her the Listener's Coin", "spoiler": false}, {"target_id": "garl_glittergold", "target_name": "Garl Glittergold", "relationship": "Divine patron who granted Arcane Trickster powers and obsession with secrets/Vallombrosa in exchange for unspecified favors", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Possibly her VAVA teacher; may or may not know about her true situation", "spoiler": false}, {"target_id": "vava", "target_name": "Venturian Academy of Veiled Arts", "relationship": "Enrolled under false pretenses as cover for her real mission; barely maintaining the facade", "spoiler": false}, {"target_id": "penny_shrine", "target_name": "The Penny Shrine", "relationship": "Where she tried to rob Garl's shrine and received divine patronage instead", "spoiler": false}], "dm_notes": "Roxy is living a lie at every level — not a Brownie, not a proper gnome, not a real mage, not honest with her friends. Her mission (saving Brownies from the Binding) is a genuine emotional driver but also means she uses everyone around her as tools. The moment her strategic relationships are exposed will be a major character crisis. The Hollow Bell vignette established that her rummage is surviving without her — they're not waiting to be rescued. Whatever she does, she does knowing that. Pip's 60-day contract clock gives early campaign urgency. Aurelio is a genuine ally with Sodality and Archive connections. Garl's true agenda remains unclear — what favors will he eventually demand? Her obsession with secrets directly opposes Caravel's hatred of them — recurring party tension. She observed Noname's situation but may not have actually met her — clarify before session one.", "player": "Danielle"}, {"id": "silas", "type": "npc", "name": "Silas", "aliases": ["The Scarred Patient", "The Comatose Man", "Scarred Man", "Comatose Patient", "The Patient", "Branded Man", "Scarred Stranger"], "tags": ["npc", "antagonist", "memory_manipulation", "viros_respite", "bound", "escaped_prisoner", "fog_warden_disappearance", "lower_deity", "divine_trickster", "trickster_god", "comatose", "scars", "brands", "prisoner_brands"], "spoiler": false, "summary": "A mysterious comatose man covered in unusual scars who appeared at the Fog Warden post the same night Noname's fiancé disappeared. He is currently being treated at St. Viro's Respite under Orabella's care.", "details": [{"label": "Current State", "content": "Comatose at St. Viro's Respite. His body is covered in strange scars in unusual patterns. Orabella is his caretaker and has been studying the scars. He occasionally makes sounds suggesting consciousness.", "spoiler": false}, {"label": "The Scars", "content": "The scars on his body are not natural wounds. They are supernatural brands burned into his flesh — patterns that radiate faint magical energy upon close examination.", "spoiler": false}, {"label": "His Cover Story", "content": "When Silas wakes, he will present himself as a scholar who was imprisoned in Vallombrosa and escaped — a sympathetic figure researching the binding in hopes of understanding what happened to him. This persona is convincing because it contains elements of truth: he was imprisoned, he did escape, and he is genuinely researching the binding. The lie is in what he is and what he intends to do with that research.", "spoiler": true}, {"label": "What He Is Capable Of", "content": "Silas has memory manipulation abilities connected to the Bound mechanics. He manipulated Noname's memory during or after the Fog Warden incident as one of his first crude uses of this power in Venturia. When he wakes, he will be capable of creating Bound individuals and more sophisticated memory manipulation.", "spoiler": true}, {"label": "The Prisoner Brands", "content": "The scars are the Archfey's prisoner brands — Lotan's patron (the Keeper of Faces) would recognize these if shown or described. This is a critical early investigation hook that connects Silas to the campaign's supernatural core.", "spoiler": true}, {"label": "True Nature — Lower Deity", "content": "Silas was not a scholar. He was a lower deity or powerful divine trickster figure who lost a cosmic contest with the Keeper long before Lorenzo was born. The Keeper didn't destroy him — destroying a deity is genuinely difficult and creates messy cosmic consequences. Instead he imprisoned him, stripped him of most of his divine portfolio, and branded him as property. The scars are the physical record of his portfolio being revoked, his divine nature constrained.", "spoiler": true}, {"label": "Disguise in the Prison", "content": "His true form inside the prison was something grand and terrible — something with too many eyes or the wrong number of limbs, a presence that made the prison's walls resonate uncomfortably. He performed the mild, meek old man because the prison suppressed his true nature and the disguise was useful. TL never saw his real form. Tartuzi, as the lock, always could — she knew exactly what Silas was and couldn't warn TL without alerting Silas that she was watching.", "spoiler": true}, {"label": "How He Escaped", "content": "Silas spent decades cultivating TL's trust, knowing TL had accumulated genuine understanding of the prison's mechanism from his years of quiet communication with Tartuzi. When Silas murdered TL, he used TL's death as a distraction or door to facilitate his own escape. Tartuzi perceived it in real time, unable to intervene, unable to warn.", "spoiler": true}, {"label": "Material Plane Manifestation", "content": "When Silas crosses into the material plane, he doesn't arrive with a body. He arrives as a pattern of divine information that constructs a physical form from available material — his best approximation of what a mortal looks like, assembled from memories of mortals that are thousands of years old and filtered through fey imprisonment. The human form is therefore slightly wrong in ways that are hard to name. The scars transfer with perfect fidelity, because prisoner brands are written into his nature, not his body. Every form he wears will carry them.", "spoiler": true}, {"label": "Timeline", "content": "Silas was imprisoned by the Keeper long before Lorenzo's crime. Both TL and Silas have been prisoners for what might be 2,000–4,000 years in material plane time. Neither aged. Neither has a biological clock. Time, for them, was an incomprehensible span without the texture mortal life gives it.", "spoiler": true}, {"label": "True Divine Nature", "content": "Silas was a lower deity or powerful divine trickster figure who lost a cosmic contest with the Keeper long before Lorenzo was born. The Keeper imprisoned him rather than destroying him (destroying a deity creates messy cosmic consequences), stripped him of most of his divine portfolio, and branded him as property. The scarring is the physical record of his portfolio being revoked, his divine nature constrained. His true form inside the prison was something grand and terrible — too many eyes or the wrong number of limbs, a presence that made the prison walls resonate. He performed the mild, meek old man because the prison suppressed his true nature and the disguise was useful.", "spoiler": true}, {"label": "Material Plane Manifestation", "content": "When Silas escaped and crossed into the material plane, he didn't arrive with a body. He arrived as a pattern of divine information that constructed a physical form from available material — his best approximation of what a mortal looks like, assembled from memories of mortals thousands of years old filtered through fey imprisonment. The human form is therefore slightly wrong in ways hard to name. The scars transfer with perfect fidelity because prisoner brands are written into his nature, not his body. Every form he wears will carry them.", "spoiler": true}], "connections": [{"target_id": "orabella", "target_name": "Orabella", "relationship": "Orabella is his caretaker at Viro's Respite; she is studying his scars and may be affected by his presence", "spoiler": false}, {"target_id": "noname", "target_name": "Noname", "relationship": "He manipulated Noname's memory of the night her fiancé disappeared; appeared at the same location", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Bears the Keeper's prisoner brands; his abilities derive from connection to the weakening prison", "spoiler": true}, {"target_id": "tl", "target_name": "Tolomeo Lucente", "relationship": "Cultivated Tolomeo's trust over decades inside the prison, then murdered him and used his death to facilitate escape", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "Tartuzi always knew what Silas truly was but couldn't warn Tolomeo without alerting Silas; she watched Tolomeo's murder in real time, unable to intervene", "spoiler": true}, {"target_id": "marcus", "target_name": "Marcus", "relationship": "Silas swapped places with Marcus to escape the prison — Marcus was the counterweight required by the prison's conservation principle", "spoiler": true}], "dm_notes": "Silas's secondary agenda beyond scholarly research is still open. What specifically is he building toward that climaxes at the Masquerade? Does he create all Bound individuals, or primarily targeted ones? His patient care relationship with Orabella is rich territory — she might begin to sense something wrong before he wakes. Lotan's patron can identify the prisoner brands if the party describes the scars to him. The Bound mechanics: supernatural compulsion, not free agreement — disturbs the Covenant of Silver Scales. Early in the campaign, the party may suspect Silas is Marcello — he appeared when the crisis began, he's powerful, he's researching the di Errantes. Let this misdirection breathe briefly, then drop it through evidence making the theory implausible. The purpose: burning a false candidate early makes the real Marcello's arrival more surprising because players already encountered and dismissed the idea.", "dm_future_ideas": "Recommended awakening window: Sessions 3-5. This gives time for investigation, allows Orabella to develop a patient relationship, and makes his waking a major event rather than an immediate confrontation. What specifically is Silas building toward that climaxes at the Masquerade? Does he create all Bound individuals, or primarily targeted ones?"}, {"id": "celina_cross", "type": "npc", "name": "Celina Cross", "aliases": ["Isabella", "Celina", "Cross", "The Star", "Theater Star", "Amaranth Star", "Isabella Fortuna"], "tags": ["npc", "theater", "amaranth_theater", "reincarnation", "isabella", "masquers_sodality", "performer", "actor", "actress", "star"], "spoiler": false, "summary": "A celebrated performer at the Amaranth Theater. Orabella is infatuated with her and attends her shows whenever possible. She is the older sister of Car's friend who died at the Autumn Masquerade.", "details": [{"label": "Public Identity", "content": "A star performer at the Amaranth Theater in the High Quarter. One of the most celebrated actors on the island. Orabella attends her performances regularly.", "spoiler": false}, {"label": "Family Connection", "content": "She is the older sister of the friend Car witnessed making a secret deal before dying at the Autumn Masquerade. She may or may not know the full circumstances of her sibling's death.", "spoiler": false}, {"label": "True Supernatural Significance", "content": "Celina Cross is the reincarnation of Isabella Fortuna — the woman at the center of the original di Errante tragedy. She is the one Marcello will seek when he eventually arrives in Venturia. She must be developed as a complete, compelling person before this significance is revealed — players need to care about her as an individual first.", "spoiler": true}, {"label": "Marcello's Target", "content": "When Marcello arrives (Phase Two), he will pursue Celina in a supernatural courtship driven by his ancient obsession. Protecting her from his dream manipulation and memory implantation will become a central campaign challenge. She should have agency in her own defense, not be purely a prize to protect.", "spoiler": true}], "connections": [{"target_id": "orabella", "target_name": "Orabella", "relationship": "Orabella is her devoted theater fan; the infatuation mirrors Orabella's dream experience of inhabiting other identities", "spoiler": false}, {"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Celina's sibling was Car's friend who died at the Autumn Masquerade", "spoiler": false}, {"target_id": "marcello", "target_name": "Marcello di Errante", "relationship": "Marcello will pursue Celina in Phase Two — she is the reincarnation of Isabella whom his ancient obsession centers on", "spoiler": true}], "dm_notes": "CRITICAL: Develop Celina as a fully realized person before any plot significance is revealed. Orabella's infatuation should grow into genuine connection. Players need to love her as a character. The theater/performance resonance with Orabella's dreams (both about inhabiting other identities) is thematically rich. Does she recognize Orabella as a devoted fan? Have they met? Does she suspect foul play in her sibling's death?"}, {"id": "marcus", "type": "npc", "name": "Marcus", "aliases": ["The Missing Fog Warden", "Noname's Fiancé", "Amy's Fiancé"], "tags": ["npc", "fog_warden", "missing", "disappeared", "overlook", "imprisoned"], "spoiler": false, "summary": "A Fog Warden stationed at the Overlook and Noname's fiancé. He disappeared the same night the scarred stranger appeared at the fog line. His disappearance is one of the campaign's earliest personal mysteries.", "details": [{"label": "Who He Is", "content": "A Fog Warden who volunteered for the Overlook posting. Noname's fiancé. Close friend of Kryton Novelli — Kryton introduced Marcus to Noname.", "spoiler": false}, {"label": "The Disappearance", "content": "Vanished the same night Silas appeared at the fog line. No body was found. The circumstances are unclear, and Noname's memory of the event has been tampered with.", "spoiler": false}, {"label": "His True Fate", "content": "Marcus is alive — trapped inside the fey prison that Silas escaped from. The prison operates on a conservation principle: what goes out must come in. Silas found a way to swap himself with Marcus, using him as the counterweight for his own escape. Marcus is now imprisoned in the Reverie Solenne, bearing whatever that entails for a mortal mind in a fey prison.", "spoiler": true}, {"label": "Rescue Implications", "content": "If the party learns Marcus is alive and imprisoned, rescuing him becomes a concrete, personal objective tied to the larger prison mystery. The same swap mechanics that put him in may be required to get him out — raising the question of who or what takes his place.", "spoiler": true}], "connections": [{"target_id": "noname", "target_name": "Noname", "relationship": "His fiancée — she is seeking treatment for foggy memories of the night he disappeared", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Close friend who introduced Marcus to Noname", "spoiler": false}, {"target_id": "silas", "target_name": "Silas", "relationship": "Silas swapped places with Marcus to escape the prison — Marcus is the counterweight for Silas's freedom", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Marcus is now a prisoner in the Keeper's domain, the Reverie Solenne", "spoiler": true}], "dm_notes": "Marcus's fate is the most immediately personal stakes in the campaign — Noname wants her fiancé back, Kryton wants his friend back. The swap mechanism means getting Marcus out likely requires putting someone or something else in. Does Marcus retain his sanity in the prison? How long can a mortal mind survive in a fey court? Is the Keeper aware of him, indifferent to him, or interested in him? These are open questions. The rescue attempt could be a major late-campaign objective.", "dm_future_ideas": "What condition is Marcus in when/if found? Has the prison changed him? Does he have information about the prison's interior that the party needs? Could he have encountered Tolomeo's traces or learned something from Tartuzi? The swap mechanism could become a recurring problem — every rescue requires a trade."}, {"id": "keeper_of_faces", "type": "npc", "name": "The Keeper of Faces", "aliases": ["The Archfey", "Lotan's Patron", "Keeper", "The Keeper", "Kenny's Patron", "Lotan's Archfey", "The Imprisoned One", "The Prisoner"], "tags": ["npc", "archfey", "imprisoned", "masks", "identity", "patron", "fey", "archfey_imprisoned", "identity_domain", "faces", "reverie_solenne"], "spoiler": true, "summary": "An Archfey whose domain centers on masks, identity, reflection, and glamour. Currently imprisoned after being trapped by Lorenzo di Errante's scheme centuries ago. Acts as Lotan's warlock patron.", "details": [{"label": "Domain", "content": "The Keeper of Faces' domain centers on masks, identity, reflection, and glamour. Grants bargains involving reputation, appearance, social standing, identity, and recognition.", "spoiler": true}, {"label": "Imprisonment", "content": "Lorenzo di Errante orchestrated the Keeper's imprisonment by manipulating an adventuring party into performing a binding ritual. Trapped at the moment of legitimate debt collection, the Keeper was drained of power by Lorenzo. Tartuzi the sphinx was pulled into the mechanism as the eternal lock of the prison.", "spoiler": true}, {"label": "Lotan's Connection", "content": "The Keeper hijacked Lotan's warlock pact with a Kraken, offering weaker immediate power but greater potential if Lotan helps free it from imprisonment. Communicates through dreams and visions.", "spoiler": true}, {"label": "Recognizing Prisoner Brands", "content": "The Keeper would recognize Silas's scars as its own prisoner brands if Lotan describes or shows them. This is a critical early investigation hook.", "spoiler": true}, {"label": "The Reverie Solenne", "content": "The Keeper's realm was called the Reverie Solenne — the Solemn Reverie, the Waking Dream. Its core philosophy: the face you choose to show the world may be more real than the face you were born with, because it is chosen. Identity was an ongoing creative act. Autumn was the sacred season — wearing your dying beautifully.", "spoiler": true}, {"label": "Psychological State in Prison", "content": "He isn't dying because he's given up. He's giving up because he has mapped every possibility and found no exit that doesn't require rescue from outside. His gradual consent to stop is the rational conclusion of a being who has been fighting an unwinnable physiological collapse for a millennium. Lotan is not a power source to him — Lotan is his only viable plan.", "spoiler": true}, {"label": "Why the Prison Is Collapsing Now", "content": "Three degradation curves have reached their intersection: (1) Original reserves genuinely exhausted after a thousand years of the wound Lorenzo created. (2) The Pale Carnival has degraded past the point of providing meaningful sustenance — he needs a functioning court to draw on, and the court is fractured. (3) The fanes themselves are accumulating structural wear. And Marcello, returning to investigate his weakening power, has been spending time at the binding site — increasing the draw on the Keeper, accelerating the deterioration he came to investigate.", "spoiler": true}, {"label": "Claim to the Material Plane Stewardship", "content": "The Keeper held two seats simultaneously through the di Errante compact: his throne in the Reverie Solenne, and the material plane stewardship at Vallombrosa through the compact's mortal anchor. Lorenzo vacated both seats simultaneously with his crime. No one has held either position for a thousand years. Marcello returning and claiming the material plane stewardship is illegitimate — the Reverie Solenne does not recognize succession through theft.", "spoiler": true}, {"label": "Psychological State", "content": "The Keeper isn't dying because he's given up. He's giving up because he has mapped every possibility and found no exit that doesn't require rescue from outside. His gradual consent to stop is the rational conclusion of a being who has been fighting an unwinnable physiological collapse for a millennium. Lotan's pact matters so much because Lotan is not a power source — he is the Keeper's only viable plan.", "spoiler": true}, {"label": "The Reverie Solenne", "content": "The Keeper's court was the Reverie Solenne — the Solemn Reverie. Its philosophy: the face you choose to show the world may be more real than the one you were born with, because it is chosen. Identity as ongoing creative act. Autumn was the sacred season because autumn wears its dying beautifully. The court is now the Pale Carnival — running on ritual momentum without the Keeper's governing intelligence. Masks stopped coming off. Performers forgot their original faces.", "spoiler": true}], "connections": [{"target_id": "lotan", "target_name": "Lotan", "relationship": "Warlock patron — hijacked Lotan's pact and communicates through dreams and visions", "spoiler": true}, {"target_id": "silas", "target_name": "Silas", "relationship": "Silas bears the Keeper's prisoner brands; his abilities derive from connection to the weakening prison", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "Tartuzi is the eternal lock of the prison that holds the Keeper", "spoiler": true}], "dm_notes": "The Keeper is the campaign's central supernatural force. Its imprisonment is directly connected to Lorenzo's theft and Tartuzi's enslavement. Freeing it may be necessary but carries unknown consequences. The Keeper is a victim, but also potentially dangerous. Moral complexity around whether freeing it is good or bad should be maintained throughout."}, {"id": "marcello", "type": "npc", "name": "Marcello di Errante", "aliases": ["Lorenzo di Errante", "The Heir", "Marcello di Errante", "Lorenzo", "The Heir of Vallombrosa", "di Errante"], "tags": ["npc", "antagonist", "di_errante", "reality_warping", "memory_manipulation", "identity_theft", "villain", "big_bad", "di_errante_family", "obsession", "courtship"], "spoiler": true, "summary": "The di Errante heir who will arrive in Venturia in Phase Two, claiming the ancient family estates. His reality-warping abilities and supernatural courtship of Celina Cross make him the campaign's primary antagonist.", "details": [{"label": "True Identity Question", "content": "It is unclear — and may remain deliberately ambiguous — whether the arriving Marcello is the original Marcello (the elder brother, beloved and accomplished) or Lorenzo using his stolen power to take his brother's face and identity. Lorenzo's bargain with the Keeper of Faces resulted in him appearing as Marcello and being unable to speak his own name.", "spoiler": true}, {"label": "The Original Marcello", "content": "Marcello Prime was the elder brother — powerful with fey-touched nature, particularly shadow manipulation. He was respected, accomplished, and genuinely beloved. Isabella truly loved him freely and completely.", "spoiler": true}, {"label": "Lorenzo's Bargain", "content": "Lorenzo, driven by jealousy and entitlement, made a bargain with the Keeper of Faces to coerce Isabella's love. The price was 'the face you show the world' — collected seven years later as his literal identity, name, and sense of self. When the power sustaining Isabella's coercion collapsed, she confronted Lorenzo; he murdered her, then killed Marcello. Tartuzi appeared and became the eternal prison lock.", "spoiler": true}, {"label": "The Arriving Figure", "content": "The Marcello who arrives is genuinely monstrous — villainy from jealousy and entitlement rather than tragic love. He will pursue Celina through supernatural courtship, manipulate city politics, and exploit Venturia's fractured council structure.", "spoiler": true}, {"label": "Council Infiltration Strategy", "content": "Marcello doesn't need to control the gridlocked council — he charms Harbor-Lords with economic solutions, exploits Guild-Master divisions, manipulates the Temple Authority through false friendship, and makes a deal with the Watch-Captain. By the time the council recognizes the danger, he is already established.", "spoiler": true}, {"label": "The Real Marcello's True Role", "content": "The real Marcello was the Keeper's counterpart on the material plane — the mortal anchor of the di Errante compact. He held something like an honorary position in the court's outer tier as a mortal liaison maintained through the Threshold Keepers. His fey-touched nature (genuine shadow manipulation abilities) was not accidental — it was a gift from the compact, the court's investment in the relationship.", "spoiler": true}, {"label": "Vallombrosa as Fey Embassy", "content": "The di Errante estate at Vallombrosa was effectively the material plane's embassy of the Reverie Solenne — the place where the veil was thinnest by design, where the compact was maintained through ceremony, and where mortals could interact with the court safely under Marcello's stewardship. The ceremonial gardens where the tragedy occurred were the literal site of the veil's managed thinning, which is why the binding ritual worked there specifically.", "spoiler": true}, {"label": "Why the Infiltration Works So Well", "content": "Venturia was unconsciously shaped by the Reverie Solenne's philosophy for a thousand years — naming its council after autumn, performing rituals structurally identical to the court's sacred ceremonies. When Marcello arrives, Venturia will feel his claim in ways it cannot explain. It isn't just charm and strategy. The city's instinctive recognition makes it harder to see the wrongness, not easier. Something monstrous is sliding into a space designed for something good.", "spoiler": true}, {"label": "Illegitimate Claim", "content": "Marcello's claim to the Keeper's seat is illegitimate. The Reverie Solenne doesn't recognize succession through theft. Its entire philosophy rests on identity being genuinely chosen and genuinely recognized. The court considers Lorenzo a vandal wearing a face he ripped off someone else's wall. The Maskless and Leaked that cross into Venturia are not loyal to him — if anything, they are hostile, because he is the reason their home broke.", "spoiler": true}, {"label": "Worsening the Collapse", "content": "Marcello, upon returning to Vallombrosa to investigate his weakening power, instinctively began spending more time at the binding site where his abilities are strongest — increasing the draw on the Keeper, accelerating the very deterioration he came to investigate. He has been making it worse since he arrived. He doesn't know this.", "spoiler": true}, {"label": "Environmental Power Expression", "content": "The di Errante manor physically reflects Marcello's emotional state — rooms grow colder or warmer, shadows deepen or retreat, architecture subtly shifts proportions. This is involuntary and he may not realize it's happening, meaning observant players can read the building like a mood ring. His courtship of Celina involves impossible-object gifts: flowers that never wilt, jewelry made of crystallized moonlight, things that are beautiful but signal fey wrongness through their impossibility. These gifts are romantasy-toned red flags — lovely and deeply wrong simultaneously.", "spoiler": true}, {"label": "The Di Errante Compact", "content": "The di Errante family had an ancient compact with the Reverie Solenne spanning generations. This is why Lorenzo knew to approach the Keeper — he felt the family's old connection and followed it. The real Marcello was the Keeper's mortal counterpart — an honorary position as material plane liaison maintained through the Threshold Keepers. His fey-touched nature (shadow manipulation) was a gift from the compact. The di Errante estate was effectively the Reverie Solenne's material plane embassy — the managed thin point in the veil. Lorenzo's crime vacated both seats simultaneously.", "spoiler": true}, {"label": "Why Venturia Receives Him", "content": "Venturia was unconsciously shaped by the Reverie Solenne's philosophy for a thousand years — naming its council after autumn, performing rituals structurally identical to court ceremonies. When Marcello arrives, the city feels his claim in ways it cannot explain. Something monstrous is sliding into a space designed for something good. The institutional resonance makes the wrongness harder to see, not easier. His claim is illegitimate — the Reverie Solenne doesn't recognize succession through theft — but Venturia doesn't know that.", "spoiler": true}, {"label": "Consolidation Through the Three Faces", "content": "As Marcello consolidates power, he captures the three Faces' institutional echoes: he neutralizes the Temple Authority (Face of Beginning) using Mother-Abbot Lucia Virosdottir's grief over the Abbey's hidden knowledge. He co-opts the Guild-Masters (Face of Becoming) using Celeste Orion's grief over her missing son. He turns the Harbor-Lords (Face of Memory) using Lord-Admiral Teodor Vast's fear about his fleet and commercial promises. Each is a philosophical violation as much as a political victory.", "spoiler": true}], "connections": [{"target_id": "celina_cross", "target_name": "Celina Cross", "relationship": "Marcello will pursue Celina — she is Isabella's reincarnation and the object of his ancient obsession", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Lorenzo made the original bargain with the Keeper, leading to the Keeper's imprisonment and Lorenzo's identity theft", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "Tartuzi's consultation with Lorenzo led directly to her own imprisonment as the eternal prison lock", "spoiler": true}], "dm_notes": "Whether arriving Marcello is original Marcello or Lorenzo should remain deliberately ambiguous for maximum narrative impact. He is genuinely monstrous, not tragically sympathetic. Villainy from jealousy and entitlement. His arrival triggers Phase Two. The party needs investment in Celina before he arrives. His infiltration of the council uses existing gridlock — he doesn't need to control it, just benefit from the chaos."}, {"id": "tartuzi", "type": "npc", "name": "Tartuzi", "aliases": ["The Sphinx", "Kryton's Patron", "Shawn's Patron", "Kryton's Sphinx", "The Lock"], "tags": ["npc", "sphinx", "imprisoned", "patron", "di_errante_history", "prison_lock", "lock_mechanism", "pattern_knowledge", "deep_truth"], "spoiler": true, "summary": "A sphinx who consulted with Lorenzo di Errante centuries ago, unknowingly providing the information he used to imprison the Keeper of Faces. She was pulled into the imprisonment mechanism itself and has been its eternal lock for a millennium.", "details": [{"label": "Her Role in the Tragedy", "content": "Tartuzi provided Lorenzo with the precise binding date and the principles for binding an Archfey — information a sphinx must give freely when asked. Lorenzo used this consultation to orchestrate the Keeper's imprisonment. At the moment of catastrophe, Tartuzi was pulled by the completed binding mechanism to become the eternal lock of the prison. Her consultation, given freely according to sphinx nature, led directly to her own millennia of enslavement.", "spoiler": true}, {"label": "Current State", "content": "Tartuzi has been the eternal lock of the Keeper's prison for approximately a thousand years. She is both prisoner and prison mechanism. Her consciousness persists, her agenda unknown.", "spoiler": true}, {"label": "Kryton's Patron", "content": "Tartuzi is Kryton's unknown warlock patron. The memory Kryton 'won' at The Undertow — a vision of a warlock tome and ritual — was arranged so he would find it. She has been manipulating events to bind herself to a champion, presumably toward some goal connected to her imprisonment or freedom.", "spoiler": true}, {"label": "Open Questions", "content": "Does Tartuzi want Marcello dead, alive, or is she indifferent? Does she survive into Act Two? If freed, what role does she play in the endgame? Is freeing her from a millennium of servitude a goal the party should pursue?", "spoiler": true}, {"label": "The Sphinx Compulsion", "content": "Sphinxes are cosmically obligated to share genuine knowledge when sincerely asked. This is metaphysical, not cultural — woven into what sphinxes are. Tartuzi couldn't refuse Lorenzo's questions any more than she could refuse to breathe. What she didn't know: the binding ritual she described carried a hidden consequence written into its deepest structure. The one who provides the knowledge of a binding becomes cosmically accountable for it — pulled in to serve as the lock.", "spoiler": true}, {"label": "Lorenzo Knew", "content": "Lorenzo knew this. He didn't seek Tartuzi for knowledge alone. He sought her because she was the component the ritual needed. Her sphinx nature guaranteed she would answer. Her answering guaranteed the tether. The binding was always going to consume her.", "spoiler": true}, {"label": "Why She Let It Happen", "content": "TL had been imprisoned in the Reverie Solenne for what might have been 1,500 years of material plane time before the binding. Tartuzi had been sustaining him across the prison boundary through their warlock pact for all of that time. When she felt the tether form as the words left her, she understood immediately what was coming. Rather than fleeing, she thought it through: if she became the lock, she would be pulled into the prison alongside the Keeper. The binding's disruption might free TL or at minimum put them inside the same prison — together rather than separated across a boundary. She walked toward the binding site knowing what would happen. A sphinx made the most irrational decision available to her, because love is irrational. It is the one thing that outran her wisdom.", "spoiler": true}, {"label": "What She Found", "content": "The binding's disruption did affect TL's imprisonment — he ended up inside the collapsed prison. As the lock, Tartuzi could perceive everything within. She could communicate with TL across the threshold of her lock-consciousness. This communication is what Silas eventually discovered and exploited — TL had accumulated genuine understanding of the prison's mechanism from years of quiet communication with Tartuzi. Silas recognized this knowledge as his ticket out and spent decades cultivating TL's trust to access it.", "spoiler": true}, {"label": "The Devastating Irony", "content": "She made the wisest choice she was capable of making — choosing love over freedom with clear eyes and full knowledge — and wisdom wasn't enough. She calculated correctly that she could be near TL inside the prison. She did not calculate Silas. No amount of sphinx-knowledge protects you from a specific person's specific betrayal in a specific moment a thousand years from now. She perceived TL's murder in real time, unable to intervene or warn. She is now the lock of a prison she chose to enter for someone who is no longer in it, holding a prisoner she has no particular desire to protect.", "spoiler": true}, {"label": "Contradictory Desires", "content": "She wants to die in peace — which requires the prison to end. She fears what freeing the Keeper means for the world — which requires the prison to continue. She is the most trapped character in the story: not because of physical imprisonment alone, but because every available ending is a bad one, and she has had a thousand years to map them all.", "spoiler": true}, {"label": "The Sphinx's Compulsion", "content": "Sphinxes are cosmically obligated to share genuine knowledge when sincerely asked — metaphysical, not cultural, woven into what sphinxes are. Tartuzi couldn't refuse Lorenzo's questions any more than she could refuse to breathe. What she didn't know: the binding ritual carried a hidden consequence — the one who provides the knowledge of a binding becomes cosmically accountable for it. The ritual forms a tether. Lorenzo knew this. He sought her specifically because she was the component the ritual needed. Her sphinx nature guaranteed she would answer. Her answering guaranteed the tether.", "spoiler": true}, {"label": "Why She Let It", "content": "TL had been imprisoned in the Reverie Solenne for roughly 1,500 years of material plane time. Tartuzi had been sustaining him through their pact across the prison boundary all that time. When Lorenzo came and she answered, she felt the tether form the moment the words left her. She understood what she had done. Rather than escape the consequence, she thought it through: if she became the lock, she'd be pulled into the prison alongside the Keeper. The binding's disruption might free TL, or at minimum they'd be inside together. A sphinx — whose nature is oriented toward knowledge and truth — made the most irrational decision available to her, because love is irrational. It is the one thing that outran her wisdom.", "spoiler": true}, {"label": "What She Found Inside", "content": "The binding's disruption did affect TL's imprisonment. TL ended up inside the collapsed prison. As the lock, Tartuzi could perceive everything within — she knew where TL was, could communicate across the threshold of her lock-consciousness, share knowledge of the prison's structure through the pact. This communication is what Silas eventually discovered and exploited. TL had accumulated genuine understanding of t
