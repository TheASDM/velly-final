d finds the self-fulfilling prophecy note should be a gut-punch table moment. Build toward it carefully — establish Silas's Bound as genuinely dangerous first so the party has reason to act decisively, then introduce the tragedy. Open question: does Silas create ALL Bound, or are most caused by the weakening prison with Silas creating only targeted ones?"}, {"id": "the_leaked", "type": "lore", "name": "The Leaked", "aliases": ["Leaked", "Leaked Entities", "Reality Glitches"], "tags": ["supernatural_threat", "prison_degradation", "escalation", "fey_creatures", "combat_encounters", "reality_distortion"], "spoiler": false, "summary": "Supernatural entities manifesting as the Pale Carnival spills through cracks in the Archfey's prison. NOT servants of the Keeper — they are contents of a degraded fey court crossing into the material plane without context or coherence. They escalate from atmosphere to Maskless fey to architectural overlap.", "details": [{"label": "Nature — Pale Carnival Spillage", "content": "The Leaked are not random reality glitches. They are contents of the Pale Carnival spilling through cracks in the prison. When the Archfey's imprisonment weakens, the walls between the fractured Carnival and the material plane thin, and whatever is on the other side seeps through without context or coherence. They are not Silas's responsibility and not loyal to Marcello — if anything, the Maskless are hostile to him because he is the reason their home broke.", "spoiler": true}, {"label": "Early Phase — Atmosphere Leaking", "content": "The Carnival's atmosphere bleeding through. Animals that feel wrong have briefly passed through a reflection of the Pale Carnival and come back wearing their own faces awkwardly. Shadow wisps are trailing edges of masquerade costumes from the other side, present in Venturia without any body attached.", "spoiler": false}, {"label": "Middle Phase — The Maskless", "content": "Fey who lost their identity in the fractured Carnival, stumbling through tears in reality. They try to wear the identities of people they encounter — mimicking speech, posture, mannerisms — making encounters deeply unsettling before any combat begins. Not evil, just desperately hungry for identity. Witnesses report the creature 'looked like it was practicing being me.'", "spoiler": true}, {"label": "Late Phase — Architectural Overlap", "content": "The actual architecture of the Pale Carnival briefly overlapping with Venturia. City districts might wake to canals running the wrong direction, every mirror in a neighborhood showing wrong seasonal colors, music playing from no source that follows specific people. To players who've built up knowledge of the Pale Carnival, these events read as legible: the prison wall is nearly gone.", "spoiler": true}, {"label": "Lotan's Unique Window", "content": "Lotan's patron is imprisoned in the Pale Carnival. The Keeper may send warnings or pleas specifically when a Leaked entity is nearby, because to the Keeper, each one represents his home falling apart.", "spoiler": true}], "connections": [{"target_id": "reverie_solenne", "target_name": "The Reverie Solenne / Pale Carnival", "relationship": "The Leaked are the Pale Carnival's contents spilling into the material plane", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Each Leaked entity represents further degradation of the Keeper's domain", "spoiler": true}, {"target_id": "fey_folk_types", "target_name": "The Three Fey Folk Types", "relationship": "The Maskless are the primary middle-phase Leaked entities", "spoiler": true}, {"target_id": "the_fanes", "target_name": "The Three Fanes", "relationship": "Destroying fanes accelerates Leaked manifestations", "spoiler": true}], "dm_notes": "The Leaked reframed as Pale Carnival spillage gives them narrative coherence — they're not random, they're the contents of a dying fey court. The three phases map to the prison's degradation curve. The Maskless are the signature encounter type: play them as uncanny valley horror before combat. Late-phase architectural overlap is the campaign's visual indicator that the endgame is approaching. Lotan gets unique patron communication during Leaked encounters — use this for exposition and personal stakes."}, {"id": "false_memory_mechanism", "type": "lore", "name": "The False Memory Mechanism", "aliases": ["Memory Manipulation", "Memory Erosion", "The Venturia Effect", "Reality Rewriting"], "tags": ["marcello_power", "memory", "identity", "vallombrosa_residents", "venturia_effect", "timeline", "resistance", "act_two"], "spoiler": true, "summary": "When Marcello claims Vallombrosa, his reality manipulation rewrites memory and identity across both Vallombrosa and Venturia. Vallombrosa's population gains false lifetimes. Venturians gradually forget the transformation happened. The party has roughly one month before the city fully accepts Vallombrosa as always having existed.", "details": [{"label": "Vallombrosa Residents — Initial State", "content": "Two categories. The majority have complete false memories — entire lifetimes in Vallombrosa, childhoods, families, businesses. No memory of entering the fog. A minority have dual memories — they remember BOTH entering the fog AND living in Vallombrosa. Both sets feel equally real, creating profound psychological terror.", "spoiler": true}, {"label": "The Erosion Process", "content": "Dual-memory individuals try to flee but encounter mundane-seeming obstacles: ships booked, weather delays, bureaucratic requirements, obligations from false-memory lives. Each delay keeps them longer. Days 1-2: original memories primary. Days 3-5: both equally real. Days 6-10: false memories strengthening. Days 11-20: original memories becoming dreamlike. After day 21: original memories vanish entirely.", "spoiler": true}, {"label": "The Venturia Effect", "content": "Memory manipulation extends beyond Vallombrosa's boundaries, slower and more subtle. Days 1-3: people clearly remember transformation. Days 4-14: creeping doubt, impossible memories of shopping in Vallombrosa months ago. Days 15-30: false memories dominate, evidence seems wrong. After day 30: complete integration, everyone remembers Vallombrosa as always having existed. Physical evidence either vanishes or gets reinterpreted.", "spoiler": true}, {"label": "Party Resistance", "content": "PCs are more resistant (witnessed transformation directly, strong investment in truth, each other for reality-checking). But they should FEEL the pressure — occasional moments of doubt, NPCs confidently contradicting them, personal notes containing false references, dreams of visiting Vallombrosa years ago. They must actively maintain truth against easier false memories.", "spoiler": true}, {"label": "Campaign Implications", "content": "Limited time window (~1 month) before Venturia fully accepts Vallombrosa. Social isolation increases as allies' memories rewrite. Physical evidence vanishes or edits itself. Relationship strain as NPCs dispute the party's memories. Moral questions: if someone has complete false memories of a lifetime, are those memories real for them? Is it cruel to force them to remember a past they no longer identify with?", "spoiler": true}, {"label": "Table Techniques for Running Memory Pressure", "content": "Specific methods for making players feel the pressure even though their characters resist it: describe occasional unprompted moments of doubt about whether Vallombrosa 'just appeared' or was 'always there.' Have trusted NPCs confidently contradict the party's accurate memories in casual conversation. Let players find their own journal entries or personal notes that now contain references to visiting Vallombrosa before its transformation. Describe dreams of shopping in Vallombrosa years ago, attending events there, having childhood memories of the place. Force the active choice — 'you have to consciously remind yourself this isn't real' — rather than letting resistance feel automatic or free.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "His stolen Archfey power drives the false memory mechanism", "spoiler": true}, {"target_id": "vallombrosa", "target_name": "Vallombrosa", "relationship": "The transformed zone where false memories are strongest and fastest", "spoiler": true}], "dm_notes": "The false memory mechanism is Act Two's ticking clock. The one-month timeline creates urgency without being punitive — the party has time to investigate but can't dawdle. Use NPC memory erosion as emotional beats: an ally who was outraged by Vallombrosa's appearance now casually refers to 'always' shopping there. The mundane obstacles preventing dual-memory people from fleeing should feel infuriatingly plausible, not obviously magical."}, {"id": "impossible_choice", "type": "lore", "name": "The Impossible Choice", "aliases": ["The Central Dilemma", "Campaign Endgame Dilemma"], "tags": ["endgame", "moral_complexity", "archfey_release", "heroic_sacrifice", "negotiation", "player_agency", "resolution"], "spoiler": true, "summary": "Defeating Marcello isn't simple — his existence maintains the prison keeping the Archfey sealed. Kill him and the Archfey is freed. The Archfey was betrayed and has every right to be vengeful, but a freed entity with millennia of accumulated rage could be catastrophic. The campaign presents multiple imperfect resolutions without dictating which is correct.", "details": [{"label": "The Core Problem", "content": "Marcello's existence and stolen power maintain the prison. If Marcello dies, the lock breaks and the Archfey is freed. The Archfey committed no crime justifying imprisonment — it was betrayed and robbed during legitimate contract fulfillment. It has every right to be vengeful. But it might be genuinely dangerous if released with millennia of accumulated rage.", "spoiler": true}, {"label": "Resolution: Heroic Sacrifice", "content": "Someone takes Marcello's place as the lock, maintaining the prison through personal sacrifice. Allows Marcello's destruction while preventing Archfey release. Could be a PC or beloved NPC. Creates questions about whether destroying evil is worth eternal imprisonment of an innocent.", "spoiler": true}, {"label": "Resolution: Negotiation with the Archfey", "content": "The party works to genuinely free the entity without catastrophe. Requires understanding fey law, discovering original contract details, possibly completing quests to satisfy legitimate grievances, helping the Archfey understand revenge perpetuates the cycle, and finding ways to sever Lorenzo's power without transferring the lock.", "spoiler": true}, {"label": "Resolution: Maintaining Status Quo", "content": "The party decides current injustice is preferable to risks of change. Can't free the Archfey regardless of its innocence. Can't destroy Marcello without triggering catastrophe. Find ways to limit his harm while leaving the fundamental situation unchanged. Deeply unsatisfying but raises questions about pragmatic wisdom versus moral cowardice.", "spoiler": true}, {"label": "Resolution: Creative Solutions", "content": "Players discover alternatives through investigation, magical research, bargaining with powerful entities, or creative application of accumulated resources and knowledge. The campaign should reward clever thinking and thorough preparation with possibilities not explicitly laid out.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "His death breaks the prison lock", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The imprisoned entity that would be freed", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "Marcello's death also frees her from millennia of enslavement", "spoiler": true}, {"target_id": "the_fanes", "target_name": "The Three Fanes", "relationship": "Destroying all fanes is prerequisite for defeating Marcello", "spoiler": true}], "dm_notes": "This dilemma should emerge through play, not be presented as a menu. Players should discover the interconnections gradually — first learning about the fanes, then about the prison mechanism, then about what happens if Marcello dies. By the time they understand the full picture, they should feel the weight of every option. The goal is resolution that feels earned through choices rather than predetermined by narrative."}, {"id": "power_gradient", "type": "lore", "name": "Marcello's Power Gradient", "aliases": ["Power Levels", "Geographic Power Gradient"], "tags": ["marcello_power", "venturia", "vallombrosa", "binding_site", "tactical", "combat", "archfey_deterioration"], "spoiler": true, "summary": "Marcello's stolen power operates on a geographic gradient — limited and costly in Venturia, substantially stronger in Vallombrosa, near-absolute at the original binding site. This creates strategic options for the party about when and where to engage him.", "details": [{"label": "In Venturia", "content": "Supernatural abilities but limited and costly. Reality manipulation is exhausting and temporary. Memory alteration works on individuals rather than masses. Coercion requires proximity and time. Can defend himself but isn't invincible. Must be strategic about power use.", "spoiler": true}, {"label": "In Vallombrosa", "content": "Power increases substantially within his claimed estates. Reality manipulation becomes easier and more extensive. Memory alteration affects everyone within bounds automatically. Supernatural presence is pervasive and harder to resist. Can observe and influence events throughout the territory. Combat becomes significantly more dangerous.", "spoiler": true}, {"label": "At the Binding Site", "content": "The courtyard/garden where Isabella died — Marcello is at full power. Abilities rival what he possessed immediately after the theft. Nearly unstoppable in direct confrontation. Reality itself bends to his will. This is the last place the party should fight him without significant preparation.", "spoiler": true}, {"label": "Why He's Weakening", "content": "The Archfey's dying state drains the stolen power. As the entity gives up and begins ceasing to exist, the stolen power deteriorates. This brought Marcello back to Vallombrosa after millennia of wandering — he returned to investigate why his power was weakening. There he discovered both the deteriorating prison and Celina's presence.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "His power operates on this gradient", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The dying Archfey is the source of power deterioration", "spoiler": true}], "dm_notes": "The power gradient is the key tactical framework for the entire campaign. It explains why Marcello doesn't simply dominate everything — he's weaker in Venturia where most of Act One occurs. His pursuit of Celina requires operating where he's more vulnerable. After claiming Vallombrosa, the party must be strategic about engaging him there versus luring him out. The binding site should be the final boss arena only after all fanes are destroyed."}, {"id": "vallombrosa_transformation", "type": "lore", "name": "Vallombrosa's Transformation", "aliases": ["The Threshold Moment", "Marcello's Claim", "The Masquerade Arrival"], "tags": ["act_two", "marcello_arrival", "masquerade", "threshold", "barovia_parallel", "population", "fog_change"], "spoiler": true, "summary": "When Marcello claims the di Errante estates, Vallombrosa transforms from cursed dead zone to functional — but eerie — town. The fog thins to perpetual twilight, structures restore to unsettling perfection, and a population appears with false memories of always having lived there. This is the Act One to Act Two transition.", "details": [{"label": "The Arrival (Recommended)", "content": "Ideally during the Autumn Masquerade Ball. Silas makes his final move. The party fights him. At the climactic moment, Marcello appears and effortlessly defeats Silas, demonstrating power far beyond anything encountered. He reveals identity as 'Marcello, descendant of the third di Errante brother,' produces documentation, and invites everyone to continue the celebration at his family's ancestral home.", "spoiler": true}, {"label": "Physical Transformation", "content": "The fog remains but thins to ~50 feet visibility, creating perpetual twilight. The manor and estate structures restore to beautiful functionality. Streets and buildings appear intact and elegant. Everything has a slightly unreal quality — too perfect, too clean, subtly wrong. Plants grow but pale and strange. Water flows. The place becomes livable but persistently unsettling.", "spoiler": true}, {"label": "The Population", "content": "Simultaneously, Vallombrosa gains residents who seem to have always been there — the people who disappeared into the fog over the past millennium, now manifested as functional community members with complex false memories. They provide NPCs, information sources, potential allies, and civilians who need protection. This gives Vallombrosa the feeling of a living community essential for the Barovia-like structure.", "spoiler": true}, {"label": "Campaign Structure Shift", "content": "Act Two operates like modified Curse of Strahd. Vallombrosa is Marcello's domain — power strongest here, influence pervasive, control near-absolute. Perpetual fog and twilight. Functional but eerie. Leaving feels difficult (confusing navigation, looping roads). The di Errante estate and surrounding structures provide iconic locations with environmental storytelling and tactical significance.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "Claims the estates and triggers the transformation", "spoiler": true}, {"target_id": "vallombrosa", "target_name": "Vallombrosa", "relationship": "The zone that transforms", "spoiler": true}, {"target_id": "false_memory_mechanism", "target_name": "The False Memory Mechanism", "relationship": "The transformation triggers the memory rewriting process across both Vallombrosa and Venturia", "spoiler": true}], "dm_notes": "This is the campaign's biggest set piece and the threshold between two very different play experiences. The heroic entrance is critical — Marcello MUST feel like a savior, not a threat. The horrible irony: the party's hard-fought victories against Silas cleared the path for something far worse. Take at least a full session for the transformation itself — let players explore the changed Vallombrosa and meet the population before the sinister undertones become clear."}, {"id": "eldoria_history", "type": "lore", "name": "Pre-Great Reunion History of Eldoria", "aliases": ["Eldoria History", "The Sealed Continents", "The Shroud", "Church of the Nine", "The Great Reunion", "The Last Wrongs"], "tags": ["world_history", "eldoria", "eldyrin", "church_of_the_nine", "true_pantheon", "great_reunion", "the_shroud", "last_wrongs", "vecna", "orcus", "background"], "spoiler": false, "summary": "For nearly five thousand years, the landmass of Eldoria was sealed from the wider world of Eldyrin by a catastrophe of its own making. Rulers fabricated nine false gods to wrest power from the true pantheon, and millions directing spiritual energy at nonexistent deities caused the continents to seal behind impassable fog. Inside, civilization thrived under the Church of the Nine's authority — until adventurers called the Last Wrongs exposed the fraud and broke the isolation. This is the cosmological context for the world Vallombrosa exists in.", "details": [{"label": "The World Before", "content": "Eldoria was a region of the wider world of Eldyrin — diverse nations including the militaristic Vurgorim, the fairy kingdom of Jovirim, the merchant republic of Thornehold, the Sylvan elf territories of Sulkwood, the Druid Freeholds, the half-orc territories of Yaephegor, and various island nations. Gods walked in mortal affairs. Clerics drew real power from real sources.", "spoiler": false}, {"label": "The Tribunal of Cloudstone (Year 1 BN)", "content": "Rulers of every major Eldorian power gathered in Cloudstone, Thornehold, to address divine influence over mortal affairs. Rather than negotiate with the gods, they fabricated nine gods from whole cloth — the Church of the Wheel, later the Church of the Nine — and collectively suppressed all mention of the true pantheon. The cynical logic: if people stopped praying to real gods, those gods would lose influence. What no one anticipated: millions redirecting spiritual energy to nonexistent gods caused the true deities to withdraw. The seas became impassable. Eldoria sealed itself from the world.", "spoiler": false}, {"label": "The Age of the Church (Year 1-4800 YN)", "content": "For nearly five millennia, Eldoria operated in isolation under the Church of the Nine. The fabricated religion became the dominant force. The true gods — dismissed as 'the Defeated Gods' — were reduced to heresy. But the Church wasn't without function: it reduced warfare, established legal frameworks, built institutions. And the true gods never fully disappeared — they channeled power through gaps in the false theology, patiently waiting.", "spoiler": false}, {"label": "The Final Crisis", "content": "Multiple threats converged: Vecna, a wizard of terrible ambition, attempted to use the Tome of Undeath to bring Orcus to the material plane. Against him stood the Last Wrongs — a group of adventurers including a half-elf druid who was secretly heir to Jovirim, a tiefling cleric, a sylvan elf sorceress, a half-orc paladin, and a goliath barbarian. Vecna was ultimately destroyed by heroes from Faerûn who crossed into the sealed continents. In the aftermath, High Inquisitor Thalia Mordaine militarized the Church to consolidate power. Thousands of years of belief had created the Manifestation of the Nine — an entity of pure concentrated false-divine power — which Thalia intended as her theocracy's divine engine.", "spoiler": false}, {"label": "The Great Reunion", "content": "The Last Wrongs defeated the Manifestation of the Nine at Eacromar. The Church's authority collapsed. Clerics noticed prayers felt different — fuller, more resonant. The impassable seas thinned and lifted. Ships from Faerûn and other Eldyrin regions sailed through for the first time in five millennia. The Great Reunion was a decade-long process of first contact, cultural shock, and theological reorientation. The true pantheon was reestablished alongside the Church's legacy institutions. Eldoria was changed irrevocably.", "spoiler": false}, {"label": "Relevance to Vallombrosa", "content": "The Vallombrosa campaign takes place in the post-Reunion world, on the island of Maeve within Eldoria. The Last Wrongs were a previous campaign — some Vallombrosa players participated. The restored true pantheon is the theological context for clerics, warlocks, and divine magic. The Great Reunion's theme of manufactured belief vs. genuine truth mirrors Vallombrosa's themes of false memory vs. real identity.", "spoiler": false}], "connections": [{"target_id": "campaign_overview", "target_name": "Campaign Overview", "relationship": "Vallombrosa takes place in the post-Reunion world of Eldoria", "spoiler": false}], "dm_notes": "This is background context, not active campaign content. Most players already know this history from the previous campaign. The key relevance: the post-Reunion theological landscape explains why the true pantheon exists alongside institutional religion, why Lotan can have a genuine Archfey patron, and why the Church of the Nine's legacy institutions still operate. The thematic parallel — rulers who fabricated gods to control people, Lorenzo who fabricated an identity to possess someone — is there if you want it but doesn't need to be made explicit."}, {"id": "reverie_solenne", "type": "lore", "name": "The Reverie Solenne and the Pale Carnival", "aliases": ["Reverie Solenne", "Solemn Reverie", "Waking Dream", "Pale Carnival", "The Fey Court", "Liminal Deep"], "tags": ["fey_realm", "keeper_of_faces", "court_structure", "identity", "masks", "autumn", "reflections", "mirrors", "still_water", "domain_collapse"], "spoiler": true, "summary": "The Keeper of Faces' fey court, once called the Reverie Solenne — where identity was an ongoing creative act and the face you chose to show was considered more real than the one you were born with. After the Keeper's imprisonment, outsiders named the degraded remnant the Pale Carnival: a hollow masquerade running on ritual momentum without the substance beneath.", "details": [{"label": "The Reverie Solenne — What It Was", "content": "Under the Keeper of Faces, the court was known as the Reverie Solenne — the Solemn Reverie, the Waking Dream. Its central paradox: everything was both performance and completely sincere. The Keeper's philosophy held that the face you choose to show the world is not less real than the one you were born with — it may be more real, because it is chosen. Identity was an ongoing creative act, not a fixed inheritance. Autumn was the sacred season, because autumn wears its dying beautifully — the highest expression of identity: performing your truest self at the moment of greatest vulnerability.", "spoiler": true}, {"label": "The Pale Carnival — What It Became", "content": "A eulogy, not a title. Coined by outsiders and grieving subjects after the Keeper's imprisonment. Pale for colorless. Carnival because it still resembles a celebration if you don't look carefully. Without the Keeper's governing intelligence, the court continued on ritual momentum — the masquerade kept running, but hollowed out. Masks stopped coming off at the end of the night. Performers began forgetting their original faces. Empty performance without the substance beneath.", "spoiler": true}, {"label": "The Liminal Deep — How the Realms Connect", "content": "The fey realm doesn't exist somewhere else — it bleeds through still water and mirrors. Every canal in Venturia, every polished surface, every rain puddle at night is a potential window into what fey call the Liminal Deep and scholars call the Pale Carnival's reflection. This is why Venice-inspired Venturia feels uncanny: it is a city built on reflections, where the real and its mirror image coexist constantly. The veil is thinnest at Vallombrosa, where the di Errante compact maintained it intentionally. That managed thinness now has no manager.", "spoiler": true}, {"label": "Court Structure — Functions of Identity", "content": "The court organized around functions of identity, not feudal hierarchy. The Keeper of Faces was sovereign. Below him: the three Faces Primordial (regents) — the Face of Beginning (identity as given: origin, birth, inheritance), the Face of Becoming (chosen identity: labor and will), and the Face of Memory (identity as perceived: reputation, legacy, what persists). They formed a philosophical tripartite council. The Masquers of Standing were court nobility — earned, not inherited, positions based on demonstrated understanding of identity's complexity. Stagnation was the court's closest equivalent to sin. The Revelers were general citizens — free, creative, joyful.", "spoiler": true}, {"label": "Specialized Court Roles", "content": "The Weavers of Thread were archivists and contract-keepers who maintained records of every bargain and identity transaction. The court's solemn bureaucrats. The Threshold Keepers were border agents who managed crossings between the Reverie Solenne and the material plane, maintained relationships with mortal families, and ensured compact terms were honored. Both roles have material-plane institutional descendants in Venturia.", "spoiler": true}], "connections": [{"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "Sovereign of the Reverie Solenne; his imprisonment caused its collapse into the Pale Carnival", "spoiler": true}, {"target_id": "venturia", "target_name": "Venturia", "relationship": "Venturia's institutions are unconscious echoes of the court's structure, seeded by Threshold Keepers over centuries", "spoiler": true}, {"target_id": "ancient_tragedy", "target_name": "The Ancient Tragedy", "relationship": "Lorenzo's crime vacated both the Keeper's throne and the material plane stewardship simultaneously", "spoiler": true}], "dm_notes": "The Reverie Solenne's philosophy — that chosen identity is more real than inherited identity — is the campaign's deepest thematic engine. Marcello/Lorenzo is the ultimate violation: he wears a stolen identity, not a chosen one. The court-to-Venturia institutional mapping gives players a way to understand the fey realm through familiar structures. Don't info-dump the court structure; let it emerge as they learn about the Pale Carnival through investigation and Lotan's patron connection."}, {"id": "court_venturia_mapping", "type": "lore", "name": "The Court's Echo in Venturia", "aliases": ["Fey Institutional Echoes", "Court Mapping"], "tags": ["fey_realm", "venturia", "threshold_keepers", "government", "autumn_council", "unconscious_echoes"], "spoiler": true, "summary": "Venturia's institutions are unconscious echoes of the Reverie Solenne. The Threshold Keepers spent centuries seeding the city with reflections of the court's philosophy. Mortals who built these institutions thought they were inventing practical governance — they were re-creating a structure they felt was correct without knowing why. This is why Marcello's arrival feels so right to the city: it was shaped to receive the real Marcello.", "details": [{"label": "The Mapping", "content": "Face of Beginning → Temple Authority (identity as given, divine inheritance). Face of Becoming → Guild-Masters (institutions of transformation — apprentice to master). Face of Memory → Harbor-Lords (trade as memory — contracts, reputation, legacy). Masquers of Standing → Masquers' Sodality (earned recognition, governance of the Masquerade). Weavers of Thread → Covenant Archive (binding contracts, the weight words carry). Threshold Keepers → The Veil Court (remembers it was supposed to guard something but has forgotten what). The Autumn Masquerade descends directly from the Reverie Solenne's signature celebration — the mortal tradition of revealing your face at midnight is a corruption of the court practice where you revealed your mask (your chosen face).", "spoiler": true}, {"label": "Why Marcello Fits So Easily", "content": "Venturia — unconsciously shaped by the Reverie Solenne's philosophy for a thousand years, naming its council after autumn, performing rituals structurally identical to court ceremonies — feels Marcello's claim in ways it cannot explain. Something monstrous is sliding into a space designed for something good. The city's instinctive recognition makes it harder to see the wrongness, not easier. His claim to the Keeper's seat is illegitimate — the Reverie Solenne doesn't recognize succession through theft — but Venturia doesn't know that.", "spoiler": true}, {"label": "The Eleventh Seat", "content": "The Watch-Captain/rotating Chair position has no fey equivalent. It's a purely mortal invention, which explains why Thora Ironmark is the most pragmatic and least susceptible to Marcello's supernatural influence.", "spoiler": true}], "connections": [{"target_id": "reverie_solenne", "target_name": "The Reverie Solenne", "relationship": "Venturia's institutions are echoes of this court structure", "spoiler": true}, {"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "The council structure unconsciously mirrors the court's organization", "spoiler": true}, {"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "The city was shaped to receive the real Marcello — Lorenzo exploits this", "spoiler": true}], "dm_notes": "This mapping gives Act Two investigation a structural throughline — as the party learns about the Reverie Solenne, they can map its roles to Venturia's institutions and understand WHY the city is so receptive to Marcello. The Veil Court connection is the most actionable: an institution that remembers it was supposed to guard something. Thora's immunity is the practical takeaway — the one council member who can't be charmed by the institutional resonance."}, {"id": "fey_folk_types", "type": "lore", "name": "The Three Fey Folk Types", "aliases": ["Carnival Fey", "The Maskless", "Fey Types"], "tags": ["fey_creatures", "brownies", "carnival_fey", "maskless", "leaked", "horror", "identity"], "spoiler": true, "summary": "Three types of fey connected to the Pale Carnival. Brownies are ancient household spirits from the di Errante compact. Carnival Fey are court citizens who cross through during the Masquerade. The Maskless are fey who lost their identity entirely — the horror element among the Leaked.", "details": [{"label": "Brownies — Sacred Covenant", "content": "Ancient fey who crossed from the Liminal Deep generations ago when the di Errante estate was thriving. Essentially household spirits who maintained the relationship between the mortal family and the Reverie Solenne. The brownies enslaved in Vallombrosa (Roxy's hook) are being used in violation of something sacred — which is why Garl Glittergold cares. He's not just protecting gnome-adjacent fey; he's watching someone desecrate an ancient covenant.", "spoiler": true}, {"label": "Carnival Fey", "content": "Citizens of the Pale Carnival who occasionally cross into Venturia when the veil thins, usually during the Autumn Masquerade because the mortal ritual resonates with their home court. They look almost human but slightly off in ways hard to articulate: too still when they should move, too fluid when they should be still. Some have formed lasting arrangements with mortal families across centuries.", "spoiler": true}, {"label": "The Maskless — Horror Element", "content": "What happens when a fey loses their identity entirely in the fractured Carnival. They've forgotten which face is theirs and now wear a rotating collection of stolen ones. Not evil exactly — hungry, the way someone starving for sleep is hungry. Witnesses report the creature 'looked like it was practicing being me.' They are the middle-phase Leaked entities — stumbling through tears in reality, trying to wear the identities of people they encounter by mimicking speech, posture, and mannerisms. Deeply unsettling before any combat begins.", "spoiler": true}], "connections": [{"target_id": "reverie_solenne", "target_name": "The Reverie Solenne", "relationship": "All three types originate from or were shaped by the Keeper's court", "spoiler": true}, {"target_id": "the_leaked", "target_name": "The Leaked", "relationship": "Carnival Fey and especially the Maskless are what 'leaks' through as the prison degrades", "spoiler": true}, {"target_id": "roxy", "target_name": "Roxanya", "relationship": "Roxy's mission to save brownies is unknowingly about protecting sacred covenant fey", "spoiler": true}], "dm_notes": "The Maskless are the campaign's most unsettling monster type. Play them as uncanny valley — they look almost right but wrong enough to trigger deep discomfort. The 'practicing being me' description is the key image to deliver at the table. Brownies being sacred covenant creatures elevates Roxy's personal mission into something with cosmic significance she doesn't yet understand."}, {"id": "prison_mechanics", "type": "lore", "name": "The Prison Mechanics — Why It's Collapsing Now", "aliases": ["Prison Collapse", "Three Drains", "Why Now"], "tags": ["prison", "keeper_of_faces", "fanes", "domain_collapse", "pale_carnival", "deterioration", "marcello_power"], "spoiler": true, "summary": "The prison is failing from three simultaneous drains that have compounded to a breaking point: the original theft wound, domain collapse from the Pale Carnival's degradation, and the fanes' continuous power pipeline. Marcello's return has accelerated the very deterioration he came to investigate.", "details": [{"label": "Drain One: The Original Theft", "content": "Lorenzo didn't drain the Keeper like emptying a cup — he excised something from the Keeper's fundamental nature. The Keeper has been imprisoned with a wound that cannot close, because the stolen power is outside his reach sustaining someone else. Normally an Archfey recovers by drawing on their domain. But the domain is failing.", "spoiler": true}, {"label": "Drain Two: Domain Collapse", "content": "Archfey are sustained by being what they are — their domain must be alive and functioning. The Keeper needs a court where identity is celebrated and performed. The Pale Carnival fractured the moment he was imprisoned, and without his governing intelligence, it degraded. As it degraded, his ability to draw sustenance degraded with it. He has been in slow starvation for a thousand years, trying to recover using a domain that is itself dying.", "spoiler": true}, {"label": "Drain Three: The Fanes as Pipeline", "content": "The fanes are not just storage for stolen power — they are a continuous mechanism, routing residual power from the Keeper to stabilize Marcello's stolen abilities on an ongoing basis. Stolen Archfey power is fundamentally unstable in a mortal vessel; without constant feed from its source, it degrades. Each fane governs a different aspect of that stabilization. For a thousand years, the fanes have drawn a slow continuous trickle from an already-wounded prisoner who cannot replenish what he loses. Destroying a fane weakens Marcello but also accelerates the Keeper's deterioration — removing a regulated channel causes remaining draws to become more erratic and damaging.", "spoiler": true}, {"label": "Why Now — The Intersection Point", "content": "Three degradation curves finally reached intersection. The Keeper's original reserves are genuinely exhausted. The Pale Carnival has degraded past providing meaningful sustenance. The fanes are accumulating structural wear after a millennium. And Marcello, returning to investigate his weakening power, instinctively spends more time at the binding site where his abilities are strongest — increasing the draw on the Keeper, accelerating the very deterioration he came to investigate. He has been making it worse since he arrived.", "spoiler": true}], "connections": [{"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The prisoner being drained by all three mechanisms", "spoiler": true}, {"target_id": "the_fanes", "target_name": "The Three Fanes", "relationship": "The continuous pipeline (Drain Three) — destroying them is double-edged", "spoiler": true}, {"target_id": "reverie_solenne", "target_name": "The Reverie Solenne / Pale Carnival", "relationship": "Domain collapse (Drain Two) — the court's degradation starves the Keeper", "spoiler": true}, {"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "His return and time at the binding site accelerates the collapse", "spoiler": true}], "dm_notes": "The three drains framework gives players a legible explanation for the crisis and three potential intervention points. It also deepens the moral complexity of destroying fanes — you're not just weakening Marcello, you're ripping a regulated channel out of a dying prisoner's chest. The 'Marcello is making it worse' detail means the party can potentially use this against him — if he understood the mechanics, even he would want to stop."}]}, "campaign": {"schema_version": "1.1", "category": "campaign", "entries": [{"id": "campaign_overview", "type": "planning", "name": "Campaign Overview and Core Concept", "aliases": ["Overview", "Campaign Concept"], "tags": ["planning", "tone", "scope", "romantasy", "strahd_parallel"], "spoiler": false, "summary": "Vallombrosa is a three-to-five-year campaign emphasizing mystery, moral complexity, and sophisticated storytelling within a romantasy tone. Inspired by Curse of Strahd's structure but set on the material plane with a focus on stolen identity, manipulation disguised as romance, and cosmic-level betrayal.", "details": [{"label": "Scale and Duration", "content": "Massive three-to-five-year campaign spanning potentially 100-200 sessions. Session number references are relative progression markers, not literal counts. Mid-sized city setting — large enough for complex dynamics, not so massive it becomes unwieldy for intimate storytelling.", "spoiler": false}, {"label": "Key Difference from Strahd", "content": "Vallombrosa exists on the normal material plane, not a pocket dimension. Marcello can come and go freely — he chooses to be there. Players cannot simply escape by leaving the island, because leaving means abandoning Celina and other residents. Reality IS warped in subtle ways (strange time, unreliable memories, impossible architecture) but the setting remains material plane.", "spoiler": false}, {"label": "Core Tone", "content": "Mystery and the uncanny rather than overwhelming dread. Beautiful wrongness — the fog is eerie but hauntingly lovely, the fey-touched quirks are strange but not threatening. Makes space for romance, humor, beauty, and genuine human connection as essential contrasts that make dangerous moments matter. Marcello is an elegant predator, not an unstoppable horror. Victory should feel genuinely achievable.", "spoiler": false}, {"label": "Romantasy Subversion", "content": "Marcello appears to embody romantic tropes — mysterious figure from the past, supernatural courtship, grand gestures. The campaign reveals these as manipulation. His 'love' is possessive obsession about validation. The campaign contrasts this hollow imitation against genuine connections players build.", "spoiler": true}], "connections": [], "dm_notes": "The romantasy tone is not window dressing — it's structural. A masquerade ball can be both romantically charged and the site of supernatural intrigue. A quiet library conversation can reveal crucial information while also being a moment of connection. These aren't breaks from the 'real' story."}, {"id": "phase_one", "type": "planning", "name": "Campaign Phase One: Pre-Marcello", "aliases": ["Act One", "Phase One", "Noble Kidnapping Mystery"], "tags": ["campaign_structure", "act_one", "silas", "investigation", "escalation"], "spoiler": true, "summary": "Sessions 1-50+. Opens with an apparently mundane mystery (noble disappearances) that reveals Silas's research operation. After disruption, Silas creates The Bound and the supernatural crisis escalates. Establishes Venturia as worth protecting and builds toward Marcello's arrival.", "details": [{"label": "Opening Hook", "content": "The campaign does NOT begin with prophecy or supernatural threats. Young nobles ages 14-22 have been disappearing without ransom, bodies, or motives. The party is hired to investigate. Investigation leads to Silas Vane's commune outside Venturia where missing nobles study 'transcendence' and ancient wisdom.", "spoiler": false}, {"label": "The Moral Complexity", "content": "Silas immediately releases anyone under 18 when confronted. Adults insist they want to stay — legally their right. Is this a crime or people making choices families disapprove of? Where's the line between cult manipulation and genuine philosophy? This provides 3-5+ sessions of investigation and social encounters before overt supernatural threats.", "spoiler": false}, {"label": "The Underlying Truth", "content": "Silas is using nobles for access to family archives and city connections. He's researching the di Errante tragedy, searching for the three objects of power, and trying to understand the binding ritual mechanics. The nobles were selected for their families' relevant documents.", "spoiler": true}, {"label": "The Escalation", "content": "After the party disrupts his research, Silas goes into hiding and creates The Bound. The supernatural crisis emerges directly from the party's interference — making it feel like natural escalation from their actions rather than arbitrary event. The Leaked also begin appearing as prison integrity degrades.", "spoiler": true}, {"label": "Design Purpose", "content": "Establishes Venturia as a living city worth protecting. Creates investment in NPCs before larger horror emerges. Makes supernatural crisis feel earned through player actions. Provides investigation/social encounter gameplay before combat-heavy supernatural threats. Builds relationship with Celina before her significance is revealed.", "spoiler": false}], "connections": [{"target_id": "silas", "target_name": "Silas Vane", "relationship": "Primary antagonist of Phase One", "spoiler": true}, {"target_id": "the_bound", "target_name": "The Bound", "relationship": "Primary supernatural threat of mid-Phase One", "spoiler": true}, {"target_id": "the_leaked", "target_name": "The Leaked", "relationship": "Escalating environmental threat throughout Phase One", "spoiler": true}], "dm_notes": "Phase One's length is flexible — it ends when Marcello's arrival feels dramatically right, not at a predetermined session count. The party should feel like they've fought hard and earned progress against Silas before the rug gets pulled. At least one Tartuzi-messenger tragedy should occur during this phase."}, {"id": "phase_two", "type": "planning", "name": "Campaign Phase Two: Marcello's Domain", "aliases": ["Act Two", "Phase Two", "The Fane Hunt"], "tags": ["campaign_structure", "act_two", "marcello", "fane_hunt", "vallombrosa", "celina"], "spoiler": true, "summary": "Sessions 50-100+. Begins with Marcello's arrival and Vallombrosa's transformation. The campaign shifts to protecting Celina, investigating Vallombrosa, understanding memory manipulation, hunting the three fanes, and navigating Vallombrosa as a living Barovia-like setting.", "details": [{"label": "The Threshold", "content": "Marcello arrives during a set-piece event (recommended: Autumn Masquerade), effortlessly defeats Silas, positions himself as savior. Claims di Errante estates. Vallombrosa transforms. The horrible irony: the party's victories against Silas cleared the path for something far worse.", "spoiler": true}, {"label": "Core Activities", "content": "Protecting Celina from supernatural stalker. Investigating Vallombrosa's transformation and population. Understanding and resisting the false memory mechanism. Hunting and destroying the three fanes. Navigating Vallombrosa's living community as modified Curse of Strahd structure. Building alliances among Vallombrosa's residents and Venturia's factions.", "spoiler": true}, {"label": "The Fane Hunt Structure", "content": "Clear objectives with escalating difficulty building toward final confrontation. Each fane destroyed weakens Marcello but accelerates the prison crisis. The party must balance defeating Marcello against destabilizing the prison. Mirror likely discovered in Act One; compass and hourglass must be found in Act Two.", "spoiler": true}, {"label": "Social Dynamics", "content": "Marcello is popular. The city celebrates him as hero. Opposition is socially difficult. NPCs' memories are being rewritten. The party becomes increasingly isolated in their accurate understanding of reality. One-month timeline before Venturia fully accepts Vallombrosa as always having existed.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "Primary antagonist of Phase Two", "spoiler": true}, {"target_id": "celina_cross", "target_name": "Celina Cross", "relationship": "The person the party must protect from supernatural stalking", "spoiler": true}, {"target_id": "the_fanes", "target_name": "The Three Fanes", "relationship": "The structural backbone of Phase Two", "spoiler": true}, {"target_id": "false_memory_mechanism", "target_name": "The False Memory Mechanism", "relationship": "The ticking clock of Phase Two", "spoiler": true}], "dm_notes": "Phase Two is the longest and most open-ended portion of the campaign. It needs enough structure (fane hunt, Celina protection, memory timeline) to maintain direction without railroading. Vallombrosa should feel like a real place the party explores over many sessions, not a dungeon to clear."}, {"id": "phase_three", "type": "planning", "name": "Campaign Phase Three and Endgame", "aliases": ["Act Three", "Phase Three", "Endgame"], "tags": ["campaign_structure", "act_three", "endgame", "resolution", "player_agency"], "spoiler": true, "summary": "Variable timing. The party discovers the full truth of the ancient tragedy, faces the impossible choice, and determines the campaign's resolution. Multiple imperfect endings are possible. Resolution should feel earned through choices, not predetermined.", "details": [{"label": "Discovery", "content": "The party uncovers the complete history through investigation — the brothers, the bargain, the cosmic theft, the murders, Tartuzi's entrapment. They learn the full scope of the impossible choice: killing Marcello breaks the prison, freeing a potentially dangerous entity with millennia of justified rage.", "spoiler": true}, {"label": "The Choice", "content": "Multiple imperfect resolutions: heroic sacrifice (someone takes Marcello's place as lock), negotiation with the Archfey (fey law, contract renegotiation), maintaining status quo (pragmatic but morally unsatisfying), or creative solutions the players devise. None is presented as 'correct.'", "spoiler": true}, {"label": "Campaign Philosophy", "content": "The goal is resolution that feels earned through choices and consequences rather than predetermined by narrative structure. Players should struggle with these questions, disagree, seek counsel from trusted NPCs, and make decisions they can live with even if those decisions come with significant costs.", "spoiler": true}], "connections": [{"target_id": "impossible_choice", "target_name": "The Impossible Choice", "relationship": "The central dilemma the party must resolve", "spoiler": true}, {"target_id": "ancient_tragedy", "target_name": "The Ancient Tragedy", "relationship": "The full truth the party discovers", "spoiler": true}], "dm_notes": "Phase Three is the least defined because it depends most on player decisions throughout Phases One and Two. Don't over-plan the endgame — let it emerge from accumulated choices. The players' relationship with Tartuzi, their understanding of fey law, their alliances, and their moral framework should all shape what options feel available and desirable."}, {"id": "dm_principles", "type": "planning", "name": "DM Running Principles", "aliases": ["Running Principles", "Campaign Principles"], "tags": ["dm_guidance", "tone", "player_agency", "pacing", "celina"], "spoiler": false, "summary": "Core principles for running Vallombrosa: Marcello is genuinely monstrous, Celina must be a complete person before plot relevance, flexible pacing through natural thresholds, tension from wrongness without overwhelming dread, beauty and horror coexist, and victory should feel achievable.", "details": [{"label": "Marcello Is Not Sympathetic", "content": "Marcello is genuinely monstrous, not tragically sympathetic. His villainy emerges from jealousy and entitlement rather than protective love or understandable desperation. His 'love' is desperate need for validation. He doesn't love Celina as a person — he loves what she represents: proof he existed as Lorenzo.", "spoiler": true}, {"label": "Celina Before Plot", "content": "Celina MUST be established as a complete person with her own life, personality, goals, dreams, and relationships BEFORE supernatural significance is revealed. Players should know and care about her as an individual. When Marcello's courtship begins, it should feel like violation of someone they're invested in. Every player should have meaningful reasons to oppose him based on genuine relationship with Celina.", "spoiler": false}, {"label": "Flexible Pacing", "content": "Thresholds happen when natural rather than on predetermined schedule. The campaign adapts to player choices and table dynamics. Session count estimates are progression markers, not deadlines.", "spoiler": false}, {"label": "Tone Balance", "content": "Tension from wrongness and violation without overwhelming dread. Beauty and horror coexist — autumn light through fog, elegant architecture hiding dark secrets. Romance, humor, and genuine connection are essential contrasts, not breaks from the 'real' story. The campaign should feel dangerous and mysterious but never hopeless.", "spoiler": false}, {"label": "Player Agency Is Sacred", "content": "Never take away meaningful player choice to serve narrative elegance. Tragedy and predetermined outcomes work when players have agency over HOW events unfold, not when railroaded into specific actions. Present options without dictating which is correct. Victory should feel earned through ingenuity and difficult decisions.", "spoiler": false}], "connections": [], "dm_notes": "These principles should be revisited periodically throughout the campaign, especially when planning major story beats. If a planned scene requires removing player choice to work, redesign the scene."}, {"id": "pc_integration", "type": "planning", "name": "Player Character Integration", "aliases": ["PC Integration", "Character Hooks"], "tags": ["dm_guidance", "player_characters", "backstory", "reincarnation", "session_zero"], "spoiler": false, "summary": "Guidance for weaving player backstories into the campaign. All PCs are Venturia natives who grew up with Vallombrosa as landscape. Possible reincarnation connections to the original adventuring party. Early sessions establish personal investment before supernatural escalation.", "details": [{"label": "Session Zero Context", "content": "Players should know: they live in Venturia and grew up with Vallombrosa as part of their landscape. They have favorite legends but nobody believes any specific version. They don't know about the Archfey, the cosmic theft, Tartuzi, or that anyone from the tragedy still exists.", "spoiler": false}, {"label": "Backstory Integration", "content": "Weave personal stories into larger narrative as they emerge. Prophecy/oracle backgrounds create investment in understanding Tartuzi. Memory/identity themes resonate with Lorenzo's curse and reality warping. Fey bargain experience equips characters for understanding contract mechanics. Each character needs reasons for protecting Venturia beyond abstract heroism.", "spoiler": false}, {"label": "Reincarnation Possibility", "content": "One or more PCs could be reincarnations of the original Sphinx Twice adventuring party. Handle carefully — should emerge naturally through play (strange dreams, recognizing unknown locations, inexplicable knowledge). Should create interesting character moments, not make players feel like vehicles for predetermined story. When the party uncovers historical records, they're getting distorted versions of events one-shot players witnessed.", "spoiler": true}, {"label": "Celina Relationship Building", "content": "Early sessions must establish genuine relationships with Celina before her supernatural significance is revealed. Each PC needs personal connection to her — as friend, colleague, neighbor, confidant, or something else organic to their backstory. By Marcello's arrival, opposing him should feel personal.", "spoiler": false}], "connections": [], "dm_notes": "The seven current players each have backstories already connecting them to Venturia and its factions. Use the character entries in characters.json for specific integration points. The pre-campaign vignettes and one-shots are designed to establish these connections before the main campaign begins."}, {"id": "thematic_guide", "type": "planning", "name": "Thematic Resonance Guide", "aliases": ["Themes", "Thematic Guide"], "tags": ["dm_guidance", "themes", "identity", "victimhood", "complicity", "love"], "spoiler": true, "summary": "The campaign's core themes: stolen identity and recognition, cycles of victimization and revenge, complicity and responsibility, reincarnation and identity persistence, and possessive obsession versus genuine love. These should emerge through play, not be stated explicitly.", "details": [{"label": "Stolen Identity", "content": "Lorenzo's loss of name and face mirrors his crime of stealing Isabella's autonomy. He wanted recognition and received eternal anonymity. He wanted to possess Isabella and lost everything. The di Errante surname ('of the wandering one') proves prophetic across millennia.", "spoiler": true}, {"label": "Cycles of Victimization", "content": "Tartuzi is genuinely a victim but willing to cause catastrophe for freedom. The Archfey was betrayed but could be dangerous if freed. The campaign explores whether suffering justifies harmful actions, whether victims bear responsibility for harm caused while seeking justice.", "spoiler": true}, {"label": "Complicity and Responsibility", "content": "Isabella was victimized by coercion but also provided knowledge enabling the cosmic theft through her prophetic abilities. Did she know? Did her visions show consequences? Does she bear any responsibility even under coercion? These questions should emerge naturally.", "spoiler": true}, {"label": "Reincarnation and Identity", "content": "If Celina has Isabella's memories or tendencies, is she responsible for past-life actions? If she has no connection, is Lorenzo's obsession delusion imposed on an innocent? What does identity mean when memory might persist across lifetimes?", "spoiler": true}, {"label": "Possessive Obsession vs Genuine Love", "content": "Lorenzo's 'love' is need for validation. He doesn't love Celina as a person with autonomy — he loves what she represents. The campaign contrasts this against whatever genuine relationships players build, exploring the difference between loving someone for who they are versus what they represent.", "spoiler": true}], "connections": [], "dm_notes": "These themes should emerge through events, NPC interactions, and player choices — never through the DM stating them explicitly. The table will find its own emphasis among these themes. Don't force all of them; let the ones that resonate with the specific players rise naturally."}, {"id": "open_questions", "type": "planning", "name": "Open Questions for Campaign Development", "aliases": ["Open Questions", "Unresolved Questions", "Future Development"], "tags": ["planning", "unresolved", "silas", "tartuzi", "celina", "fanes", "marcello"], "spoiler": true, "summary": "Critical campaign decisions that need resolution as play develops. These should be treated as opportunities rather than problems — the best answers will emerge from table dynamics and player choices.", "details": [{"label": "Silas Questions", "content": "What is Silas's secondary agenda beyond scholarly research? What specific actions bring him into direct conflict with the party? What climaxes at the Masquerade? Does Silas create ALL Bound, or are most caused by weakening prison with Silas creating only targeted ones?", "spoiler": true}, {"label": "Tartuzi Questions", "content": "When and how is Tartuzi's true identity revealed to the party? Does she want Marcello dead, alive, or no preference? Does she survive into Act Two or die during Act One? If she survives, what role in endgame? Is freeing her from servitude a goal the party pursues?", "spoiler": true}, {"label": "Fane Questions", "content": "Which fane does the party discover during Act One and under what circumstances? What specific methods or conditions destroy fanes? How do destruction consequences escalate?", "spoiler": true}, {"label": "Marcello Questions", "content": "Was there actually a third di Errante brother, or is this fabrication? Should this be definitively answered or left ambiguous? If any PCs are reincarnations, when does Marcello recognize them? When does he realize the party is hunting fanes? What does he want beyond claiming Celina?", "spoiler": true}, {"label": "Celina Questions", "content": "Two key framework decisions with different downstream consequences. Personality: Option A — Celina shares Isabella's tendencies (drawn to power, prophecy, supernatural influence), creating horrifying possibility of partial complicity and moral complexity about respecting her choices versus recognizing supernatural compromise. Option B — complete personality inversion from Isabella (repulsed by supernatural power), making Marcello's centuries of preparation useless and forcing him to adapt. Memory: no memories (significance entirely external/imposed on her), vague impressions that clarify as Marcello's influence grows (raises questions about genuine vs. implanted memories), or clear conscious memories (profound identity questions about continuity of self and past-life responsibility). Each combination creates different dramatic possibilities. Additional open questions: how does the party protect her from dream manipulation and memory implantation? How does she actively participate in her own defense rather than being purely a prize?", "spoiler": true}, {"label": "Structural Questions", "content": "How many sessions should Act One run before Marcello's arrival? What is session-to-session structure of Act Two? What are major milestones between Marcello's arrival and final confrontation?", "spoiler": true}], "connections": [], "dm_notes": "Review these periodically as the campaign progresses. Some will resolve naturally through play. Others will need deliberate decisions during prep. Don't feel pressured to answer everything before it becomes relevant — the best campaigns leave room for discovery."}, {"id": "scarred_patient_crisis", "type": "planning", "name": "The Scarred Patient Crisis: Campaign Opening", "aliases": ["Campaign Opening", "Scarred Patient", "Session One", "The Inciting Event"], "tags": ["session_one", "opening", "silas", "marcus", "fog_wardens", "investigation"], "spoiler": true, "summary": "The campaign's actual opening event. On the same night, Fog Warden Marcus disappears from his post and a scarred, comatose figure (Silas) appears at the same location. Multiple PCs have immediate personal stakes. This replaces the noble kidnapping hook as the session one inciting incident.", "details": [{"label": "The Night It Happens", "content": "Same night: Marcus (Noname's fiancé, Kryton's close friend, active Fog Warden) disappears from his post. A figure wrapped in tattered clothes, body covered in strange supernatural scars, appears at the same location, collapses, and slips into a coma. He's brought to St. Viro's Respite under Orabella's care. The scars are the Archfey's prisoner brands marking Silas as property of the Keeper of Faces.", "spoiler": true}, {"label": "Immediate Multi-PC Stakes", "content": "Noname: her fiancé is missing, mysterious scarred man appeared in his place, her memory of the night is foggy (Silas manipulated it). Kryton: his friend disappeared the same night, feels responsible since he introduced Noname and Marcus. Orabella: actively caring for the comatose patient, trying to understand the supernatural scars — she's a fog child herself, so supernatural phenomena resonate differently for her. Lotan: his patron (the Keeper) can potentially identify the prisoner brands if shown or described. Party-wide: personal crisis affecting multiple members from session one.", "spoiler": true}, {"label": "Investigation Threads", "content": "The Fog Warden post — what happened that night, garrison logs, other witnesses. The scarred patient — who is he, where did the marks come from, why won't he wake. Orabella's memory — why is it foggy, can magic restore it, what's been blocked. The missing fiancé — where did Marcus go, is he alive. The scars themselves — patterns suggest brands not wounds, faint magical energy, Lotan's Keeper patron might recognize them as prisoner marks.", "spoiler": true}, {"label": "Noname's Foggy Memory", "content": "Has direct cause: Silas manipulated Noname's memory during or after the incident. This was his first use of abilities in Venturia — crude and incomplete, which is why the memory is foggy rather than cleanly rewritten. This connects to the campaign's broader memory manipulation themes and foreshadows Marcello's far more powerful version.", "spoiler": true}], "connections": [{"target_id": "silas", "target_name": "Silas Vane", "relationship": "The scarred comatose figure is Silas, freshly escaped from the Archfey's prison", "spoiler": true}, {"target_id": "marcus", "target_name": "Marcus", "relationship": "The missing Fog Warden whose disappearance coincides with Silas's appearance", "spoiler": true}, {"target_id": "noname", "target_name": "Noname", "relationship": "Her fiancé is the missing man; her memory was manipulated by Silas", "spoiler": true}, {"target_id": "orabella", "target_name": "Orabella", "relationship": "Caring for the comatose Silas at St. Viro's Respite", "spoiler": true}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "His friend is the missing Fog Warden; introduced Noname and Marcus", "spoiler": true}, {"target_id": "lotan", "target_name": "Lotan", "relationship": "His patron can potentially identify the prisoner brands", "spoiler": true}, {"target_id": "phase_one", "target_name": "Campaign Phase One", "relationship": "This crisis is the inciting event that launches Phase One", "spoiler": true}], "dm_notes": "This opening immediately gives four PCs personal stakes in the central mystery without any forced exposition. The noble kidnapping investigation from the Unified Framework may still occur as a later Act One thread once Silas wakes and begins operating, but THIS is the session one hook. Open questions: what does Orabella believe about the comatose man (thinks he IS Marcus, knows Marcus was replaced, or conflicting memories)? Where is the real Marcus? When does Silas wake (recommended sessions 3-5)?"}, {"id": "session_one_decisions", "type": "planning", "name": "Session One Decision Framework", "aliases": ["Critical Questions", "Pre-Campaign Decisions"], "tags": ["session_one", "decisions", "orabella", "silas", "marcus", "noname", "lotan"], "spoiler": true, "summary": "Decisions that must be made before or during early sessions. These shape the opening arc's emotional texture and investigation structure.", "details": [{"label": "Noname's Memory State", "content": "Option A: She thinks Marcus IS the scarred comatose man (doesn't remember clearly, devastated and confused). Option B: She knows Marcus disappeared and was replaced (memory of HOW is foggy). Option C: Mixed memory state — conflicting memories, can't reconcile which is true (most horror-inducing, mirrors the dual-memory residents in Act Two).", "spoiler": true}, {"label": "Marcus's Fate", "content": "Option A: Dead (killed by Silas, permanent loss). Option B: Trapped in the weakening prison (exchanged places with Silas, potentially recoverable). Option C: Transformed/changed (used as material for first Bound, alive but not himself). Option D: Imprisoned by Silas somewhere (kept for information, potentially discoverable).", "spoiler": true}, {"label": "Silas's Awakening Timing", "content": "Early (sessions 1-2): immediate interaction, quick escalation, less investigation time. Mid (sessions 3-5): time for investigation, Noname develops patient relationship, waking becomes major event — RECOMMENDED. Late (sessions 6-10+): extended investigation, party discovers who/what he is first, creates tension when he wakes.", "spoiler": true}, {"label": "How Silas Manipulated Orabella's Memory", "content": "Used emerging abilities (first use in Venturia, crude and incomplete). OR the prison escape itself caused memory disruption in nearby people. OR he created a temporary Bound to handle it (that person might still be around as evidence).", "spoiler": true}, {"label": "What Each PC Knows at Opening", "content": "Kryton: does he know his friend was Noname's fiancé? Has he visited St. Viro's to see the comatose man? Does his patron (Tartuzi) have any reaction? Orabella: what can she discover before Silas wakes? (Scars aren't natural wounds — they're brands in patterns, coma is magically induced, patient occasionally sounds conscious, scars radiate faint magic.) Does she know the patient replaced a Fog Warden? Lotan: can the Keeper identify prisoner brands from descriptions? Will the Keeper communicate this? What does the Keeper want done? Caravel: does the friend whose death she blames on secrets connect to Silas or the opening mystery?", "spoiler": true}], "connections": [{"target_id": "scarred_patient_crisis", "target_name": "The Scarred Patient Crisis", "relationship": "These decisions shape how the opening plays out", "spoiler": true}], "dm_notes": "These decisions interact with each other — Orabella's memory state affects what the party knows going in, Marcus's fate determines whether there's a rescue mission or a grief arc, Silas's awakening timing controls pacing. Decide the memory state and Marcus's fate before session one. Silas timing can be adjusted based on how investigation plays at the table."}, {"id": "pc_connection_web", "type": "planning", "name": "PC Connection Web and Thematic Clusters", "aliases": ["Connection Web", "PC Connections", "Character Intersections"], "tags": ["dm_guidance", "player_characters", "connections", "themes", "liminal_house"], "spoiler": false, "summary": "How the seven PCs interconnect and form thematic clusters that mirror the campaign's central concerns. These organic connections create natural party dynamics and investigation drivers.", "details": [{"label": "The Liminal House Hub", "content": "Three PCs connect through Liminal House: Noname (fog child's daughter, raised there after parents died), Orabella (fog child herself, raised there after appearing from Vallombrosa), Valentro (orphan, raised there after losing both parents). This institution has been dealing with fog children for centuries — exactly the population that manifests when Marcello transforms Vallombrosa. Liminal House likely has records going back generations and may know more about Vallombrosa's true nature than publicly admitted.", "spoiler": false}, {"label": "The Fog Warden Disappearances", "content": "Two PCs lost Fog Wardens: Noname's fiancé Marcus (recent, same night as Silas), Valentro's father (earlier). Both were people who should know better than to enter the fog. Pattern suggests Vallombrosa was already 'leaking' before Marcello's arrival — pulling people in before the main transformation. Fog Wardens specifically are being targeted or drawn in.", "spoiler": true}, {"label": "Secrets vs. Transparency", "content": "Roxy: obsessed with secrets (Garl's influence). Caravel: categorically opposed to secrets (blames them for friend's death). Natural party tension with room for growth. Perfect thematic resonance — the campaign's truth has been hidden for millennia, Marcello hides behind stolen identity, the Keeper was betrayed through hidden knowledge. Forces the party to grapple with whether some things should stay buried.", "spoiler": false}, {"label": "Supernatural Patron Connections", "content": "Lotan: The Keeper of Faces (imprisoned Archfey, direct campaign connection). Roxy: Garl Glittergold (made her interested in Vallombrosa). Kryton: his patron is connected to Tartuzi. Three PCs have divine/supernatural patrons with campaign relevance — natural exposition channels and moral complexity.", "spoiler": true}, {"label": "Masks and Identity Cluster", "content": "Caravel: Masquers' Sodality apprentice, family tragedy at the Masquerade. Roxy: stole a mask to come to Venturia. Lotan: patron is the Keeper of Faces (domain: masks, identity). Perfect cluster for a campaign about stolen identity, Lorenzo's curse, appearance vs. reality.", "spoiler": false}, {"label": "Forgotten/Stolen Identity Cluster", "content": "Kryton: sees tools as swords, muscle memory suggesting warrior past — exactly the kind of memory bleed the campaign uses. Orabella: memories returning that frighten her. Noname's father: no memory of life before appearing. Kryton: lost wizard knowledge and abilities. All tie directly to the campaign's memory manipulation and identity theft themes.", "spoiler": false}, {"label": "The Tiered Gardens as Convergence Point", "content": "Valentro works there professionally. Marcus proposed to Noname there (Valentro witnessed). Kryton's 'sword moment' happened there (Roxy witnessed). Kryton frequents for peace and contemplation. This location is a natural recurring setting for character moments.", "spoiler": false}, {"label": "Pre-Campaign Timeline of Intersections", "content": "Lotan meets Roxy (1 year before campaign). Caravel befriends Roxy (timing unclear). Noname and Orabella (childhood at Liminal House, current patient-healer relationship). Roxy discovers Kryton's secret (recent). Kryton introduced Noname to Marcus (past). Kryton taught at VAVA (connections to any PC students).", "spoiler": false}], "connections": [{"target_id": "liminal_house", "target_name": "Liminal House", "relationship": "Hub connecting three PCs and central to fog children lore", "spoiler": false}, {"target_id": "tiered_gardens", "target_name": "The Tiered Gardens", "relationship": "Convergence point for multiple PC backstory moments", "spoiler": false}, {"target_id": "scarred_patient_crisis", "target_name": "The Scarred Patient Crisis", "relationship": "These connections determine why each PC is drawn into the opening mystery", "spoiler": true}], "dm_notes": "These clusters aren't just flavor — they're structural. The Liminal House hub means three PCs have personal reasons to investigate fog children when Marcello creates a population of them. The secrets debate means the party will organically argue about whether to expose Vallombrosa's truth. The patron connections mean exposition can be personal and earned rather than delivered by DM fiat. Use these clusters to ensure every PC has a way into every major plot thread."}]}};

// Build lookup index
const INDEX = {};
const FILE_FOR = {};
const GROUP_LABELS = {
  characters: 'Characters',
  locations: 'Locations',
  factions: 'Factions',
  government: 'Government',
  lore: 'Lore',
  campaign: 'Campaign'
};

for (const [file, data] of Object.entries(DATA)) {
  for (const entry of data.entries) {
    INDEX[entry.id] = entry;
    FILE_FOR[entry.id] = file;
  }
}

// Navigation history
const history = [];

// Build sidebar
function buildNav(filter = '') {
  const nav = document.getElementById('nav');
  const f = filter.toLowerCase();
  let totalShown = 0;
  
  let html = '';
  for (const [file, data] of Object.entries(DATA)) {
    const entries = data.entries.filter(e => {
      if (!f) return true;
      const searchable = [e.name, e.id, ...(e.aliases || []), ...(e.tags || []), e.summary || ''].join(' ').toLowerCase();
      return searchable.includes(f);
    });
    
    if (entries.length === 0 && f) continue;
    totalShown += entries.length;
    
    const items = (f ? entries : data.entries).sort((a, b) => a.name.localeCompare(b.name));
    
    html += '<div class="nav-group-header" onclick="toggleGroup(this)" data-file="' + file + '">';
    html += '<span><span class="arrow">▼</span> ' + GROUP_LABELS[file] + '</span>';
    html += '<span class="count">' + items.length + '</span>';
    html += '</div>';
    html += '<div class="nav-group-items" data-file="' + file + '">';
    for (const e of items) {
      html += '<div class="nav-item" data-id="' + e.id + '" onclick="showEntry(\'' + e.id + '\')">';
      if (e.spoiler) html += '<span class="spoiler-dot"></span>';
      html += e.name;
      html += '</div>';
    }
    html += '</div>';
  }
  
  nav.innerHTML = html;
  updateStats();
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  const file = header.dataset.file;
  const items = document.querySelector('.nav-group-items[data-file="' + file + '"]');
  items.classList.toggle('collapsed');
}

function updateStats() {
  const total = Object.keys(INDEX).length;
  const spoilers = Object.values(INDEX).filter(e => e.spoiler).length;
  const conns = Object.values(INDEX).reduce((sum, e) => sum + (e.connections || []).length, 0);
  document.getElementById('stats').innerHTML = total + ' entries · ' + conns + ' connections · ' + spoilers + ' spoilers';
}

function showEntry(id) {
  const entry = INDEX[id];
  if (!entry) return;
  
  const file = FILE_FOR[id];
  const content = document.getElementById('content');
  const placeholder = document.getElementById('placeholder');
  
  placeholder.style.display = 'none';
  content.style.display = 'block';
  
  // Update active nav
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navItem = document.querySelector('.nav-item[data-id="' + id + '"]');
  if (navItem) {
    navItem.classList.add('active');
    navItem.scrollIntoView({ block: 'nearest' });
  }
  
  // Track history
  if (history[history.length - 1] !== id) {
    history.push(id);
  }
  
  let html = '';
  
  // Back links
  if (history.length > 1) {
    html += '<div class="back-links">';
    const recent = [...new Set(history.slice(-6, -1).reverse())];
    for (const hid of recent) {
      const he = INDEX[hid];
      if (he) {
        html += '<span class="back-link" onclick="showEntry(\'' + hid + '\')">&larr; ' + he.name + '</span>';
      }
    }
    html += '</div>';
  }
  
  // Header
  html += '<div class="entry-header">';
  html += '<div class="entry-source">' + GROUP_LABELS[file] + '.json</div>';
  html += '<div class="entry-name">' + entry.name;
  if (entry.player) html += '<span class="player-badge">Player: ' + entry.player + '</span>';
  html += '</div>';
  html += '<div class="entry-id">' + entry.id + (entry.type ? ' · ' + entry.type : '') + '</div>';
  
  if (entry.aliases && entry.aliases.length) {
    html += '<div class="entry-aliases">Also: ' + entry.aliases.join(', ') + '</div>';
  }
  
  html += '<div class="entry-meta">';
  if (entry.type) html += '<span class="tag type-tag">' + entry.type + '</span>';
  if (entry.spoiler) html += '<span class="tag spoiler-tag">SPOILER</span>';
  if (entry.tier) html += '<span class="tag tier-tag">' + entry.tier + '</span>';
  if (entry.tags) {
    for (const t of entry.tags) {
      html += '<span class="tag">' + t + '</span>';
    }
  }
  html += '</div>';
  html += '</div>';
  
  // Summary
  if (entry.summary) {
    html += '<div class="entry-summary">' + escHtml(entry.summary) + '</div>';
  }
  
  // Details
  if (entry.details && entry.details.length) {
    html += '<div class="section-title">Details (' + entry.details.length + ')</div>';
    for (const d of entry.details) {
      const sp = d.spoiler ? ' is-spoiler' : '';
      html += '<div class="detail-card' + sp + '">';
      html += '<div class="detail-label">' + escHtml(d.label);
      if (d.spoiler) html += '<span class="spoiler-badge">Spoiler</span>';
      html += '</div>';
      html += '<div class="detail-content">' + escHtml(d.content) + '</div>';
      html += '</div>';
    }
  }
  
  // Connections
  if (entry.connections && entry.connections.length) {
    html += '<div class="section-title" style="margin-top:28px">Connections (' + entry.connections.length + ')</div>';
    for (const c of entry.connections) {
      const target = INDEX[c.target_id];
      const sp = c.spoiler ? ' is-spoiler' : '';
      const clickable = target ? ' onclick="showEntry(\'' + c.target_id + '\')"' : '';
      
      html += '<div class="conn-card' + sp + '"' + clickable + '>';
      html += '<div class="conn-target">' + escHtml(c.target_name);
      if (target) {
        html += '<span class="conn-source-file">' + FILE_FOR[c.target_id] + '.json</span>';
      } else {
        html += '<span class="unresolved">UNRESOLVED</span>';
      }
      if (c.spoiler) html += '<span class="spoiler-badge" style="margin-left:4px">Spoiler</span>';
      html += '</div>';
      html += '<div class="conn-relationship">' + escHtml(c.relationship) + '</div>';
      
      if (target && target.summary) {
        html += '<div class="conn-summary">' + escHtml(target.summary) + '</div>';
      }
      html += '</div>';
    }
  }
  
  // Incoming connections
  const incoming = [];
  for (const [eid, e] of Object.entries(INDEX)) {
    if (eid === id) continue;
    for (const c of (e.connections || [])) {
      if (c.target_id === id) {
        incoming.push({ from_id: eid, from_name: e.name, relationship: c.relationship, spoiler: c.spoiler });
      }
    }
  }
  
  if (incoming.length) {
    html += '<div class="section-title" style="margin-top:28px">Referenced By (' + incoming.length + ')</div>';
    for (const inc of incoming) {
      const sp = inc.spoiler ? ' is-spoiler' : '';
      html += '<div class="conn-card' + sp + '" onclick="showEntry(\'' + inc.from_id + '\')">';
      html += '<div class="conn-target">' + escHtml(inc.from_name);
      html += '<span class="conn-source-file">' + FILE_FOR[inc.from_id] + '.json</span>';
      if (inc.spoiler) html += '<span class="spoiler-badge" style="margin-left:4px">Spoiler</span>';
      html += '</div>';
      html += '<div class="conn-relationship">' + escHtml(inc.relationship) + '</div>';
      html += '</div>';
    }
  }
  
  // DM Notes
  if (entry.dm_notes) {
    html += '<div class="section-title" style="margin-top:28px">DM Notes</div>';
    html += '<div class="dm-notes">';
    html += '<div class="dm-notes-label">For DM Eyes Only</div>';
    html += '<div class="dm-notes-content">' + escHtml(entry.dm_notes) + '</div>';
    html += '</div>';
  }
  
  content.innerHTML = html;
  document.getElementById('main').scrollTop = 0;
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// Search
document.getElementById('search').addEventListener('input', (e) => {
  buildNav(e.target.value);
});

// Keyboard shortcut
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== document.getElementById('search')) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('search').value = '';
    document.getElementById('search').blur();
    buildNav();
  }
});

// Init
buildNav();
</script>
