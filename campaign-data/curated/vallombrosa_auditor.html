ding or restoring Saint Viro's protections. Lucia's willingness to share knowledge increases as the crisis worsens, making her a natural ally who becomes more useful as trust develops."}, {"id": "vava", "type": "faction", "name": "The Venturian Academy of Veiled Arts", "aliases": ["VAVA", "The Academy", "Veiled Arts"], "tags": ["high_quarter", "magic", "academy", "institution", "veil_archive", "forbidden_research", "dorian_silvermarch", "donor_pressure", "surveillance"], "spoiler": false, "summary": "Venturia's prestigious magical institution. Officially forbidden from researching Vallombrosa or the city's fey-touched nature — not by written policy, but by the threat of wealthy donors pulling funding. The Archmagister sits on a sealed archive of two centuries of research he can't release.", "details": [{"label": "Mission", "content": "Advancing magical knowledge, training wizards and scholars, providing magical services to Venturia's government and citizens. Consultation on magical problems, enchantment services, and one of the finest magical libraries in the region.", "spoiler": false}, {"label": "Leadership", "content": "Archmagister Dorian Silvermarch, a high elf who has taught for nearly a century and served as Archmagister for forty years. Brilliant, charming, genuinely loves teaching — and privately convinced that understanding Venturia's fey-touched nature is the most important magical research question of the age. He also holds a seat on the Autumn Council.", "spoiler": false}, {"label": "The Institutional Constraint", "content": "VAVA is forbidden from researching Vallombrosa, the fog, or fey-touched quirks. This isn't written policy — it's enforced by wealthy donor families who don't want their children near dangerous supernatural research. Faculty who ignore this face demotion, funding loss, and career destruction. The message: study anything you want as long as it has nothing to do with why Venturia is the way it is.", "spoiler": false}, {"label": "The Veil Archive", "content": "Locked in the deepest restricted section, accessible only to the Archmagister with three separate keys held by different senior faculty. Contains two hundred years of research notes, experimental results, and theoretical work about Vallombrosa from VAVA's first century when such research was prestigious. Contents include detailed fog accounts, magical theory suggesting the fog boundary is constructed rather than spontaneous, and maps showing fey-touched effects intensify near Vallombrosa. Dorian has read every word.", "spoiler": true}, {"label": "The Underground", "content": "The prohibition creates an underground of secret researchers who can't let the questions go. VAVA has unofficial monitors — senior faculty who report suspicious activity, librarians tracking restricted text access, students who inform for better grades. The atmosphere of mutual surveillance breeds paranoia among those most committed to understanding Venturia's nature.", "spoiler": true}, {"label": "Crisis Response", "content": "Officially, the Academy maintains that supernatural manifestations are a security matter for the Watch. Unofficially, dozens of scholars are desperately studying these phenomena. Some want to capture The Bound as research subjects. Others conduct unauthorized divination. Dorian chooses selective blindness — as long as it's not public and doesn't endanger students, he won't crack down.", "spoiler": true}, {"label": "Marcello Crisis", "content": "Marcello's arrival creates VAVA's greatest crisis. Too dramatic to ignore, too academically fascinating to resist, too threatening for donors. Dorian faces impossible choices: maintain prohibition and lose scholars, relax rules and lose funding, or satisfy no one. The Veil Archive becomes critically relevant as the only comprehensive record of historical research into phenomena now actively manifesting.", "spoiler": true}], "connections": [{"target_id": "dorian_silvermarch", "target_name": "Archmagister Dorian Silvermarch", "relationship": "Academy leader, Autumn Council member, keeper of the Veil Archive", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Faculty member — brilliant but increasingly erratic", "spoiler": false}, {"target_id": "roxy", "target_name": "Roxy", "relationship": "First-year student maintaining a facade of magical competence", "spoiler": false}], "dm_notes": "VAVA's institutional politics are a campaign-long thread. The Veil Archive is a critical investigation resource that requires earning Dorian's trust or forcing his hand. The surveillance culture creates paranoia that could affect Kryton (secret research?) and Roxy (her powers aren't academic). The catastrophic historical incidents — the divination student who never woke, the transmutation professor who went mad, the memory cascade that killed two students — are usable as warnings or investigative leads."}, {"id": "covenant_silver_scales", "type": "faction", "name": "The Covenant of Silver Scales", "aliases": ["The Covenant", "Silver Scales", "Covenant of Silver Scales"], "tags": ["merchant", "contracts", "binding_magic", "loren_asteri", "registry_broken_oaths", "di_errante_records", "supernatural_oaths", "high_quarter"], "spoiler": false, "summary": "Venturia's premier merchant association specializing in high-value commercial agreements, contract law, and complex business arrangements. Led by Loren Asteri — Car's father — who has discovered that contracts in Venturia sometimes carry supernatural weight.", "details": [{"label": "Function", "content": "Named for the silver scales of justice and silver coins of commerce. The people you go to when you need an unbreakable contract, a complicated partnership negotiated, or a commercial disagreement mediated. Unlike the Harbor Wardens who focus on maritime trade, the Covenant specializes in the legal and contractual infrastructure of commerce.", "spoiler": false}, {"label": "Leadership", "content": "Led by Loren Asteri (mid-40s), Car's father. Old money, self-made fortune, impeccably dressed, unfailingly polite, absolutely ruthless about upholding the letter of agreements. Has made studying contract magic and binding oaths a personal hobby alongside his commercial work.", "spoiler": false}, {"label": "Supernatural Contract Binding", "content": "Loren has documented cases where contracts in Venturia carry supernatural weight without intentional spell casting — especially agreements made within sight of Vallombrosa. Oath-breakers experience sudden financial disasters, souring relationships, or mild curses. The Covenant has been quietly exploiting this, ensuring important contracts are negotiated in high-binding locations without telling clients why.", "spoiler": true}, {"label": "The Registry of Broken Oaths", "content": "A confidential record of every significant contract breach in Venturia going back over a century. Contains embarrassing secrets about many powerful people and families. Loren has noticed supernatural consequences for oath-breaking have increased over the past fifty years — whatever magical influence affects Venturia is getting stronger.", "spoiler": true}, {"label": "The di Errante Contract", "content": "The Covenant has found fragmentary evidence that the di Errante family was negotiating a massive contract or agreement right before their tragedy. References to 'terms being finalized' and 'considerations of significant value changing hands,' but actual details have been lost or deliberately destroyed. Loren is obsessed with finding out what this agreement was.", "spoiler": true}, {"label": "Crisis Response", "content": "When Silas creates The Bound, the Covenant is disturbed because supernatural compulsion violates free agreement. Loren will try to determine if The Bound operate under twisted contracts or purely coercive magic. When Marcello arrives, Loren will immediately want to know what agreements the di Errante heir might be pursuing.", "spoiler": true}], "connections": [{"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Car is Loren's daughter; she rejected the family business but the connection remains", "spoiler": false}, {"target_id": "covenant_archive", "target_name": "The Covenant Archive", "relationship": "The Archive is the Asteri family's institution — connected through Loren and his family's legal traditions", "spoiler": false}, {"target_id": "harbor_wardens", "target_name": "The Harbor Wardens' Compact", "relationship": "Cooperate on commercial matters but compete for economic influence", "spoiler": false}], "dm_notes": "The Covenant connects to campaign themes of binding oaths, fey contracts, and the Keeper of Faces. The di Errante contract fragments are critical plot material. Loren being Car's father creates personal stakes — the party has a family connection to one of Venturia's most politically powerful and knowledgeable NPCs, but accessing his resources means Car navigating family tension. The Registry of Broken Oaths is both investigation resource and political leverage."}, {"id": "fog_wardens", "type": "faction", "name": "The Fog Wardens and the Shadowed Wardens", "aliases": ["The Watch", "City Watch", "Fog Wardens", "Shadowed Wardens", "The Wardens"], "tags": ["law_enforcement", "supernatural", "containment_protocols", "thora_ironmark", "surveillance", "shadowed_wardens", "registry", "fog_boundary"], "spoiler": false, "summary": "Venturia's law enforcement and security force. The visible Watch patrols streets and responds to problems. The secretive Shadowed Wardens handle supernatural threats. Most citizens only know about the regular Watch.", "details": [{"label": "Structure", "content": "Organized as a visible public force that patrols streets and responds to immediate problems, plus a much smaller covert division — the Shadowed Wardens — who handle supernatural threats specifically. The Fog Wardens patrol the boundary at the Overlook. Most citizens only know about the regular Watch.", "spoiler": false}, {"label": "Leadership", "content": "Captain-Commander Thora Ironmark (female half-orc, 40s). Rose through the ranks over twenty years. Tough, fair-minded, deeply protective of Venturia's citizens. Commands the Shadowed Wardens directly, which means she knows things about Venturia's supernatural nature that keep her up at night. Holds the Watch Commander seat on the Autumn Council.", "spoiler": false}, {"label": "Supernatural Incident Records", "content": "The Shadowed Wardens have maintained secret records of supernatural incidents for nearly two hundred years. Phenomena cluster around certain locations and times of year, particularly the Autumn Masquerade and near Vallombrosa's boundary. They've documented dozens of impossible abilities, reality bending, and supernatural creature appearances. They've tracked every disappearance into the fog.", "spoiler": true}, {"label": "The Containment Protocols", "content": "Procedures developed over generations for dealing with supernatural threats without public panic: methods for disposing of supernatural creatures, techniques for memory alteration or information suppression, and contingency plans for catastrophic scenarios including 'what to do if Vallombrosa's fog expands beyond current boundaries.' Thora is deeply uncomfortable with the memory manipulation protocols but understands why they exist.", "spoiler": true}, {"label": "Registry of Supernatural Individuals", "content": "A confidential registry of individuals displaying supernatural abilities or unusual connections to Venturia's fey-touched nature. Ostensibly for protection and monitoring, but Thora recognizes how easily it could be weaponized. She's trying to reform the Wardens toward protection over surveillance, facing resistance from traditionalists.", "spoiler": true}, {"label": "Crisis Response", "content": "When Silas's activities begin, the Watch is on the front lines — dealing with The Bound, protecting civilians from The Leaked, struggling with how much to share publicly. Thora will be looking for capable individuals like the PCs to handle threats the Watch can't. When Marcello arrives, Thora will have deep suspicions — the Wardens' historical records suggest the di Errantes were never entirely what they appeared.", "spoiler": true}], "connections": [{"target_id": "thora_ironmark", "target_name": "Captain-Commander Thora Ironmark", "relationship": "Watch Commander and Autumn Council member", "spoiler": false}, {"target_id": "fog_wardens_garrison", "target_name": "The Fog Wardens' Garrison", "relationship": "Primary Watch post at the Vallombrosa boundary", "spoiler": false}, {"target_id": "noname", "target_name": "Noname", "relationship": "Fog Warden stationed at the Overlook; her fiancé disappeared from duty", "spoiler": false}], "dm_notes": "Thora is the most likely early ally on the council — she needs help and isn't too proud to ask for it. The Containment Protocols' memory manipulation techniques echo the campaign's themes around stolen/altered memories. The supernatural registry could include PCs or their connections, creating tension. Thora's unauthorized operations are leverage the party can use as sword or olive branch."}, {"id": "liminal_house", "type": "faction", "name": "Liminal House", "aliases": ["The House", "The Liminal House"], "tags": ["fog_children", "institution", "abbey_connection", "information_suppression", "del_varco", "aldric", "alumni_network", "naming_convention"], "spoiler": false, "summary": "A 400-year-old institution caring for fog children — people who appear from Vallombrosa with no memories. Founded by Brother Aldric of St. Viro's Abbey. Three PCs grew up here. Operates under strict policies of not investigating children's origins.", "details": [{"label": "Foundation", "content": "Founded approximately 400 years ago by Brother Aldric, a scholar-monk at St. Viro's Abbey, after the first fog children began appearing. His reasoning: 'These children bear marks we do not fully understand. To house them within sacred walls might bring them peace, or it might invite what follows them into our sanctuary. Better they have their own place, watched over but separate.'", "spoiler": false}, {"label": "Operating Principles", "content": "Five principles established by Aldric: no investigation of origins, no records of arrival circumstances, teach practical skills for building futures, foster community bonds between residents, and maintain Abbey connection. Children receive the surname 'del Varco' (of the crossing/passage) until they choose their own.", "spoiler": false}, {"label": "Population", "content": "Shelters 30-40 children ages 5-18 at any time. Children arrive between ages 5-12, stay until age 18 or independent living. Arrivals are irregular — sometimes three in one month, then none for half a year. Directors have noticed patterns but can't predict arrivals.", "spoiler": false}, {"label": "What They Actually Know", "content": "Successive directors have quietly understood: the children are connected to Vallombrosa. Some wandered into the fog decades or centuries ago and emerged unchanged while time passed outside. Others may be born inside Vallombrosa and expelled or escaped. The institution knows far more than it tells residents.", "spoiler": true}, {"label": "Reasons for Suppression", "content": "The policy of non-investigation isn't just kindness — it's protective. Past attempts to investigate fog children's origins triggered disturbing reactions: children who recovered memories experienced psychological breaks, some began sleepwalking toward the fog boundary, others exhibited temporary supernatural abilities. The institution learned that some questions are dangerous to ask.", "spoiler": true}], "connections": [{"target_id": "abbey_of_saint_viro", "target_name": "The Abbey of Saint Viro", "relationship": "Parent institution — the Abbey founded Liminal House and provides primary funding", "spoiler": false}, {"target_id": "noname", "target_name": "Noname", "relationship": "Grew up here; her father was himself a fog child raised at the House", "spoiler": false}, {"target_id": "valentro", "target_name": "Valentro", "relationship": "Raised here after being orphaned", "spoiler": false}, {"target_id": "orabella", "target_name": "Orabella", "relationship": "Appeared from Vallombrosa as a fog child; raised here", "spoiler": false}], "dm_notes": "The del Varco naming convention is a nice worldbuilding detail for fog child NPCs. The dangerous reactions to origin investigation (sleepwalking toward fog, temporary supernatural abilities) are usable in play if PCs push too hard on fog child backstories. The arrival pattern data — correlated with activity inside Vallombrosa — is a late-game investigation resource."}, {"id": "masquers_sodality", "type": "faction", "name": "The Masquers' Sodality", "aliases": ["Masquers' Sodality", "Masquers", "The Maskmakers"], "tags": ["guild", "masks", "craft", "festival_committee", "masquerade", "market_tiers", "third_floor"], "spoiler": false, "summary": "The master maskmakers of Venturia, founded shortly after the Tragedy of Vallombrosa transformed the Autumn Masquerade into a cultural institution. Three guild members sit on the Festival Committee. Their understanding of what masks mean in Venturia goes deeper than craft.", "details": [{"label": "Organizational Role", "content": "The Sodality's relationship with the Masquerade runs deeper than commerce. Three members sit on the Festival Committee overseeing the annual celebration. The Master of Revels who coordinates public festivities has been a senior Masquer for as long as anyone can remember. During Masquerade season, workshops run day and night.", "spoiler": false}, {"label": "Connection to Veil Court", "content": "The Veil Court maintains and sponsors the Sodality as part of their cultural preservation mission. Senior Masquers may have connections to both organizations, creating an overlap between the craft guild and the semi-secret society.", "spoiler": false}, {"label": "PC Connection", "content": "Caravel is an apprentice at the Sodality, giving the party insider access to the guild's workings and politics. Her friend died at the Autumn Masquerade — connected to the guild's deeper activities.", "spoiler": false}], "connections": [{"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Apprentice — the party's insider access to the guild", "spoiler": false}, {"target_id": "veil_court", "target_name": "The Veil Court", "relationship": "The Court sponsors and maintains the Sodality as part of its cultural mission", "spoiler": false}, {"target_id": "amaranth_theater", "target_name": "The Amaranth Theater", "relationship": "Provides masks and costumes for productions", "spoiler": false}], "dm_notes": "The faction entry is intentionally lean — the location entry covers the workshop, hierarchy, third floor mystery, and Masquerade season dreams in detail. This entry focuses on the organizational/political role. Car's apprenticeship is the party's primary entry point into both the Sodality and, through it, the Veil Court."}, {"id": "covenant_archive", "type": "faction", "name": "The Covenant Archive", "aliases": ["Covenant Archive", "The Archive"], "tags": ["legal", "contracts", "binding_agreements", "asteri_family", "high_quarter", "deep_archive"], "spoiler": false, "summary": "A family-run legal institution handling binding contracts and formal agreements. In a city where promises carry unusual weight, this is not a minor business. Run by the Asteri family — Car's family.", "details": [{"label": "Function", "content": "Maintains Venturia's collection of witnessed contracts, binding agreements, and sworn oaths on specially prepared vellum. Citizens who want their promises to carry legal weight come here. The Archivists speak words in an old language before applying their seals. The Archive has never needed to pursue a breach through ordinary courts.", "spoiler": false}, {"label": "Asteri Family Connection", "content": "The Archive is run by the Asteri family. Car's father Loren Asteri also leads the Covenant of Silver Scales, connecting the Archive's legal traditions to the broader merchant association. Car rejected the family business in favor of the Masquers' Sodality.", "spoiler": false}, {"label": "PC Access", "content": "Car's family connection provides a potential entry point to the Archive's resources, but it comes with family tension — she left this world behind, and returning to ask for access means navigating that relationship.", "spoiler": false}], "connections": [{"target_id": "caravel", "target_name": "Caravel \"Car\" Asteri", "relationship": "Car's family runs the Archive; she rejected it for the Masquers' Sodality", "spoiler": false}, {"target_id": "covenant_silver_scales", "target_name": "The Covenant of Silver Scales", "relationship": "Connected through the Asteri family — Loren runs both the Silver Scales and the Archive", "spoiler": false}], "dm_notes": "The faction entry is lean — the location entry covers the physical building, deep archive, and di Errante records. This focuses on the organizational and family connections. The Asteri family bridging both the Archive and the Silver Scales makes Car's family more politically significant than she probably realizes."}, {"id": "ferriers_confraternity", "type": "faction", "name": "The Ferriers' Confraternity", "aliases": ["Ferriers", "Ferriers' Confraternity", "The Gondoliers", "Gondoliers' Confraternity"], "tags": ["guild", "gondolas", "canals", "ancient", "pre_curse", "supernatural_water", "old_maren", "midnight_prohibition"], "spoiler": false, "summary": "Venturia's ancient guild of gondola ferriers, predating the curse itself. Every canal falls under their informal jurisdiction. Their Primo Navigante holds a seat on the Autumn Council. They know things about the city's waterways that no one else does.", "details": [{"label": "Political Role", "content": "The Confraternity holds an Autumn Council seat by ancient charter — the Primo Navigante represents their interests alongside the factions. Currently held by Old Maren. Their institutional continuity predating the curse gives them unique historical authority.", "spoiler": false}, {"label": "Ancient Knowledge", "content": "The Confraternity has mapped Venturia's canals for centuries, including waterways that shift, appear only at certain times, or lead to places that shouldn't exist. Their oldest records claim they were ferrying passengers when the di Errante estates still stood. Masters know every waterway including the ones that aren't supposed to exist.", "spoiler": false}, {"label": "Canal Mapping", "content": "Maren's predecessors documented changes in the canal system correlating with supernatural activity — canals that go still before someone disappears, new channels opening overnight near sites where The Bound manifest, tidal patterns in landlocked waterways matching no known moon cycle. Certain route sequences bring a gondola disturbingly close to somewhere that feels like neither Venturia nor the material plane.", "spoiler": true}, {"label": "The Midnight Prohibition", "content": "The Confraternity's refusal to ferry passengers after midnight before the Autumn Masquerade isn't superstition — the canals actually change during that period. Ferriers caught on the water have come back... different.", "spoiler": true}], "connections": [{"target_id": "old_maren", "target_name": "Primo Navigante Old Maren", "relationship": "Confraternity leader and Autumn Council member", "spoiler": false}, {"target_id": "tidekeepers_lodge", "target_name": "The Tidekeeper's Lodge", "relationship": "Sister guild — Tidekeepers guide ships in, Ferriers navigate the canals within", "spoiler": false}], "dm_notes": "The Confraternity's canal maps are a unique investigation resource — supernatural waterway changes correlating with plot events. Old Maren's nephew Alessio (broke the midnight prohibition, came back different) is a hook for earning Maren's trust. The canals changing during Masquerade week is directly connected to the Keeper's influence — the prison boundary weakens during the Masquerade."}]}, "government": {"schema_version": "1.1", "category": "government", "entries": [{"id": "autumn_council", "type": "government", "name": "The Autumn Council", "aliases": ["The Council", "Autumn Council", "City Council"], "tags": ["government", "politics", "gridlock", "venturia", "voting", "council_hall", "high_quarter", "signore_seat"], "spoiler": false, "summary": "Venturia's governing body of eleven seats — ten filled, one empty. Chronically deadlocked, achieving little without extensive negotiation. During crisis, this is catastrophic.", "details": [{"label": "Structure", "content": "Eleven voting members: two Harbor-Lords, two Guild-Masters, two Temple Authority representatives, the Master of the Tidekeeper's Lodge, the Archmagister of VAVA, the Primo Navigante of the Ferriers' Confraternity, the Watch Commander of the Fog Wardens, and an empty honorary seat for the Signore of Venturia. The Council Chair rotates annually among the Harbor-Lords, Guild-Masters, and Temple Authority.", "spoiler": false}, {"label": "Voting Requirements", "content": "Simple majority (6 votes) for routine business. Four-fifths majority (8 votes) for emergency powers, significant taxation, or entering the fog zone. Unanimous vote required to overturn standing laws from the city's founding charter.", "spoiler": false}, {"label": "The Gridlock Problem", "content": "All faction leaders must vote together or get outside support to pass laws, while the non-faction group doesn't have enough votes without help from the factions. Nothing gets done without extensive negotiation. During crisis, this is catastrophic.", "spoiler": false}, {"label": "The Empty Seat", "content": "The Signore's seat has been empty since the last di Errante 'died out.' The seat is honorary, preserved out of tradition. When Marcello arrives claiming the di Errante name, the question of whether he can claim this seat — and whether it carries actual voting power — will throw the council into constitutional crisis.", "spoiler": true}, {"label": "Marcello's Exploitation Strategy", "content": "Marcello doesn't need to control the council — the gridlock already paralyzes it. He charms Harbor-Lords with economic stability promises, offers the Watch expanded authority, and exploits each faction's existing fears. The council's dysfunction is his greatest asset.", "spoiler": true}], "connections": [{"target_id": "teodor_vast", "target_name": "Lord-Admiral Teodor Vast", "relationship": "Harbor-Lord", "spoiler": false}, {"target_id": "constanza_marea", "target_name": "Constanza Marea", "relationship": "Harbor-Lord", "spoiler": false}, {"target_id": "celeste_orion", "target_name": "Master Artisan Celeste Orion", "relationship": "Guild-Master", "spoiler": false}, {"target_id": "vincenzo_copper", "target_name": "Guildmaster Vincenzo Copper", "relationship": "Guild-Master", "spoiler": false}, {"target_id": "lucia_virosdottir", "target_name": "Mother-Abbot Lucia Virosdottir", "relationship": "Temple Authority, current Council Chair", "spoiler": false}, {"target_id": "domenico_four_winds", "target_name": "Father Domenico of the Four Winds", "relationship": "Temple Authority", "spoiler": false}, {"target_id": "vincen_tidecaller", "target_name": "Vincen Tidecaller", "relationship": "Master of the Tidekeeper's Lodge", "spoiler": false}, {"target_id": "dorian_silvermarch", "target_name": "Archmagister Dorian Silvermarch", "relationship": "Archmagister of VAVA", "spoiler": false}, {"target_id": "old_maren", "target_name": "Primo Navigante Old Maren", "relationship": "Primo Navigante of the Ferriers' Confraternity", "spoiler": false}, {"target_id": "thora_ironmark", "target_name": "Captain-Commander Thora Ironmark", "relationship": "Watch Commander of the Fog Wardens", "spoiler": false}], "dm_notes": "The council is a political sandbox. Each member can be an ally, obstacle, or both. The gridlock is a feature, not a bug — it forces the party to build coalitions rather than relying on a single patron. The empty Signore seat is a ticking bomb once Marcello arrives."}, {"id": "teodor_vast", "type": "npc", "name": "Lord-Admiral Teodor Vast", "aliases": ["Teodor", "Lord-Admiral Vast", "The Admiral"], "tags": ["harbor_lord", "autumn_council", "merchant_fleet", "pragmatic", "wealthy", "harbor_wardens"], "spoiler": false, "summary": "Harbor-Lord on the Autumn Council. Controls the largest private merchant fleet in Venturia. Blunt, pragmatic, staggeringly wealthy. Believes what's good for his business is good for Venturia — and he's not entirely wrong.", "details": [{"label": "Description", "content": "Male human, late 50s, commanding presence with weathered features and silver-streaked black hair. Rose from ship's captain to fleet owner through skill, ruthlessness, and strategic marriages. Affects a 'simple sailor' persona when convenient. Has an unsettling habit of remembering every detail of every conversation.", "spoiler": false}, {"label": "Council Position", "content": "Blunt and pragmatic. 'People are scared, trade is suffering, and we're debating theology while ships sit idle in harbor. Pay the party to solve it, pay VAVA to research it, pay whoever needs paying — but solve it and let us get back to business.' Will fund almost anything if convinced it will work.", "spoiler": false}, {"label": "Exploitable Weakness", "content": "His fleet captains are reporting increasingly strange phenomena at sea — time distortions, crew members with false memories, compasses behaving erratically near the island. He's terrified this will spread beyond Venturia and destroy his commercial network. He'll pay almost anything to prevent that.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Harbor-Lord", "spoiler": false}, {"target_id": "harbor_wardens", "target_name": "The Harbor Wardens' Compact", "relationship": "Faction leader", "spoiler": false}, {"target_id": "constanza_marea", "target_name": "Constanza Marea", "relationship": "Fellow Harbor-Lord; they deadlocked two years ago, resolved by Vincen's compromise appointment", "spoiler": false}], "dm_notes": "Teodor is the 'throw money at it' council member. Useful as a funding source but impatient with investigations that don't produce results. The sea phenomena reports are a hook for expanding the campaign beyond Venturia's borders if desired."}, {"id": "constanza_marea", "type": "npc", "name": "Constanza Marea", "aliases": ["Constanza", "Marea"], "tags": ["harbor_lord", "autumn_council", "warehouse_consortium", "ambitious", "undertow_connection", "manipulative"], "spoiler": false, "summary": "Harbor-Lord on the Autumn Council representing the Warehouse Consortium. Sharp-dressed and sharper-tongued. Ambitious, calculating, sees the crisis as an opportunity. Has a secret connection to The Undertow.", "details": [{"label": "Description", "content": "Female human, early 40s. Family has run the largest warehouse complex in the Harbor District for four generations. Newer to the council (three years) but compensates with aggressive political instincts. Unlike Teodor's blunt approach, she prefers elegant manipulation. Not cruel, but definitely self-interested.", "spoiler": false}, {"label": "Council Position", "content": "'The Watch wants martial law, the temples want prayer circles, the guilds want work guarantees — everyone wants power and money. Fine. Let's trade. What does everyone need to feel safe enough to let commerce resume? Let's broker that deal.'", "spoiler": false}, {"label": "Secret Undertow Connection", "content": "She's been meeting secretly with The Undertow's representatives. She either owes them something significant or is working a deal that would horrify the rest of the council. The party could discover this and gain leverage — or become targets if they threaten to expose it.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Harbor-Lord", "spoiler": false}, {"target_id": "the_undertow", "target_name": "The Undertow", "relationship": "Secret meetings with Undertow representatives — leverage or obligation unknown", "spoiler": true}], "dm_notes": "Constanza is the council's deal-maker. She'll work with the party if she sees advantage in it. The Undertow connection is both a vulnerability and a hook — discovering it gives the party political leverage over a council member."}, {"id": "celeste_orion", "type": "npc", "name": "Master Artisan Celeste Orion", "aliases": ["Celeste", "Master Artisan Orion"], "tags": ["guild_master", "autumn_council", "binding_crafts", "liminal_house_connection", "workers_rights", "missing_son", "passionate"], "spoiler": false, "summary": "Guild-Master on the Autumn Council representing the Binding Crafts Guild. Passionate champion of workers' rights, daughter of a Liminal House foundling. Her eldest son vanished three weeks ago.", "details": [{"label": "Description", "content": "Female human, mid-50s, calloused hands and ink-stained fingers. Master of the Binding Crafts Guild (carpenters, masons, shipwrights, construction trades). Daughter of a Liminal House foundling. Built her career from nothing, fiercely protective of workers' rights.", "spoiler": false}, {"label": "Council Position", "content": "'My people are the ones disappearing. My people are the ones The Bound are recruited from. We need protection NOW — more Watch patrols in working districts, hazard pay for anyone working near the fog line, and immediate compensation for families of the disappeared.'", "spoiler": false}, {"label": "Personal Crisis", "content": "Her eldest son vanished three weeks ago. Officially recused from cases involving the disappeared, but privately desperate. Might make irrational decisions or trust the wrong people if they promise information about him.", "spoiler": true}, {"label": "Liminal House Connection", "content": "Being the daughter of a Liminal House foundling gives her personal family connection to the fog child phenomenon. She may have inherited some subtle connection to Vallombrosa's influence, which she's never fully acknowledged.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Guild-Master", "spoiler": false}, {"target_id": "liminal_house", "target_name": "Liminal House", "relationship": "Her parent was a Liminal House foundling", "spoiler": false}], "dm_notes": "Celeste's missing son is a personal hook that could connect her to the party. Her Liminal House connection means she might be on the Shadowed Wardens' supernatural registry, which she doesn't know. She's the most emotionally vulnerable council member — an asset for Marcello's manipulation."}, {"id": "vincenzo_copper", "type": "npc", "name": "Guildmaster Vincenzo Copper", "aliases": ["Vincenzo", "Guildmaster Copper"], "tags": ["guild_master", "autumn_council", "metals_guild", "dwarf", "traditionalist", "mirrorwrights"], "spoiler": false, "summary": "Guild-Master on the Autumn Council representing the Metals Guild (smiths, metalworkers, jewelers, Mirrorwrights). Conservative dwarf traditionalist. Takes the seven-generation view of problems — simultaneously wise and frustratingly slow to act.", "details": [{"label": "Description", "content": "Male dwarf, age unclear (appears middle-aged by dwarf standards), elaborate beard jewelry. Family has held Metals Guild leadership for three generations. Conservative, traditionalist, deeply invested in maintaining guild hierarchies and apprenticeship systems. Sees wealth as responsibility rather than indulgence.", "spoiler": false}, {"label": "Council Position", "content": "'The guilds have survived plagues, fires, wars, and three different forms of government. We'll survive this by doing what we've always done — maintaining our standards, protecting our people, and not panicking into stupid decisions. Rush produces shoddy work whether you're forging a sword or writing a law.'", "spoiler": false}, {"label": "Mirrorwright Reports", "content": "The Mirrorwrights have been reporting increasingly disturbing phenomena — mirrors behaving impossibly even for Venturia. He knows this is connected to something big but is trying to handle it internally through guild channels rather than admitting to the council that the crisis is affecting even the most skilled craftspeople.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Guild-Master", "spoiler": false}, {"target_id": "mirrorwrights_court", "target_name": "The Mirrorwright's Court", "relationship": "The Mirrorwrights fall under his Metals Guild jurisdiction", "spoiler": false}], "dm_notes": "Vincenzo's Mirrorwright connection is the political bridge to the mirror investigation thread. The disturbing mirror phenomena are connected to the Keeper of Faces' influence. His traditionalist patience is both obstacle (won't act quickly) and asset (won't be easily manipulated by Marcello's urgency)."}, {"id": "lucia_virosdottir", "type": "npc", "name": "Mother-Abbot Lucia Virosdottir", "aliases": ["Lucia", "Mother-Abbot", "Mother-Abbot Lucia"], "tags": ["temple_authority", "autumn_council", "council_chair", "abbey_leader", "saint_viro", "hidden_knowledge", "ward_fragments"], "spoiler": false, "summary": "Temple Authority on the Autumn Council, current Council Chair, and leader of the Abbey of Saint Viro. Wise and compassionate but increasingly weary as the crisis challenges her faith. Holds historical knowledge she's bound by tradition not to reveal.", "details": [{"label": "Description", "content": "Female human, early 70s, commanding presence despite slight frame. Forty years of service in the Abbey. Genuinely devoted to Saint Viro's teachings. Her family has deep roots in Venturia — ancestors were among the city's founders.", "spoiler": false}, {"label": "Council Position", "content": "'We pray, we provide sanctuary, we tend to the afflicted — but I won't lie to you. This is beyond our usual ministrations. The Abbey's scholars are researching historical precedents, but...' [pause, visible weight] '...we may need to accept that some evils require steel and spell as much as prayer.'", "spoiler": false}, {"label": "Hidden Knowledge", "content": "The Abbey archives contain records from before the curse — testimony from witnesses of the fog's arrival, accounts from the first generation after the tragedy. She's bound by centuries-old Abbey tradition not to reveal certain information, but the crisis is making her question whether that tradition serves the living or just protects the dead's secrets.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Temple Authority, current Council Chair", "spoiler": false}, {"target_id": "abbey_of_saint_viro", "target_name": "The Abbey of Saint Viro", "relationship": "Abbey leader — Mother-Abbot", "spoiler": false}, {"target_id": "viros_respite", "target_name": "St. Viro's Respite", "relationship": "The Respite operates under Abbey oversight", "spoiler": false}], "dm_notes": "Lucia is the most sympathetic council member for the party — she genuinely wants to help but is constrained by tradition and politics. Her willingness to share knowledge scales with the party's demonstrated trustworthiness and the crisis severity. The ward fragments are a major Act Two/Three plot thread she can introduce."}, {"id": "domenico_four_winds", "type": "npc", "name": "Father Domenico of the Four Winds", "aliases": ["Domenico", "Father Domenico"], "tags": ["temple_authority", "autumn_council", "interfaith", "optimistic", "ship_chaplain", "coalition_builder"], "spoiler": false, "summary": "Temple Authority on the Autumn Council representing smaller temples and wandering clergy. Former ship's chaplain, natural coalition-builder, energetic and optimistic. His insight that Venturia's prosperity 'came from somewhere' is more right than he knows.", "details": [{"label": "Description", "content": "Male human, late 30s, weather-worn and restless. Was a ship's chaplain for fifteen years before settling in Venturia five years ago. Represents priests of travel gods, maritime deities, fortune and trade. More activist than contemplative — organized disaster relief, mediated disputes, built interfaith networks.", "spoiler": false}, {"label": "Council Position", "content": "'Venturia's prosperity came from somewhere. Maybe there's a price we've been unconsciously paying, and now it's coming due. We need to understand what bargain was made — who made it, what was promised, what was received. This isn't about blame. It's about understanding what we're actually dealing with.'", "spoiler": false}, {"label": "Exploitable Weakness", "content": "His optimism makes him susceptible to manipulation. He wants to believe people are fundamentally good and situations can be resolved through dialogue. This makes him vulnerable to Marcello's charm — or an unexpected ally if the party earns his trust.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Temple Authority", "spoiler": false}], "dm_notes": "Domenico's 'prosperity came from somewhere' insight is dramatically ironic — he's closer to the truth than anyone except the Abbey. His optimism and naivety make him a potential Marcello target, which could create a dramatic moment if the party has to convince an ally that the charming newcomer is dangerous."}, {"id": "vincen_tidecaller", "type": "npc", "name": "Vincen Tidecaller", "aliases": ["Vincen", "Tidecaller"], "tags": ["autumn_council", "tidekeepers_lodge", "hidden_knowledge", "traditional", "quiet", "compromise_candidate"], "spoiler": false, "summary": "Master of the Tidekeeper's Lodge, holding an Autumn Council seat by ancient charter. Quiet, thoughtful, speaks rarely but everyone listens. Carries generations of Tidekeeper knowledge. Knows something specific about Vallombrosa's history that he's not sharing.", "details": [{"label": "Description", "content": "Male human, 60s, permanent squint from decades of watching horizons. Not wealthy like other council members — his influence comes from the Lodge's essential function and accumulated knowledge. Compromise candidate when Teodor and Constanza deadlocked on a vote two years ago. More interested in protecting the Lodge's independence than playing politics.", "spoiler": false}, {"label": "Council Position", "content": "'The waters have been strange for months. The fog moves wrong. Something's waking up that was sleeping, or something sleeping is dying. This isn't a problem you throw money at — it's older than your warehouses and your trade routes. We need to understand it before we act.'", "spoiler": false}, {"label": "Hidden Knowledge", "content": "He knows something specific about Vallombrosa's history that he's not sharing — something the Tidekeepers recorded centuries ago. The party could earn his trust and learn it, or discover he's been deliberately withholding information that could have saved lives.", "spoiler": true}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Master of the Tidekeeper's Lodge", "spoiler": false}, {"target_id": "tidekeepers_lodge", "target_name": "The Tidekeeper's Lodge", "relationship": "Lodge Master", "spoiler": false}], "dm_notes": "Vincen is the 'earn trust to unlock knowledge' NPC. His hidden information should be significant enough to justify the effort. Old Maren is the only council member he seems to genuinely respect — their shared perspective could make them a voting bloc if the party brokers it."}, {"id": "thora_ironmark", "type": "npc", "name": "Captain-Commander Thora Ironmark", "aliases": ["Thora", "Captain-Commander Ironmark", "Watch Commander", "Thora Iron"], "tags": ["watch_commander", "autumn_council", "shadowed_wardens", "half_orc", "pragmatic", "isolated", "swing_vote", "unauthorized_operations"], "spoiler": false, "summary": "Watch Commander of the Fog Wardens and Autumn Council member. Half-orc veteran, direct without being cruel. Commands the Shadowed Wardens — Venturia's covert supernatural response division. Votes alone, making her a critical but isolated swing vote.", "details": [{"label": "Description", "content": "Female half-orc, 40s, scarred and imposing. Rose through Watch ranks over twenty years. Decorated veteran of the Harbor District fires, the Undertow purge of '47, and the Bleached Tide incident. Appointed Captain-Commander three years ago as a compromise candidate — every faction wanted someone competent but not politically ambitious. She doesn't want political power. She wants to protect people and be left alone to do it properly.", "spoiler": false}, {"label": "Personality", "content": "Direct, says what she means. Cuts through political maneuvering with 'so what are we actually doing about it.' Tough on officers in a way that earns loyalty — hard standards, fair enforcement, refuses to let political pressure roll downhill. When the Harbor-Lords leaned on the Watch about a customs dispute, she told Teodor to his face that his ships would be inspected like everyone else's. He backed down. Her officers still talk about it.", "spoiler": false}, {"label": "The Weight She Carries", "content": "Commands the Shadowed Wardens directly — she's seen things that would shake the council's confidence in reality. She can't fully explain her positions because doing so requires sharing classified intelligence that would cause public panic. So she sits in council meetings listening to people debate theory while she knows what's actually happening at the fog boundary. It makes her seem more aggressive than she is — when she pushes for expanded authority, it's desperation, not a power grab.", "spoiler": false}, {"label": "Council Position", "content": "'I'm not going to stand here and tell you the Watch can handle this with our current resources and authority, because that would be a lie, and I don't do that. My people are stretched thin dealing with manifestations you don't hear about because we handle them before they make the morning gossip. I'm not asking to suspend anyone's rights. I'm asking you to let me do my job.'", "spoiler": false}, {"label": "Unauthorized Operations", "content": "She's been authorizing Shadowed Warden operations that technically exceed her mandate — not corruption, but because waiting for council approval at two in the morning gets people killed. If exposed, every faction would use it against her. The party could discover this and gain either an enemy or the most reliable ally on the council, depending entirely on how they handle it.", "spoiler": true}, {"label": "Council Relationships", "content": "Votes alone — critical swing vote with no natural allies. Respects Vincen Tidecaller's honesty. Finds Dorian frustrating (senses he's hiding useful knowledge). Tolerates the Guild-Masters' suspicion. Grudging respect for Constanza's good-faith negotiation. Finds Teodor exhausting. Thinks Domenico means well but is dangerously naive.", "spoiler": false}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Watch Commander, critical swing vote", "spoiler": false}, {"target_id": "fog_wardens", "target_name": "The Fog Wardens and Shadowed Wardens", "relationship": "Commands both the visible Watch and the covert Shadowed Wardens", "spoiler": false}], "dm_notes": "Thora is the most likely early council ally — she needs help and asks for it directly. Her unauthorized operations are the best leverage/trust hook for the party's council relationship. Write her as a competent professional drowning in a crisis beyond her resources, not as a power-hungry authoritarian. She reads more than most of the council, changes her mind with better information, and asks good questions."}, {"id": "old_maren", "type": "npc", "name": "Primo Navigante Old Maren", "aliases": ["Old Maren", "Maren", "Primo Navigante"], "tags": ["autumn_council", "ferriers_confraternity", "canals", "ancient_knowledge", "deliberate", "unsettling", "nephew_alessio"], "spoiler": false, "summary": "Primo Navigante of the Ferriers' Confraternity and Autumn Council member. Age uncertain, silver-streaked hair, hands that haven't lost their grip. Deliberate in everything — answers questions several seconds late, as though listening to something else finish first.", "details": [{"label": "Description", "content": "Female human, age uncertain (could be sixty, could be eighty — the canal light makes it hard to tell). 'Old Maren' is the only name anyone uses; asking for a family name is considered poor form. Earned mastery at an unusually young age — completed the Blind Navigation (piloting blindfolded through canals for an entire night) faster than anyone in living memory. Led the Confraternity for over twenty years.", "spoiler": false}, {"label": "Personality", "content": "Everything about Maren is deliberate — how she speaks, where she looks, when she chooses silence. Has the unnerving habit of answering questions several seconds after they're asked, as though listening to something else finish. Not unkind, but deeply private and almost impossible to read. Treats council meetings with patient tolerance of someone watching children argue about things they don't understand. Speaks in short, certain sentences. Does not explain her reasoning. Does not repeat herself.", "spoiler": false}, {"label": "Council Position", "content": "'The water knows. It's been restless for months — currents running wrong, reflections lagging, sounds carrying from places that aren't there. We've pulled our boats from certain routes already. The ones that go too close to the old waterways.' [Long pause.] 'You're all arguing about what's happening in the streets. That's not where this starts. It starts underneath.'", "spoiler": false}, {"label": "What She Knows", "content": "The Confraternity has mapped canal changes correlating with supernatural activity for centuries. Certain route sequences bring a gondola close to somewhere that feels like neither Venturia nor the material plane. The midnight Masquerade prohibition exists because the canals actually change during that period — ferriers caught on the water come back different.", "spoiler": true}, {"label": "Exploitable Weakness", "content": "Her nephew Alessio, a journeyman ferrier, broke the midnight prohibition on a dare and hasn't been the same since. He's functional but steers toward canal junctions that don't exist during daylight and responds to questions no one asked. Maren is handling this internally, refusing outside scrutiny into Confraternity secrets. The party could discover Alessio and use leverage — or help him and earn Maren's trust, which is worth considerably more than her compliance.", "spoiler": true}, {"label": "Council Relationships", "content": "Votes with no one consistently. Supports the Tidekeepers more often than not — Vincen is the only member she seems to genuinely respect. Opposes Thora's emergency powers not from principle but because she considers the Watch incapable of understanding what they'd be policing. Finds the Harbor-Lords' transactional worldview irrelevant. Watches Dorian with something that might be sympathy and might be suspicion — people who keep the same kind of secrets recognize each other.", "spoiler": false}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Primo Navigante of the Ferriers' Confraternity", "spoiler": false}, {"target_id": "ferriers_confraternity", "target_name": "The Ferriers' Confraternity", "relationship": "Confraternity leader", "spoiler": false}, {"target_id": "vincen_tidecaller", "target_name": "Vincen Tidecaller", "relationship": "The only council member she seems to genuinely respect", "spoiler": false}], "dm_notes": "Old Maren is one of the best NPCs in the campaign. Her delayed responses, her certainty, her canal knowledge — she should feel like someone who exists partially in a different version of reality. Alessio is the primary hook for earning her trust. The 'it starts underneath' line is literally true — the canals connect to the prison's influence in ways the surface world doesn't. Her recognition of Dorian as a fellow secret-keeper is great character work at the table."}, {"id": "dorian_silvermarch", "type": "npc", "name": "Archmagister Dorian Silvermarch", "aliases": ["Dorian", "Archmagister Silvermarch", "The Archmagister"], "tags": ["autumn_council", "vava", "high_elf", "archmagister", "veil_archive", "institutional_politics", "scholar", "conflicted"], "spoiler": false, "summary": "Archmagister of VAVA and Autumn Council member. High elf, nearly two centuries old, warm eyes that miss nothing. Brilliant, charming, genuinely loves teaching — and privately sitting on a sealed archive of potentially life-saving research he can't release without destroying his institution.", "details": [{"label": "Description", "content": "Male high elf, appears middle-aged by elven standards (nearly two centuries old). Has taught at VAVA for close to a century and served as Archmagister for forty years. Rare academic who is both genuinely brilliant and genuinely likable — his lectures made obscure magical theory feel urgent and alive.", "spoiler": false}, {"label": "The Two Dorians", "content": "Charming, curious, enthusiastic about ideas. But underneath — the calculating administrator who has spent four decades managing wealthy donors who'll pull funding if forbidden research goes public. Can seem warm one moment, coldly political the next. When he demotes researchers for pursuing Vallombrosa studies, he does so with real regret and absolute firmness. He's made peace with being a hypocrite — he just hasn't made peace with enjoying the knowledge he denies others.", "spoiler": false}, {"label": "Council Position", "content": "'The Academy's position is clear — these manifestations are a security matter for the Watch and a spiritual matter for the Abbey.' [Then quietly, to someone he trusts:] 'Of course, that's the institutional answer. The real answer is that I have fifty scholars conducting unauthorized research as we speak, and I'm choosing not to notice because we may need what they find.'", "spoiler": false}, {"label": "Exploitable Weakness", "content": "The Veil Archive — he knows it contains research critical to the current crisis. Maps showing fey-touched effects intensifying near Vallombrosa, detailed fog disappearance accounts, magical theory suggesting the fog boundary is constructed rather than spontaneous. He's sitting on potentially life-saving knowledge because releasing it means destroying VAVA. The right pressure — moral, political, or personal — could crack him open.", "spoiler": true}, {"label": "Council Relationships", "content": "Votes independently, tends toward cautious pragmatism. Supports measured investigation, opposes anything destabilizing (because instability threatens VAVA's funding). Gets along with Temple Authority on scholarly matters, respects the Tidekeepers' long view. Finds Thora's emergency powers alarming because expanded Watch authority might include the right to search VAVA's restricted archives.", "spoiler": false}], "connections": [{"target_id": "autumn_council", "target_name": "The Autumn Council", "relationship": "Archmagister of VAVA", "spoiler": false}, {"target_id": "vava", "target_name": "The Venturian Academy of Veiled Arts", "relationship": "Academy leader and keeper of the Veil Archive", "spoiler": false}, {"target_id": "kryton", "target_name": "Kryton Novelli", "relationship": "Faculty member — Dorian is likely aware of Kryton's erratic behavior and possibly his unauthorized research", "spoiler": false}], "dm_notes": "Dorian is the campaign's institutional tragedy — a good man trapped by the system he maintains. His relationship with Kryton (faculty member going off the rails) creates personal stakes. The Veil Archive is one of the most important investigation resources in the campaign. Whether the party earns access through trust, leverage, or crisis should be a significant narrative moment."}]}, "lore": {"schema_version": "1.1", "category": "lore", "entries": [{"id": "ancient_tragedy", "type": "lore", "name": "The Ancient Tragedy of Vallombrosa", "aliases": ["The Tragedy", "di Errante Tragedy", "The Wedding Day", "What Actually Happened"], "tags": ["history", "di_errante", "lorenzo", "marcello_prime", "isabella", "keeper_of_faces", "tartuzi", "wedding", "cosmic_theft", "binding_ritual", "origin"], "spoiler": true, "summary": "The true history of how Lorenzo di Errante bargained with an Archfey to coerce Isabella's love, orchestrated a cosmic theft of the Keeper of Faces' power on his wedding day, murdered both Isabella and his brother Marcello, and created the cursed zone of Vallombrosa. No player knows this history — they grew up hearing contradictory legends.", "details": [{"label": "The Island Before", "content": "Maeve is a large island in the material plane world of Eldoria, comparable to Madagascar in size. The di Errante family owned an enormous private estate spanning thousands of acres along the western coast on elevated ground — essentially a self-contained kingdom with a grand manor, village, farms, vineyards, workshops, private harbor, and family chapel.", "spoiler": false}, {"label": "The Brothers and Isabella", "content": "Marcello di Errante (Marcello Prime) was the elder brother — powerful, fey-touched, genuinely beloved. Isabella Fortuna was a woman of considerable beauty with genuine prophetic abilities who loved Marcello freely. Lorenzo di Errante was the younger brother, perpetually overshadowed, consumed by jealousy and entitlement, unable to accept that Isabella chose Marcello.", "spoiler": true}, {"label": "Lorenzo's Bargain (Seven Years Before the Wedding)", "content": "Lorenzo bargained with the Keeper of Faces for supernatural power to coerce Isabella's love. The price: 'the face you show the world,' collectible seven years later. Lorenzo assumed this meant reputation. The actual price: his literal identity — he would appear as Marcello and be unable to speak his own name. Shortly after, Lorenzo consulted Tartuzi the sphinx, who told him the collection date and provided basic principles of how to bind an Archfey.", "spoiler": true}, {"label": "The Six Years of Manipulation", "content": "Using bargain-granted power, Lorenzo coerced Isabella's love through supernatural means. Her genuine feelings for Marcello were redirected without her knowledge — she believed her love for Lorenzo was real. During these years, Lorenzo exploited her prophetic abilities, planned cosmic-level theft using contract loopholes, and orchestrated the arrival of an adventuring party as unwitting accomplices.", "spoiler": true}, {"label": "The Wedding Day", "content": "Six weeks prior, Isabella's visions showed adventurers arriving on The Emerald Tide. Lorenzo sent them a letter with 100 platinum to ensure their arrival. Isabella hired them — believing she acted independently — to prevent the Keeper from collecting Lorenzo's debt. They traveled through jungle, consulted Tartuzi, and received a binding ritual requiring a mirror, compass, and hourglass plus precise binding words.", "spoiler": true}, {"label": "The Cosmic Theft", "content": "When the Keeper manifested to collect the legitimate debt, the adventuring party activated the binding ritual. The Archfey was trapped — frozen, helpless. This was precisely what Lorenzo orchestrated. He drained massive power from the imprisoned entity. Marcello Prime protectively interposed himself between the party and Lorenzo, creating delay. The stolen power collapsed Isabella's coercion. Her true feelings returned in a horrifying rush of clarity.", "spoiler": true}, {"label": "The Murders and Aftermath", "content": "Isabella confronted Lorenzo with dawning horror. When she could no longer love him, Lorenzo murdered her with stolen power. Marcello attacked in grief and rage. The evenly matched fight destroyed the gardens. Lorenzo ultimately killed Marcello. Tartuzi appeared — pulled by the binding mechanism to become the eternal lock. Both she and the weakened Archfey merged into the imprisonment mechanism. The adventuring party was knocked unconscious and later woke in the estate dungeon, offered poisoned wine.", "spoiler": true}, {"label": "The Curse Activates", "content": "The Keeper's curse activated fully: Lorenzo now appeared as Marcello to all observers. When he tried to speak his own name, only 'Marcello' emerged. His entire identity was stolen — the ultimate ironic punishment from an Archfey whose domain was identity. The di Errante surname ('of the wandering one') proved grimly prophetic.", "spoiler": true}, {"label": "The Transformation of Maeve", "content": "Supernatural fog consumed the di Errante estates, stopping with geometric precision at old property boundaries. The land within became cursed with absence — no growth, no animals, ashen soil, stagnant water. The fog didn't respond to wind, maintained sharp boundaries, and never lifted. Those who entered past the point of no return never came back. The region became known as Vallombrosa — the valley of shadows.", "spoiler": true}, {"label": "Lorenzo's Departure", "content": "Despite stolen power, Lorenzo remained in Vallombrosa for years. The cursed valley offered no validation or recognition. The isolation drove him to wander the world for millennia, searching for something he could never name. He did not return for thousands of years — until the prison began weakening and he discovered Celina's presence.", "spoiler": true}], "connections": [{"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "Lorenzo is the perpetrator of the tragedy, now living as 'Marcello'", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The Archfey who granted Lorenzo's bargain and was subsequently imprisoned", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "The sphinx who provided binding knowledge and was pulled into the prison mechanism", "spoiler": true}, {"target_id": "the_fanes", "target_name": "The Three Fanes", "relationship": "The mirror, compass, and hourglass used in the binding ritual", "spoiler": true}, {"target_id": "vallombrosa", "target_name": "Vallombrosa", "relationship": "The cursed zone created by the tragedy", "spoiler": false}], "dm_notes": "This is the campaign's core secret. Players from Sphinx Twice witnessed much of this but were knocked unconscious before the fight's conclusion — they don't know who won. The key meta-knowledge gap: they don't know whether 'Marcello' is actually Lorenzo cursed to look like his brother, the real Marcello who survived, or something else entirely. This uncertainty should drive investigation for dozens of sessions."}, {"id": "vallombrosa_legends", "type": "lore", "name": "The Legends of Vallombrosa", "aliases": ["The Legends", "What People Believe", "The Stories"], "tags": ["public_knowledge", "culture", "contradictory", "autumn_masquerade", "tragedy_of_vallombrosa", "children", "folklore"], "spoiler": false, "summary": "Every child in Venturia grows up hearing wildly contradictory stories about Vallombrosa. Nobody takes any specific version seriously as historical fact, but everyone knows them as cultural touchstones. The truth is so much worse than any legend.", "details": [{"label": "Universal Agreement", "content": "The only facts everyone agrees on: the di Errante family was wealthy and powerful, something catastrophically bad happened, supernatural fog appeared afterward and never left, everyone inside died or disappeared, the place is dangerous and people who enter don't come back.", "spoiler": false}, {"label": "The Contradictory Versions", "content": "Competing legends include: two brothers fought over a woman (multiple versions of who killed whom and why), the bride was a witch who cursed the estate when jilted, a plague broke out during a feast and the fog contains it, the family were secretly pirates with cursed treasure, 'definitely incest,' a massive fire with coincidental weather, demon deals gone wrong, immortality experiments, the woman was secretly a selkie/vampire/dragon, one brother is still alive inside ruling ghosts, fabulous treasure guarded by undead, and anyone who enters lives their worst fear in an endless loop.", "spoiler": false}, {"label": "Annual Tradition", "content": "During the Autumn Masquerade, 'The Tragedy of Vallombrosa' is performed at the Amaranth Theater — but the plot changes every year depending on which director and which legend version they prefer. Residents bet on which version will be performed and critique the production. It's an ongoing civic joke.", "spoiler": false}, {"label": "What People Actually Think", "content": "Children believe the scary versions completely. Teenagers think it's all stupid superstition and dare each other to touch the fog. Adults assume 'something mundane got exaggerated over centuries.' Scholars note they can't investigate because the fog kills. Elderly residents tell whichever version is most entertaining, changing details for effect. General consensus: 'Something bad definitely happened. The fog is real. The specific details? Who actually knows.'", "spoiler": false}, {"label": "Campaign Significance", "content": "PCs all grew up with Vallombrosa as part of their landscape — spooky but also just there, like living near a supposedly haunted house. They have favorite legend versions but nobody seriously believes any as fact. They don't know about the Keeper of Faces, the cosmic theft, Tartuzi's imprisonment, or that anyone from the ancient tragedy still exists. When they learn the truth, it will be genuinely revelatory.", "spoiler": false}], "connections": [{"target_id": "ancient_tragedy", "target_name": "The Ancient Tragedy of Vallombrosa", "relationship": "The legends are wildly distorted versions of this actual history", "spoiler": true}, {"target_id": "amaranth_theater", "target_name": "The Amaranth Theater", "relationship": "Annual 'Tragedy of Vallombrosa' performance during Masquerade season", "spoiler": false}], "dm_notes": "The legends function like Hocus Pocus — spooky cultural tradition that nobody takes seriously as literal truth. This means the real history hits harder when discovered. Use the contradictory versions as NPC flavor — different characters have different favorite legends. The annual play is a good early-campaign scene-setting opportunity."}, {"id": "unexplained_prosperity", "type": "lore", "name": "The Unexplained Prosperity", "aliases": ["Venturia's Prosperity", "The Good Fortune", "Contagious Luck"], "tags": ["public_knowledge", "agriculture", "maritime", "trade", "fey_influence", "mystery"], "spoiler": false, "summary": "After the tragedy, Maeve became remarkably fertile and prosperous in ways no one can explain. Crops grow better than they should, waters teem with fish, bad weather avoids the island, and ships that port in Venturia report unusually good fortune afterward. Most residents accept this without deep questioning.", "details": [{"label": "The Phenomenon", "content": "Crops grow better than soil and climate warrant. Harvests are consistently bountiful. Waters around Maeve teem with fish far beyond expectations. Bad weather tends to avoid the island. Ships that port in Venturia report unusually good fortune on subsequent voyages — as though luck itself is contagious.", "spoiler": false}, {"label": "Local Explanations", "content": "None definitive: 'The land was blessed to compensate for the curse.' 'The fog trapped all bad luck inside, leaving only good luck outside.' 'Just coincidence — good land and excellent harbor.' 'Best not to question good fortune too closely.' Most residents treat it as simply how things are.", "spoiler": false}, {"label": "The True Source", "content": "The prosperity is a side effect of the imprisoned Archfey's power bleeding through the weakening prison. The fey influence that makes Venturia subtly strange also makes it supernaturally fertile and fortunate. The Harbor Wardens have tracked this pattern for two centuries — Teodor Vast is convinced it's connected to whatever happened at Vallombrosa.", "spoiler": true}], "connections": [{"target_id": "venturia", "target_name": "Venturia", "relationship": "The city built on unexplained prosperity", "spoiler": false}, {"target_id": "harbor_wardens", "target_name": "The Harbor Wardens' Compact", "relationship": "Have been tracking the prosperity pattern for decades", "spoiler": true}], "dm_notes": "The prosperity's true source creates a nasty implication: defeating Marcello and freeing the Archfey might end Venturia's good fortune. This adds to the impossible choice — the city's economic foundation may depend on continued imprisonment of an innocent being."}, {"id": "fey_touch", "type": "lore", "name": "The Subtle Fey-Touch", "aliases": ["Venturia's Quirks", "The Strangeness", "Fey-Touched Nature"], "tags": ["public_knowledge", "mirrors", "names", "dreams", "promises", "masks", "coincidences", "culture"], "spoiler": false, "summary": "Venturia has developed quirks over centuries that residents consider completely normal. Mirrors lag, names slip, promises carry weight, coincidences pile up. These aren't seen as supernatural — just local character. Nobody thinks 'we're fey-touched.'", "details": [{"label": "Minor Oddities", "content": "Mirrors occasionally show reflections arriving a second late. Everyone has brief moments of forgetting their own name. Colors seem unnaturally vivid during autumn. Time occasionally feels strange. Dreams throughout Venturia are unusually vivid and memorable. Coincidences happen with remarkable frequency. Promises and deals feel more serious and binding than they should.", "spoiler": false}, {"label": "Cultural Developments", "content": "These quirks shaped Venturian culture: contracts and promises are taken very seriously with taboos against oath-breaking, strong tradition of careful speech, mask-making became a respected craft, the Autumn Masquerade is the city's biggest festival, superstitions developed around names and reflections and shadows, theater and performance are highly valued.", "spoiler": false}, {"label": "Local Attitude", "content": "'Yeah, Venturia's a bit weird, but every city has its quirks. It's just the way things are here.' Nobody considers the city supernaturally influenced — they think it has character and local color. Visitors sometimes find it slightly unsettling; residents don't notice anything unusual.", "spoiler": false}, {"label": "True Source", "content": "All quirks stem from the imprisoned Keeper of Faces' influence bleeding through the weakening prison. The Archfey's domain — masks, identity, reflection, glamour — manifests as exactly these cultural phenomena. VAVA's sealed research maps show fey-touched effects intensify nearest Vallombrosa and weaken with distance.", "spoiler": true}], "connections": [{"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The imprisoned Archfey whose domain creates these phenomena", "spoiler": true}, {"target_id": "veil_court", "target_name": "The Veil Court", "relationship": "Has studied the mask/mirror phenomena more deeply than anyone", "spoiler": true}], "dm_notes": "These quirks should be woven into every session as environmental flavor. Don't over-explain them — they're just how Venturia works. The mirror-lag is the most narratively useful (connects to Keeper of Faces' domain). The promise-weight connects to the Covenant of Silver Scales' supernatural contract discoveries. Players should internalize these as normal before learning they're supernatural."}, {"id": "the_fanes", "type": "lore", "name": "The Three Fanes: Mirror, Compass, Hourglass", "aliases": ["The Fanes", "Three Objects of Power", "Binding Anchors"], "tags": ["mirror", "compass", "hourglass", "binding_ritual", "prison_maintenance", "power_source", "fane_hunt", "horcrux_parallel"], "spoiler": true, "summary": "The three mystical objects used in the original binding ritual now serve as anchor points maintaining both the Archfey's prison and Marcello's stolen power. Destroying them makes Marcello mortal but also accelerates the prison's collapse. The campaign's Act Two centers on finding and destroying them.", "details": [{"label": "Dual Function", "content": "The fanes serve two purposes: prison maintenance (anchor points for the binding that imprisons the Archfey and maintains Tartuzi's servitude) and power source (they channel and stabilize the power Lorenzo stole — as long as all three exist, Marcello retains supernatural abilities even as they weaken from the Archfey's deterioration).", "spoiler": true}, {"label": "The Pipeline Mechanism", "content": "The fanes are not just storage — they are a continuous mechanism routing residual power from the Keeper to stabilize Marcello's stolen abilities. Stolen Archfey power is fundamentally unstable in a mortal vessel; without constant feed from its source, it degrades. Each fane governs a different aspect of stabilization. Lorenzo built a pipeline. For a thousand years the fanes have drawn a slow continuous trickle from an already-wounded prisoner who cannot replenish what he loses.", "spoiler": true}, {"label": "The Horcrux Parallel", "content": "Destroying fanes doesn't kill Marcello directly but makes him killable. All three intact: effectively immortal with full supernatural power. Two intact: extremely difficult to kill, retains most power. One intact: mortal but still supernaturally powerful. Zero intact: mortal human with no supernatural abilities beyond accumulated knowledge and skill.", "spoiler": true}, {"label": "Destruction Consequences", "content": "Each fane destroyed has immediate effects: Marcello becomes noticeably weaker, the binding weakens further causing more Leaked and reality distortions, Tartuzi's condition worsens (dying faster from prison destabilization), the Archfey may manifest more directly, and Vallombrosa itself may destabilize (fog changes, false memory weakening, environmental shifts).", "spoiler": true}, {"label": "The Moral Complexity", "content": "Destroying fanes helps defeat Marcello but accelerates the crisis and brings the campaign closer to catastrophic prison failure. This creates tension between the goal of stopping Marcello and the consequences of destabilizing the prison that contains something potentially worse.", "spoiler": true}, {"label": "The Fane Hunt", "content": "Act Two's long-term structure: discover what the fanes are and what destroying them accomplishes, find all three (the party likely encounters the mirror during Act One investigation), figure out how to destroy them (powerful magic protections), do this while Marcello is actively present, and prevent him from protecting the fanes once he realizes the threat.", "spoiler": true}], "connections": [{"target_id": "ancient_tragedy", "target_name": "The Ancient Tragedy", "relationship": "The fanes were the binding ritual components used during the wedding day", "spoiler": true}, {"target_id": "marcello", "target_name": "Marcello di Errante (Lorenzo)", "relationship": "The fanes maintain his stolen power — destroying them makes him mortal", "spoiler": true}, {"target_id": "keeper_of_faces", "target_name": "The Keeper of Faces", "relationship": "The fanes maintain the prison — destroying them accelerates the Archfey's release", "spoiler": true}], "dm_notes": "The fane hunt is the structural backbone of Act Two — clear objectives with escalating difficulty building toward final confrontation. Each fane destruction should be a major campaign milestone with visible consequences. Open questions: which fane is discovered during Act One? What specific methods destroy them? How do consequences escalate? The mirror is the most thematically resonant for early discovery given the campaign's identity/reflection themes."}, {"id": "the_bound", "type": "lore", "name": "The Bound", "aliases": ["Bound", "Bound Individuals"], "tags": ["supernatural_threat", "silas", "tartuzi", "moral_complexity", "indistinguishable", "prophetic_notes", "compulsion"], "spoiler": false, "summary": "Residents supernaturally compelled to fulfill specific purposes. There are TWO types that are visually indistinguishable: Silas's Bound (destructive tasks) and Tartuzi's Bound (delivering prophetic warnings). The party can't tell them apart until after confrontation — creating the campaign's most horrific recurring moral dilemma.", "details": [{"label": "Silas's Bound", "content": "People supernaturally compelled to fulfill purposes serving Silas's hidden agenda. NOT evil people who chose to serve him — they are victims. Appear completely normal until triggered, then display blank eyes, compelled state, single-minded focus. Tasked with destructive acts: arson, poisoning, sabotage, violence. Some are aware something is wrong and fight their urges.", "spoiler": false}, {"label": "Tartuzi's Bound", "content": "As the binding weakens, Tartuzi has gained limited ability to create her own Bound. They have identical blank eyes, compelled state, and single-minded drive. But they're tasked with delivering prophetic warnings — written notes containing predictions about future threats. Compelled to reach specific people: council members, the party, key NPCs.", "spoiler": true}, {"label": "The Horror of Indistinguishability", "content": "The party CANNOT tell the two types apart by observation. Both appear identically compelled, have the same blank-eyed driven demeanor, resist being stopped with similar desperation. The only way to know which type: after the confrontation — either they commit a destructive act (Silas's), or they're found carrying a prophetic note (Tartuzi's). This should produce at least one tragedy where the party kills a messenger and finds the note describing someone innocent dying — a description matching the person they just killed.", "spoiler": true}, {"label": "The Prophetic Notes", "content": "Written in archaic but readable script, brief and specific (location, time, threat description). Prove accurate when tested. As campaign progresses, increase in detail and personalization — occasional messages directly to the party, phrases suggesting the writer knows them, references to their specific actions. Never signed. Gradual personalization builds toward revealing who sends them.", "spoiler": true}, {"label": "Moral Complexity", "content": "The party must stop people who are supernaturally manipulated without killing innocents. They must develop methods for subduing and restraining rather than destroying. They must investigate causes rather than treating each incident as isolated. Over time, they might develop methods to distinguish the types or subdue non-lethally long enough to check for messages. This creates gameplay evolution.", "spoiler": false}], "connections": [{"target_id": "silas", "target_name": "Silas Vane", "relationship": "Creates destructive Bound to serve his research agenda", "spoiler": true}, {"target_id": "tartuzi", "target_name": "Tartuzi", "relationship": "Creates prophetic messenger Bound from within her prison", "spoiler": true}], "dm_notes": "The Bound indistinguishability mechanic is the campaign's signature moral horror. The first time the party kills a Tartuzi messenger an
