server {
    listen 80;
    server_name _;

    # Maximum upload size for maps and handouts
    client_max_body_size 50M;

    # Root directory for static files (homepage, updates feed, resources)
    root /usr/share/nginx/html;
    index index.html;

    # Main homepage and static pages
    location / {
        try_files $uri $uri/ =404;
    }

    # Wiki.js gets everything under /wiki
    # This is a reverse proxy - Nginx forwards requests to Wiki.js and returns the response
    location /wiki {
        proxy_pass http://wikijs:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Chatbot API endpoint
    location /api/chat {
        proxy_pass http://chatbot:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # CORS headers so your JavaScript can talk to the API
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Content-Type';
    }

    # Serve campaign resources (PDFs, maps, handouts)
    location /resources {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
    }
}
