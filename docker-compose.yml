version: '3.8'

services:
  # PostgreSQL database - this stores all your Wiki.js content
  postgres:
    image: postgres:15-alpine
    container_name: dnd_postgres
    environment:
      # These credentials secure your database
      POSTGRES_DB: wiki
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: changeme_secure_password
    volumes:
      # This ensures your wiki data persists even if the container restarts
      - postgres-data:/var/lib/postgresql/data
    networks:
      - dnd-network
    restart: unless-stopped

  # Wiki.js - the main wiki engine for your campaign content
  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: dnd_wiki
    depends_on:
      - postgres
    ports:
      - "3000:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: wikijs
      DB_PASS: changeme_secure_password
      DB_NAME: wiki
    networks:
      - dnd-network
    restart: unless-stopped

  # Chatbot service - Python/Flask RAG-powered lore assistant
  chatbot:
    build: ./chatbot
    container_name: dnd_chatbot
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
      OLLAMA_URL: ${OLLAMA_URL:-https://ai.raptornet.dev/ollama}
      OLLAMA_API_KEY: ${OLLAMA_API_KEY:-}
      DM_PASSPHRASE: ${DM_PASSPHRASE:-Prima Volta}
    volumes:
      # Campaign data files + vector stores (read-only)
      - ./campaign-data:/app/data:ro
      # Writable volume for chat logs
      - ./logs:/app/logs
    networks:
      - dnd-network
    restart: unless-stopped

  # Nginx - the web server that handles all incoming requests and routes them
  nginx:
    image: nginx:alpine
    container_name: dnd_nginx
    ports:
      - "8080:80"
    volumes:
      # Nginx config tells it how to route different URLs
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Lore Master chatbot page and assets
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - wikijs
      - chatbot
    networks:
      - dnd-network
    restart: unless-stopped

# Docker networks let containers talk to each other by name
networks:
  dnd-network:
    driver: bridge

# Named volumes persist data between container restarts
volumes:
  postgres-data:
