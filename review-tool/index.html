<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Valley of Shadows — Data Review</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.25);
    --bg: #0d0b11;
    --bg2: rgba(255,255,255,0.03);
    --bg3: rgba(255,255,255,0.06);
    --text: #e8dcc8;
    --text-dim: rgba(232,220,200,0.45);
    --red: rgba(139,26,42,0.9);
    --red-dim: rgba(139,26,42,0.3);
}
body {
    font-family: 'Georgia', serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
    font-size: 14px;
    line-height: 1.5;
}

/* ── Sidebar ── */
#sidebar {
    width: 270px;
    min-width: 270px;
    border-right: 1px solid var(--gold-dim);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: rgba(0,0,0,0.2);
}
#sidebar-top {
    padding: 12px;
    border-bottom: 1px solid var(--gold-dim);
    flex-shrink: 0;
}
#sidebar-top h1 {
    font-family: 'Georgia', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
    margin-bottom: 8px;
}
#search {
    width: 100%;
    background: var(--bg3);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text);
    padding: 6px 10px;
    font-size: 0.85rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 6px;
}
#search:focus { border-color: var(--gold-dim); }
#issues-btn {
    width: 100%;
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    padding: 5px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.78rem;
    text-align: left;
    transition: all 0.15s;
}
#issues-btn:hover { border-color: var(--gold-dim); color: var(--text); }
#issues-btn.active { border-color: var(--gold-dim); color: var(--gold); }
#issues-btn.warn { color: #d4884c; border-color: rgba(212,136,76,0.35); }

#entry-list { flex: 1; overflow-y: auto; }
#entry-list::-webkit-scrollbar { width: 3px; }
#entry-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.15); }

.file-group { margin-bottom: 2px; }
.file-header {
    padding: 8px 12px 4px;
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.35);
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid rgba(255,255,255,0.04);
    margin-top: 4px;
}
.entry-row {
    padding: 5px 12px 5px 20px;
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 7px;
    transition: background 0.1s;
    user-select: none;
}
.entry-row:hover { background: var(--bg3); }
.entry-row.selected {
    background: rgba(201,168,76,0.07);
    border-left: 2px solid rgba(201,168,76,0.5);
    padding-left: 18px;
}
.entry-row.has-conflict { border-left: 2px solid rgba(212,136,76,0.5); padding-left: 18px; }
.entry-row.has-conflict.selected { border-left: 2px solid var(--gold); }
.entry-row-name { font-size: 0.88rem; color: var(--text); }
.entry-row-type {
    font-size: 0.62rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    text-transform: uppercase;
}
.dot-spoiler {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(139,26,42,0.7);
    margin-left: auto;
    flex-shrink: 0;
}

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#main-body { flex: 1; overflow-y: auto; padding: 24px 32px 16px; }
#main-body::-webkit-scrollbar { width: 3px; }
#main-body::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.12); }

/* ── Empty / loading ── */
#empty-state {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-style: italic;
}

/* ── Entry view ── */
.entry-head { margin-bottom: 22px; padding-bottom: 14px; border-bottom: 1px solid var(--gold-dim); }
.entry-title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 6px; }
.entry-title { font-size: 1.35rem; color: var(--gold); }
.badge {
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    border: 1px solid;
    border-radius: 2px;
    white-space: nowrap;
}
.badge-type { border-color: rgba(201,168,76,0.25); color: rgba(201,168,76,0.55); }
.badge-file { border-color: rgba(255,255,255,0.08); color: rgba(232,220,200,0.35); }
.badge-spoiler { border-color: rgba(139,26,42,0.5); color: rgba(200,80,100,0.8); }
.badge-player { border-color: rgba(100,180,100,0.3); color: rgba(130,200,130,0.7); }
.entry-meta { font-size: 0.72rem; color: var(--text-dim); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

.conflict-notice {
    background: rgba(212,136,76,0.08);
    border: 1px solid rgba(212,136,76,0.25);
    border-left: 3px solid rgba(212,136,76,0.6);
    padding: 8px 12px;
    font-size: 0.8rem;
    color: #d4884c;
    margin-bottom: 18px;
}
.conflict-notice strong { display: block; margin-bottom: 4px; }

/* ── Fields ── */
.field { margin-bottom: 18px; }
.field-label {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.45);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.field-label .dm-tag { color: rgba(200,80,100,0.7); font-size: 0.58rem; }
input[type="text"], textarea, select {
    width: 100%;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.07);
    color: var(--text);
    font-family: inherit;
    font-size: 0.9rem;
    padding: 7px 11px;
    outline: none;
    resize: vertical;
    transition: border-color 0.15s;
}
input[type="text"]:focus, textarea:focus { border-color: rgba(201,168,76,0.3); }
textarea { min-height: 72px; }
.dm-field input, .dm-field textarea {
    border-left: 2px solid rgba(139,26,42,0.4);
}

/* ── Details list ── */
.details-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
.detail-card {
    border: 1px solid rgba(255,255,255,0.06);
    background: var(--bg2);
    padding: 10px;
}
.detail-card.spoiler-card { border-left: 2px solid rgba(139,26,42,0.4); }
.detail-row { display: flex; gap: 8px; }
.detail-label { width: 150px; flex-shrink: 0; font-size: 0.85rem; }
.detail-content { flex: 1; min-height: 60px; font-size: 0.88rem; }
.detail-footer { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.checkbox-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    user-select: none;
}
.checkbox-label input { cursor: pointer; }
.btn-sm {
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-dim);
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.72rem;
    transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--gold-dim); color: var(--text); }
.btn-sm.danger { border-color: rgba(139,26,42,0.3); color: rgba(200,80,100,0.6); }
.btn-sm.danger:hover { border-color: rgba(139,26,42,0.7); color: rgba(220,100,120,0.9); background: rgba(139,26,42,0.1); }
.btn-add {
    width: 100%;
    background: none;
    border: 1px dashed rgba(255,255,255,0.08);
    color: var(--text-dim);
    padding: 6px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.75rem;
    text-align: center;
    transition: all 0.15s;
}
.btn-add:hover { border-color: var(--gold-dim); color: var(--gold); }

/* ── Connections ── */
.connections-list { display: flex; flex-direction: column; gap: 6px; }
.conn-card {
    padding: 8px 12px;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    font-size: 0.85rem;
}
.conn-card.orphan {
    border-left: 2px solid rgba(139,26,42,0.6);
    background: rgba(139,26,42,0.06);
}
.conn-name { color: var(--gold); }
.conn-rel { color: var(--text-dim); font-style: italic; font-size: 0.8rem; margin-top: 2px; }
.conn-source { font-size: 0.68rem; color: rgba(255,255,255,0.2); margin-top: 3px; }
.orphan-tag { font-size: 0.62rem; color: rgba(200,80,100,0.8); margin-left: 8px; }

/* ── JSON editor (flat files) ── */
.json-editor {
    font-family: 'Courier New', monospace;
    font-size: 0.8rem;
    min-height: 320px;
    color: #ccc;
    line-height: 1.6;
}

/* ── Save bar ── */
#save-bar {
    border-top: 1px solid var(--gold-dim);
    padding: 10px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: rgba(0,0,0,0.3);
}
#save-bar.hidden { display: none; }
#btn-save {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.35);
    color: var(--gold);
    padding: 7px 22px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all 0.15s;
}
#btn-save:hover:not(:disabled) { background: rgba(201,168,76,0.18); }
#btn-save:disabled { opacity: 0.35; cursor: default; }
#save-msg { font-size: 0.8rem; color: var(--text-dim); }
#save-msg.ok { color: #78b04c; }
#save-msg.err { color: #c05070; }

/* ── Issues panel ── */
#issues-panel { display: none; }
#issues-panel.visible { display: block; }
#issues-panel h2 {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
}
.issues-section { margin-bottom: 26px; }
.issues-section h3 {
    font-size: 0.62rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
    padding-bottom: 5px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}
.issue-card {
    padding: 10px 14px;
    margin-bottom: 8px;
    background: var(--bg2);
    border: 1px solid rgba(255,255,255,0.05);
    font-size: 0.85rem;
}
.issue-card.conflict { border-left: 2px solid rgba(212,136,76,0.5); }
.issue-card.orphan { border-left: 2px solid rgba(139,26,42,0.6); }
.issue-name { color: var(--gold); margin-bottom: 5px; }
.issue-file-tag {
    display: inline-block;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.25);
    border: 1px solid rgba(255,255,255,0.07);
    padding: 1px 5px;
    margin-right: 4px;
    font-family: monospace;
}
.issue-detail { font-size: 0.78rem; color: var(--text-dim); font-style: italic; margin-top: 3px; }
.none-msg { color: var(--text-dim); font-style: italic; font-size: 0.85rem; }
</style>
</head>
<body>

<div id="sidebar">
    <div id="sidebar-top">
        <h1>Campaign Data Review</h1>
        <input id="search" type="text" placeholder="Search entries…" autocomplete="off">
        <button id="issues-btn">Loading…</button>
    </div>
    <div id="entry-list"></div>
</div>

<div id="main">
    <div id="main-body">
        <div id="empty-state">← Select an entry to review</div>
        <div id="entry-view" style="display:none"></div>
        <div id="issues-panel"></div>
    </div>
    <div id="save-bar" class="hidden">
        <button id="btn-save">Save Changes</button>
        <span id="save-msg"></span>
    </div>
</div>

<script>
// ── State ──────────────────────────────────────────
let allEntries = [];
let allIssues = { conflicts: [], orphans: [] };
let selectedEntry = null;   // deep clone of the entry being edited
let viewMode = 'empty';     // 'empty' | 'entry' | 'issues'
const entryById = {};       // id → entry (for connection lookups)
const conflictIds = new Set(); // ids that appear in multiple files

// ── Bootstrap ──────────────────────────────────────
async function init() {
    const [entries, issues] = await Promise.all([
        fetch('/api/entries').then(r => r.json()),
        fetch('/api/issues').then(r => r.json()),
    ]);
    allEntries = entries;
    allIssues = issues;
    for (const e of entries) {
        if (e.id) entryById[e.id] = e;
    }
    for (const c of issues.conflicts) {
        for (const ce of c.entries) if (ce.id) conflictIds.add(ce.id + '::' + ce._file);
    }
    renderSidebar();
    updateIssuesBtn();
}

// ── Sidebar ────────────────────────────────────────
function updateIssuesBtn() {
    const btn = document.getElementById('issues-btn');
    const n = allIssues.conflicts.length + allIssues.orphans.length;
    btn.textContent = n > 0
        ? `⚠ ${n} issue${n !== 1 ? 's' : ''} — ${allIssues.conflicts.length} conflicts, ${allIssues.orphans.length} orphans`
        : '✓ No issues detected';
    btn.className = n > 0 ? 'warn' : '';
    if (viewMode === 'issues') btn.classList.add('active');
}

function renderSidebar() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const filtered = q
        ? allEntries.filter(e =>
            (e.name || '').toLowerCase().includes(q) ||
            (e.id || '').toLowerCase().includes(q) ||
            (e.type || '').toLowerCase().includes(q) ||
            (e.summary || '').toLowerCase().includes(q) ||
            (e._file || '').toLowerCase().includes(q)
          )
        : allEntries;

    // Group by file + category
    const groups = [];
    const seen = {};
    for (const e of filtered) {
        const key = e._file + '/' + (e._category || '');
        if (!seen[key]) {
            seen[key] = { file: e._file, category: e._category || '', entries: [] };
            groups.push(seen[key]);
        }
        seen[key].entries.push(e);
    }

    const html = groups.map(g => {
        const label = g.category ? `${g.file.replace('.json','')}<span style="opacity:0.5"> / ${g.category}</span>` : g.file.replace('.json','');
        const rows = g.entries.map(e => {
            const sel = selectedEntry && e.id === selectedEntry.id && e._file === selectedEntry._file && (e._category||'') === (selectedEntry._category||'');
            const hasConflict = conflictIds.has(e.id + '::' + e._file);
            return `<div class="entry-row${sel ? ' selected' : ''}${hasConflict ? ' has-conflict' : ''}"
                data-id="${esc(e.id)}" data-file="${esc(e._file)}" data-cat="${esc(e._category||'')}">
                <span class="entry-row-name">${esc(e.name || e.id)}</span>
                <span class="entry-row-type">${esc(e.type||'')}</span>
                ${e.spoiler ? '<span class="dot-spoiler"></span>' : ''}
            </div>`;
        }).join('');
        return `<div class="file-group">
            <div class="file-header">${label} <span>${g.entries.length}</span></div>
            ${rows}
        </div>`;
    }).join('') || `<div style="padding:14px;color:var(--text-dim);font-style:italic;font-size:0.83rem;">No matches</div>`;

    const list = document.getElementById('entry-list');
    list.innerHTML = html;
    list.querySelectorAll('.entry-row').forEach(el => {
        el.addEventListener('click', () => {
            const e = allEntries.find(x =>
                x.id === el.dataset.id &&
                x._file === el.dataset.file &&
                (x._category||'') === el.dataset.cat
            );
            if (e) openEntry(e);
        });
    });
}

// ── Entry view ─────────────────────────────────────
function openEntry(entry) {
    selectedEntry = JSON.parse(JSON.stringify(entry));
    viewMode = 'entry';
    renderSidebar();
    renderEntry();
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('issues-panel').classList.remove('visible');
    document.getElementById('entry-view').style.display = '';
    document.getElementById('save-bar').classList.remove('hidden');
    document.getElementById('btn-save').disabled = false;
    document.getElementById('save-msg').textContent = '';
    document.getElementById('save-msg').className = '';
    document.getElementById('issues-btn').classList.remove('active');
}

function renderEntry() {
    const e = selectedEntry;
    if (!e) return;
    const isFlat = e._fileType === 'flat';

    // Conflict notice
    const myConflicts = allIssues.conflicts.filter(c =>
        c.entries.some(ce => ce.id === e.id && ce._file === e._file)
    );
    const conflictHtml = myConflicts.length ? `
        <div class="conflict-notice">
            <strong>⚠ This entry appears in multiple files</strong>
            ${myConflicts.map(c => c.entries.map(ce =>
                `<span class="issue-file-tag">${ce._file}${ce._category ? '/'+ce._category : ''}</span>`
            ).join('')).join('')}
            <div style="margin-top:4px;font-size:0.75rem;opacity:0.7">Review both versions for inconsistencies before saving.</div>
        </div>` : '';

    let body = '';

    if (isFlat) {
        const raw = Object.fromEntries(Object.entries(e).filter(([k]) => !k.startsWith('_') && k !== 'id'));
        body = `
            <div class="field">
                <div class="field-label">Entry data (JSON)</div>
                <textarea class="json-editor" id="json-editor" oninput="markDirty()">${esc(JSON.stringify(raw, null, 2))}</textarea>
            </div>`;
    } else {
        const details = e.details || [];
        const conns = e.connections || [];
        const orphanTargets = new Set(
            allIssues.orphans.filter(o => o.source_id === e.id && o.source_file === e._file).map(o => o.missing_id)
        );

        const detailsHtml = details.map((d, i) => `
            <div class="detail-card${d.spoiler ? ' spoiler-card' : ''}">
                <div class="detail-row">
                    <input type="text" class="detail-label" value="${esc(d.label||'')}"
                        placeholder="Label"
                        onchange="updateDetail(${i},'label',this.value)" oninput="markDirty()">
                    <textarea class="detail-content"
                        placeholder="Content"
                        onchange="updateDetail(${i},'content',this.value)" oninput="markDirty()">${esc(d.content||'')}</textarea>
                </div>
                <div class="detail-footer">
                    <label class="checkbox-label">
                        <input type="checkbox" ${d.spoiler?'checked':''} onchange="updateDetail(${i},'spoiler',this.checked);markDirty();renderEntry()">
                        DM Only
                    </label>
                    <button class="btn-sm danger" style="margin-left:auto" onclick="removeDetail(${i})">Remove</button>
                </div>
            </div>`).join('');

        const connsHtml = conns.length ? conns.map(c => {
            const isOrphan = orphanTargets.has(c.target_id);
            const found = entryById[c.target_id];
            return `<div class="conn-card${isOrphan?' orphan':''}">
                <div>
                    <span class="conn-name">${esc(c.target_name||c.target_id)}</span>
                    ${c.spoiler ? '<span class="badge badge-spoiler" style="margin-left:6px">DM</span>' : ''}
                    ${isOrphan ? '<span class="orphan-tag">⚠ ID not found</span>' : ''}
                </div>
                <div class="conn-rel">${esc(c.relationship||'')}</div>
                ${found ? `<div class="conn-source">${found._file}${found.type?' · '+found.type:''}</div>` : ''}
            </div>`;
        }).join('')
        : `<div class="none-msg">None</div>`;

        body = `
            <div class="field">
                <div class="field-label">Name</div>
                <input type="text" value="${esc(e.name||'')}" onchange="updateField('name',this.value)" oninput="markDirty()">
            </div>
            ${e.player !== undefined ? `
            <div class="field">
                <div class="field-label">Player</div>
                <input type="text" value="${esc(e.player||'')}" onchange="updateField('player',this.value)" oninput="markDirty()">
            </div>` : ''}
            <div class="field">
                <div class="field-label">Summary</div>
                <textarea onchange="updateField('summary',this.value)" oninput="markDirty()">${esc(e.summary||'')}</textarea>
            </div>
            <div class="field">
                <div class="field-label">Tags <span style="color:rgba(255,255,255,0.15);font-size:0.58rem;font-weight:normal">(comma-separated)</span></div>
                <input type="text" value="${esc((e.tags||[]).join(', '))}"
                    placeholder="pc, warlock, imprisoned…"
                    onchange="updateTags(this.value)" oninput="markDirty()">
            </div>
            <div class="field">
                <div class="field-label">
                    Details
                    <label class="checkbox-label" style="font-family:inherit;font-size:0.6rem;letter-spacing:0">
                        <input type="checkbox" id="show-dm-details" checked onchange="renderEntry()"> Show DM-only
                    </label>
                </div>
                <div class="details-list">${detailsHtml}</div>
                <button class="btn-add" onclick="addDetail()">+ Add Detail</button>
            </div>
            <div class="field">
                <div class="field-label">Connections <span style="color:rgba(255,255,255,0.15);font-size:0.58rem;font-weight:normal">(read-only — edit JSON directly to change)</span></div>
                <div class="connections-list">${connsHtml}</div>
            </div>
            <div class="field dm-field">
                <div class="field-label"><span class="dm-tag">DM Notes</span></div>
                <textarea onchange="updateField('dm_notes',this.value)" oninput="markDirty()">${esc(e.dm_notes||'')}</textarea>
            </div>
            <div class="field" style="display:flex;align-items:center;gap:8px">
                <label class="checkbox-label" style="font-size:0.82rem;color:var(--text-dim)">
                    <input type="checkbox" ${e.spoiler?'checked':''} onchange="updateField('spoiler',this.checked);markDirty()">
                    Mark entire entry as DM-only (spoiler)
                </label>
            </div>`;
    }

    document.getElementById('entry-view').innerHTML = `
        <div class="entry-head">
            <div class="entry-title-row">
                <span class="entry-title">${esc(e.name||e.id)}</span>
                ${e.type ? `<span class="badge badge-type">${esc(e.type)}</span>` : ''}
                ${e.spoiler ? '<span class="badge badge-spoiler">DM Only</span>' : ''}
                ${e.player ? `<span class="badge badge-player">${esc(e.player)}</span>` : ''}
            </div>
            <div class="entry-meta">
                <span class="badge badge-file">${esc(e._file)}</span>
                ${e._category ? `<span class="badge badge-file">${esc(e._category)}</span>` : ''}
                ${e.id ? `<span style="font-family:monospace;font-size:0.68rem;color:rgba(255,255,255,0.18)">${esc(e.id)}</span>` : ''}
            </div>
        </div>
        ${conflictHtml}
        ${body}`;
}

// ── Edit helpers ───────────────────────────────────
function markDirty() {
    document.getElementById('save-msg').textContent = '';
    document.getElementById('save-msg').className = '';
}

function updateField(key, value) { selectedEntry[key] = value; markDirty(); }
function updateTags(v) { selectedEntry.tags = v.split(',').map(t => t.trim()).filter(Boolean); markDirty(); }
function updateDetail(i, key, value) {
    if (!selectedEntry.details) selectedEntry.details = [];
    selectedEntry.details[i][key] = value;
    markDirty();
}
function removeDetail(i) {
    selectedEntry.details.splice(i, 1);
    markDirty();
    renderEntry();
}
function addDetail() {
    if (!selectedEntry.details) selectedEntry.details = [];
    selectedEntry.details.push({ label: '', content: '', spoiler: false });
    markDirty();
    renderEntry();
    const inputs = document.querySelectorAll('.detail-label');
    if (inputs.length) inputs[inputs.length - 1].focus();
}

// ── Save ───────────────────────────────────────────
async function saveEntry() {
    const btn = document.getElementById('btn-save');
    const msg = document.getElementById('save-msg');
    btn.disabled = true;
    msg.textContent = 'Saving…';
    msg.className = '';

    let payload = { ...selectedEntry };

    if (selectedEntry._fileType === 'flat') {
        try {
            const parsed = JSON.parse(document.getElementById('json-editor').value);
            payload = {
                ...parsed,
                _file: selectedEntry._file,
                _fileType: selectedEntry._fileType,
                _key: selectedEntry._key,
                _category: selectedEntry._category,
                id: selectedEntry.id,
            };
        } catch {
            msg.textContent = 'Invalid JSON — fix before saving';
            msg.className = 'err';
            btn.disabled = false;
            return;
        }
    }

    try {
        const res = await fetch('/api/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (data.success) {
            msg.textContent = 'Saved ✓';
            msg.className = 'ok';
            await refreshData();
        } else {
            msg.textContent = 'Error: ' + (data.error || 'Unknown');
            msg.className = 'err';
        }
    } catch (err) {
        msg.textContent = 'Network error: ' + err.message;
        msg.className = 'err';
    }
    btn.disabled = false;
}

async function refreshData() {
    const [entries, issues] = await Promise.all([
        fetch('/api/entries').then(r => r.json()),
        fetch('/api/issues').then(r => r.json()),
    ]);
    allEntries = entries;
    allIssues = issues;
    conflictIds.clear();
    for (const k of Object.keys(entryById)) delete entryById[k];
    for (const e of entries) { if (e.id) entryById[e.id] = e; }
    for (const c of issues.conflicts) {
        for (const ce of c.entries) if (ce.id) conflictIds.add(ce.id + '::' + ce._file);
    }
    // Re-sync selectedEntry from fresh data
    if (selectedEntry) {
        const fresh = allEntries.find(e =>
            e.id === selectedEntry.id &&
            e._file === selectedEntry._file &&
            (e._category||'') === (selectedEntry._category||'')
        );
        if (fresh) selectedEntry = JSON.parse(JSON.stringify(fresh));
    }
    renderSidebar();
    updateIssuesBtn();
    if (viewMode === 'issues') renderIssuesPanel();
}

// ── Issues panel ───────────────────────────────────
function showIssues() {
    viewMode = 'issues';
    selectedEntry = null;
    renderSidebar();
    renderIssuesPanel();
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('entry-view').style.display = 'none';
    document.getElementById('save-bar').classList.add('hidden');
    document.getElementById('issues-panel').classList.add('visible');
    document.getElementById('issues-btn').classList.add('active');
}

function hideIssues() {
    viewMode = selectedEntry ? 'entry' : 'empty';
    document.getElementById('issues-panel').classList.remove('visible');
    document.getElementById('issues-btn').classList.remove('active');
    if (selectedEntry) {
        document.getElementById('entry-view').style.display = '';
        document.getElementById('save-bar').classList.remove('hidden');
    } else {
        document.getElementById('empty-state').style.display = '';
    }
}

function renderIssuesPanel() {
    const { conflicts, orphans } = allIssues;

    const conflictsHtml = conflicts.length ? conflicts.map(c => `
        <div class="issue-card conflict">
            <div class="issue-name">${esc(c.name)}</div>
            ${c.entries.map(e => `
                <div style="margin-top:5px">
                    <span class="issue-file-tag">${esc(e._file)}${e._category ? '/'+esc(e._category) : ''}</span>
                    <span style="font-size:0.72rem;color:rgba(255,255,255,0.25)">${esc(e.id)}</span>
                    ${e.summary ? `<div class="issue-detail">${esc(e.summary.slice(0,120))}${e.summary.length>120?'…':''}</div>` : ''}
                </div>`).join('')}
        </div>`).join('')
    : `<div class="none-msg">None detected</div>`;

    const orphansHtml = orphans.length ? orphans.map(o => `
        <div class="issue-card orphan">
            <div>
                <span class="issue-file-tag">${esc(o.source_file)}</span>
                <span style="color:var(--gold)">${esc(o.source_name)}</span>
                <span style="color:var(--text-dim)"> → </span>
                <span style="color:rgba(200,80,100,0.8)">${esc(o.missing_name)}</span>
            </div>
            <div class="issue-detail">target_id "<code>${esc(o.missing_id)}</code>" not found in any file</div>
            ${o.relationship ? `<div class="issue-detail">${esc(o.relationship.slice(0,120))}</div>` : ''}
        </div>`).join('')
    : `<div class="none-msg">None detected</div>`;

    document.getElementById('issues-panel').innerHTML = `
        <h2>Data Issues</h2>
        <div class="issues-section">
            <h3>Conflicts — same name in multiple files (${conflicts.length})</h3>
            ${conflictsHtml}
        </div>
        <div class="issues-section">
            <h3>Orphan connections — target ID not found (${orphans.length})</h3>
            ${orphansHtml}
        </div>`;
}

// ── Utility ────────────────────────────────────────
function esc(str) {
    return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Events ─────────────────────────────────────────
document.getElementById('search').addEventListener('input', renderSidebar);
document.getElementById('issues-btn').addEventListener('click', () => {
    viewMode === 'issues' ? hideIssues() : showIssues();
});
document.getElementById('btn-save').addEventListener('click', saveEntry);

// ── Start ──────────────────────────────────────────
init();
</script>
</body>
</html>
